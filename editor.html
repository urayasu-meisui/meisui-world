<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>座標エディタ - めいすいくん総選挙</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", sans-serif;
      background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column; height: 100vh;
    }
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; background: #0d0d1a;
      flex-wrap: wrap; border-bottom: 1px solid #333;
    }
    .toolbar button {
      padding: 5px 12px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      color: #fff; transition: opacity 0.2s;
    }
    .toolbar button:hover { opacity: 0.85; }
    .btn-save { background: #4caf50; font-size: 14px !important; padding: 8px 20px !important; }
    .btn-load { background: #2196f3; }
    .btn-reset { background: #78909c; }
    .group-label {
      font-size: 11px; color: #666; margin-left: 8px;
    }
    .marker-btn {
      padding: 3px 8px !important; font-size: 11px !important;
      border: 2px solid transparent !important;
      opacity: 0.6;
    }
    .marker-btn.active {
      opacity: 1; border-color: #fff !important;
    }
    .canvas-wrap {
      flex: 1; overflow: auto; position: relative;
      display: flex; align-items: flex-start; justify-content: center;
      background: #111;
    }
    canvas { cursor: crosshair; }
    #coords {
      position: fixed; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.8); color: #ffd700;
      padding: 6px 12px; border-radius: 6px; font-size: 13px;
      font-family: monospace;
    }
    #status {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(76,175,80,0.9); color: #fff;
      padding: 6px 12px; border-radius: 6px; font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span style="font-weight:900;color:#ffd700;">座標エディタ</span>
    <button class="btn-save" onclick="saveAndApply()">💾 保存＆適用</button>
    <button class="btn-load" onclick="loadJSON()">📂 読み込み</button>
    <button class="btn-reset" onclick="resetAll()">↩ リセット</button>

    <span class="group-label">ビーナス:</span>
    <div id="grp_meisui_chan"></div>

    <span class="group-label">海:</span>
    <div id="grp_bekabune"></div>

    <span class="group-label">屋形船:</span>
    <div id="grp_asari"></div>

    <span class="group-label">漁師:</span>
    <div id="grp_ryoushi"></div>

    <span class="group-label">未来:</span>
    <div id="grp_future"></div>

    <span class="group-label">駅:</span>
    <div id="grp_station"></div>

    <span class="group-label">施設:</span>
    <div id="grp_facility"></div>

    <span class="group-label">投票所:</span>
    <div id="grp_vote"></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="coords">x: 0, y: 0</div>
  <div id="status"></div>
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">

  <script>
    const MAP_W = 1920, MAP_H = 1080;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = MAP_W;
    canvas.height = MAP_H;

    // 全固定座標オブジェクト定義（fixed-positions.jsonと同値をデフォルトに設定）
    const markerDefs = [
      // ビーナスめいちゃん
      { id: 'lighthouse',         label: '灯台',           color: '#ffeb3b', group: 'meisui_chan', x: 1020, y: 1051 },
      { id: 'marina',             label: 'マリーナ',       color: '#00bcd4', group: 'meisui_chan', x: 1037, y: 839  },
      // 海めいすいくん
      { id: 'whale',              label: 'クジラ',         color: '#42a5f5', group: 'bekabune',   x: 1000, y: 900  },
      { id: 'coral_1',            label: 'サンゴ1',        color: '#ff6b6b', group: 'bekabune',   x: 200,  y: 1050 },
      { id: 'coral_2',            label: 'サンゴ2',        color: '#ff69b4', group: 'bekabune',   x: 563,  y: 910  },
      { id: 'coral_3',            label: 'サンゴ3',        color: '#ffa500', group: 'bekabune',   x: 791,  y: 998  },
      { id: 'coral_4',            label: 'サンゴ4',        color: '#da70d6', group: 'bekabune',   x: 1221, y: 1013 },
      { id: 'coral_5',            label: 'サンゴ5',        color: '#ff6347', group: 'bekabune',   x: 1394, y: 907  },
      { id: 'coral_6',            label: 'サンゴ6',        color: '#e040fb', group: 'bekabune',   x: 1581, y: 779  },
      { id: 'coral_7',            label: 'サンゴ7',        color: '#ff4500', group: 'bekabune',   x: 1740, y: 701  },
      // 屋形船めいすいくん
      { id: 'firework_1',         label: '花火1',          color: '#ff4444', group: 'asari',      x: 1484, y: 835  },
      { id: 'firework_2',         label: '花火2',          color: '#ffd700', group: 'asari',      x: 1193, y: 840  },
      { id: 'firework_3',         label: '花火3',          color: '#ff69b4', group: 'asari',      x: 1517, y: 455  },
      // 漁師めいすいくん
      { id: 'fish_market',        label: '魚市場',         color: '#ff9800', group: 'ryoushi',    x: 778,  y: 660  },
      { id: 'shopping_arcade',    label: '商店街',         color: '#e040fb', group: 'ryoushi',    x: 978,  y: 158  },
      { id: 'harbor',             label: '港施設',         color: '#66bb6a', group: 'ryoushi',    x: 1118, y: 813  },
      // 未来建造物
      { id: 'kasai_bridge',       label: '葛西大橋',       color: '#E65100', group: 'future',     x: 875,  y: 336  },
      { id: 'kasai_bridge_start', label: '橋起点',         color: '#E65100', group: 'future',     x: 910,  y: 351  },
      { id: 'kasai_bridge_end',   label: '橋終点',         color: '#E65100', group: 'future',     x: 837,  y: 326  },
      { id: 'ropeway_label',      label: 'ロープウェイ文字', color: '#9C27B0', group: 'future',   x: 1051, y: 315  },
      { id: 'marine_city',        label: '海上都市',       color: '#00BCD4', group: 'future',     x: 938,  y: 988  },
      // 駅
      { id: 'lm_浦安駅',         label: '浦安駅',         color: '#795548', group: 'station',    x: 973,  y: 185  },
      { id: 'lm_新浦安駅',       label: '新浦安駅',       color: '#795548', group: 'station',    x: 1233, y: 483  },
      { id: 'lm_舞浜駅',         label: '舞浜駅',         color: '#795548', group: 'station',    x: 827,  y: 712  },
      // 施設
      { id: 'lm_中央公園',       label: '中央公園',       color: '#4caf50', group: 'facility',   x: 1126, y: 661  },
      { id: 'lm_高洲中央公園',   label: '高洲中央公園',   color: '#4caf50', group: 'facility',   x: 1273, y: 725  },
      { id: 'lm_浦安市総合公園', label: '総合公園',       color: '#4caf50', group: 'facility',   x: 1450, y: 739  },
      { id: 'lm_三番瀬',         label: '三番瀬',         color: '#26c6da', group: 'facility',   x: 1538, y: 560  },
      { id: 'lm_元町エリア',     label: '元町エリア',     color: '#8d6e63', group: 'facility',   x: 924,  y: 194  },
      { id: 'lm_中町エリア',     label: '中町エリア',     color: '#8d6e63', group: 'facility',   x: 989,  y: 530  },
      { id: 'lm_新町エリア',     label: '新町エリア',     color: '#8d6e63', group: 'facility',   x: 1286, y: 529  },
      { id: 'lm_東京湾',         label: '東京湾',         color: '#1976d2', group: 'facility',   x: 454,  y: 981  },
      { id: 'lm_舞浜リゾート',   label: '舞浜リゾート',   color: '#e91e63', group: 'facility',   x: 690,  y: 882  },
      { id: 'lm_国道沿い商店',   label: '国道沿い商店',   color: '#ff9800', group: 'facility',   x: 1078, y: 462  },
      // 投票所
      { id: 'lm_市役所',       label: '市役所',       color: '#f44336', group: 'vote', x: 1081, y: 420  },
      { id: 'lm_中央公民館',   label: '中央公民館',   color: '#f44336', group: 'vote', x: 957,  y: 237  },
      { id: 'lm_市民プラザ',   label: '市民プラザ',   color: '#f44336', group: 'vote', x: 1247, y: 516  },
      { id: 'lm_日の出公民館', label: '日の出公民館', color: '#f44336', group: 'vote', x: 1393, y: 580  },
      { id: 'lm_高洲公民館',   label: '高洲公民館',   color: '#f44336', group: 'vote', x: 1329, y: 732  },
      { id: 'lm_富岡公民館',   label: '富岡公民館',   color: '#f44336', group: 'vote', x: 1074, y: 619  },
    ];

    let markers = markerDefs.map(d => ({ ...d }));
    let selectedId = null;
    let dragging = null;
    let dragOffset = { x: 0, y: 0 };

    // マップ画像
    const mapImg = new Image();
    mapImg.src = 'map_real.png';
    mapImg.onload = () => { loadSaved(); draw(); };

    // グループ別ボタン生成
    const groups = ['meisui_chan', 'bekabune', 'asari', 'ryoushi', 'future', 'station', 'facility', 'vote'];
    groups.forEach(grp => {
      const container = document.getElementById('grp_' + grp);
      if (!container) return;
      markerDefs.filter(d => d.group === grp).forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'marker-btn';
        btn.textContent = d.label;
        btn.style.background = d.color;
        btn.style.color = ['#ffeb3b','#ffa500','#E65100'].includes(d.color) ? '#333' : '#fff';
        btn.id = 'btn-' + d.id;
        btn.onclick = () => {
          selectedId = (selectedId === d.id) ? null : d.id;
          updateButtonStates();
          draw();
        };
        container.appendChild(btn);
      });
    });

    function updateButtonStates() {
      markerDefs.forEach(d => {
        const btn = document.getElementById('btn-' + d.id);
        if (btn) btn.classList.toggle('active', selectedId === d.id);
      });
    }

    // 描画
    function draw() {
      ctx.clearRect(0, 0, MAP_W, MAP_H);
      if (mapImg.complete) ctx.drawImage(mapImg, 0, 0, MAP_W, MAP_H);

      markers.forEach(m => {
        const isSelected = m.id === selectedId;
        const r = isSelected ? 16 : 10;
        const alpha = isSelected ? 1 : 0.7;

        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(m.x, m.y, r, 0, Math.PI * 2);
        ctx.fillStyle = m.color;
        ctx.fill();
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.strokeStyle = '#fff';
        ctx.stroke();

        // ラベル（選択中 or ホバー範囲のみ）
        if (isSelected) {
          ctx.font = 'bold 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 3;
          ctx.strokeText(m.label, m.x, m.y - r - 5);
          ctx.fillText(m.label, m.x, m.y - r - 5);
          ctx.font = '10px monospace';
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          const ct = `(${Math.round(m.x)}, ${Math.round(m.y)})`;
          ctx.strokeText(ct, m.x, m.y + r + 12);
          ctx.fillText(ct, m.x, m.y + r + 12);
        }
        ctx.globalAlpha = 1;
      });
    }

    // マウス座標変換
    function getMapCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (MAP_W / rect.width),
        y: (e.clientY - rect.top) * (MAP_H / rect.height)
      };
    }

    function findMarkerAt(mx, my) {
      for (let i = markers.length - 1; i >= 0; i--) {
        const m = markers[i];
        const dx = m.x - mx, dy = m.y - my;
        if (dx * dx + dy * dy < 400) return m;
      }
      return null;
    }

    // マウスイベント
    canvas.addEventListener('mousedown', e => {
      const { x, y } = getMapCoords(e);
      if (e.button === 2) {
        const hit = findMarkerAt(x, y);
        if (hit) {
          const def = markerDefs.find(d => d.id === hit.id);
          if (def) { hit.x = def.x; hit.y = def.y; draw(); }
        }
        return;
      }
      const hit = findMarkerAt(x, y);
      if (hit) {
        dragging = hit;
        dragOffset.x = hit.x - x;
        dragOffset.y = hit.y - y;
        selectedId = hit.id;
        updateButtonStates();
        draw();
      }
    });

    canvas.addEventListener('mousemove', e => {
      const { x, y } = getMapCoords(e);
      document.getElementById('coords').textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
      if (dragging) {
        dragging.x = Math.round(x + dragOffset.x);
        dragging.y = Math.round(y + dragOffset.y);
        draw();
      }
    });

    canvas.addEventListener('mouseup', () => { dragging = null; });
    canvas.addEventListener('mouseleave', () => { dragging = null; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // 保存: JSONファイルとしてプロジェクトに直接書き出し
    function saveAndApply() {
      const data = {};
      markers.forEach(m => {
        data[m.id] = { x: Math.round(m.x), y: Math.round(m.y) };
      });
      const json = JSON.stringify(data, null, 2);

      // ダウンロード
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'fixed-positions.json';
      a.click();

      // localStorage にも保存（次回エディタ起動時に読み込み）
      localStorage.setItem('meisui_fixed_positions', json);

      showStatus('保存しました！ fixed-positions.json をプロジェクトフォルダに配置してください');
    }

    // 起動時に保存データがあれば読み込み
    function loadSaved() {
      const saved = localStorage.getItem('meisui_fixed_positions');
      if (saved) {
        try {
          applyData(JSON.parse(saved));
        } catch(e) {}
      }
    }

    function applyData(data) {
      markers.forEach(m => {
        if (data[m.id]) {
          m.x = data[m.id].x;
          m.y = data[m.id].y;
        }
      });
    }

    // ファイル読み込み
    function loadJSON() { document.getElementById('fileInput').click(); }
    function handleFileLoad(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          applyData(JSON.parse(ev.target.result));
          draw();
          showStatus('読み込みました');
        } catch (err) { alert('読み込み失敗: ' + err.message); }
      };
      reader.readAsText(file);
    }

    function resetAll() {
      if (!confirm('全マーカーを初期位置に戻しますか？')) return;
      markers = markerDefs.map(d => ({ ...d }));
      localStorage.removeItem('meisui_fixed_positions');
      draw();
    }

    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
