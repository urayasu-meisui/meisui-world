    <script>
        // ============================================
        // Sound Manager (Web Audio API)
        // ============================================
        // オーディオシステムは js/audio.js に分離済み

        // Character image data URLs


        // Load real map image (MAP_2009- = real Urayasu map)
        const mapImage = new Image();
        mapImage.src = 'map_real.png';
        mapImage.onerror = function() {
            this.src = 'urayasu_map.webp'; // fallback to old map
        };

        // Sea overlay images for reclamation stages
        const seaStage1 = new Image(); seaStage1.src = 'sea_stage1.png'; // 1889-1959: 元町のみ
        const seaStage2 = new Image(); seaStage2.src = 'sea_stage2.png'; // 1969-1978: 元町+中町
        const seaStage3 = new Image(); seaStage3.src = 'sea_stage3.png'; // 1979-1988: +舞浜+新町

        // Initialize voting grid
        function initVoteGrid() {
            const voteGridContainer = document.getElementById('voteGridContainer');
            const voteData = CHAR_TYPES.map(t => ({
                type: t, name: charMetadata[t].name, img: charImages[t]
            }));

            let html = '';
            voteData.forEach(data => {
                const cardHtml = '<div class="vote-card" data-type="' + data.type + '" onclick="castVote(\'' + data.type + '\')"><img src="' + data.img.src + '" /><div class="vote-card-name">' + data.name + '</div><div class="vote-card-count" id="vc-' + data.type + '">0票</div></div>';
                html += cardHtml;
            });
            voteGridContainer.innerHTML = html;
        }

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // CHANGE 4: minimapCanvas and minimapCtx removed

        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight - 36;

        // Map constants
        const TILE_SIZE = 32;

        // Landmarks (x, y, width, height, type, name, emoji)

        // Character walking routes - waypoints along actual roads on the map
        // キャラクターの行動圏: 'land'=陸のみ, 'sea'=海/川のみ, 'both'=両方


        // Location-specific dialogues for named waypoints

        // Character data

        // ============================================
        // Mikoshi Event Display
        // ============================================
        function showMikoshiEvent(char1, char2) {
            // Calculate center point between two characters
            const centerX = (char1.x + char2.x) / 2;
            const centerY = (char1.y + char2.y) / 2;

            // Create DOM overlay for mikoshi event
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                left: 0; top: 0; width: 100%; height: 100%;
                pointer-events: none;
                z-index: 300;
            `;

            // Calculate screen position from map coordinates
            const titleBarH = window.innerWidth <= 768 ? 36 : 50;
            const screenX = centerX * camera.zoomX;
            const screenY = centerY * camera.zoomY + 36;

            // Mikoshi text that bounces
            const mikoshi = document.createElement('div');
            mikoshi.style.cssText = `
                position: absolute;
                left: ${screenX - 100}px;
                top: ${Math.max(20, screenY - 120)}px;
                width: 200px;
                text-align: center;
                font-size: 32px;
                font-weight: 900;
                color: #d32f2f;
                text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 20px #ffd700;
                animation: mikoshiBounce 0.5s ease infinite;
                font-family: sans-serif;
            `;
            mikoshi.innerHTML = '🏮 まいだ！まいだ！🏮<br><span style="font-size:16px;color:#ff6f00;">' + char1.type.replace('_', ' ') + ' × ' + char2.type.replace('_', ' ') + '</span>';
            overlay.appendChild(mikoshi);

            // Spawn festival particles
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const colors = ['#ff1744', '#ffd600', '#ff6d00', '#ff4081', '#ffab00'];
                const size = 6 + Math.random() * 8;
                particle.style.cssText = `
                    position: absolute;
                    width: ${size}px; height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    left: ${screenX + (Math.random() - 0.5) * 200}px;
                    top: ${screenY + (Math.random() - 0.5) * 100}px;
                    animation: mikoshiParticle ${1 + Math.random() * 2}s ease-out forwards;
                    pointer-events: none;
                `;
                overlay.appendChild(particle);
            }

            document.body.appendChild(overlay);

            // Remove after 4 seconds
            setTimeout(() => {
                overlay.style.transition = 'opacity 0.5s';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }, 3500);
        }

        // ============================================
        // Simple Interaction Event (for 4 other events)
        // ============================================
        function showSimpleInteractionEvent(char1, char2, event) {
            // イベント別テーマカラー
            const themes = {
                'じゃんけん大会': { bg: 'linear-gradient(135deg,#667eea,#764ba2)', glow: '#a855f7', deco: '⚡' },
                'ハイタッチ':     { bg: 'linear-gradient(135deg,#f7971e,#ffd200)', glow: '#fbbf24', deco: '🌟' },
                '浦安盆踊り':     { bg: 'linear-gradient(135deg,#f953c6,#b91d73)', glow: '#ec4899', deco: '🌸' },
                '記念撮影':       { bg: 'linear-gradient(135deg,#11998e,#38ef7d)', glow: '#34d399', deco: '✨' },
            };
            const theme = themes[event.name] || { bg: 'linear-gradient(135deg,#f7971e,#ffd200)', glow: '#ffd200', deco: '🎉' };

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:300;display:flex;align-items:center;justify-content:center;';

            // メインカード（画面中央）
            const card = document.createElement('div');
            card.style.cssText = `
                position:relative;
                width:260px;
                text-align:center;
                background:${theme.bg};
                border-radius:24px;
                padding:28px 20px 22px;
                box-shadow:0 0 0 4px rgba(255,255,255,0.4), 0 0 40px ${theme.glow}, 0 8px 32px rgba(0,0,0,0.4);
                animation:popScale 0.35s cubic-bezier(0.34,1.56,0.64,1);
                font-family:sans-serif;
            `;

            // デコ飾り（四隅）
            const corners = ['top:8px;left:12px', 'top:8px;right:12px', 'bottom:8px;left:12px', 'bottom:8px;right:12px'];
            corners.forEach(pos => {
                const d = document.createElement('span');
                d.style.cssText = `position:absolute;${pos};font-size:18px;opacity:0.85;`;
                d.textContent = theme.deco;
                card.appendChild(d);
            });

            // 絵文字（大）
            const emojiEl = document.createElement('div');
            emojiEl.style.cssText = 'font-size:64px;line-height:1.1;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));';
            emojiEl.textContent = event.emoji;
            card.appendChild(emojiEl);

            // イベント名
            const nameEl = document.createElement('div');
            nameEl.style.cssText = 'font-size:26px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.4);letter-spacing:2px;margin-bottom:10px;';
            nameEl.textContent = event.name;
            card.appendChild(nameEl);

            // キャラ名
            const charsEl = document.createElement('div');
            charsEl.style.cssText = 'font-size:13px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.2);border-radius:20px;padding:4px 14px;display:inline-block;';
            charsEl.textContent = `${char1.name} × ${char2.name}`;
            card.appendChild(charsEl);

            overlay.appendChild(card);

            // 紙吹雪パーティクル
            const confettiColors = ['#ff1744','#ffd600','#ff6d00','#ff4081','#ffab00','#00e5ff','#76ff03','#e040fb'];
            const vw = window.innerWidth, vh = window.innerHeight;
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                const size = 6 + Math.random() * 8;
                const startX = vw * 0.2 + Math.random() * vw * 0.6;
                const startY = vh * 0.3 + Math.random() * vh * 0.2;
                const tx = (Math.random() - 0.5) * 600;
                const ty = (Math.random() - 1.0) * 400 - 100;
                const rot = Math.random() * 720;
                p.style.cssText = `
                    position:absolute;
                    width:${size}px;height:${size * (Math.random() > 0.5 ? 1 : 2.5)}px;
                    background:${confettiColors[Math.floor(Math.random() * confettiColors.length)]};
                    border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
                    left:${startX}px;top:${startY}px;
                    opacity:1;
                    transition:transform ${1.5 + Math.random()}s ease-out, opacity ${1 + Math.random()}s ease-out ${0.5 + Math.random()}s;
                `;
                overlay.appendChild(p);
                // アニメーション開始
                requestAnimationFrame(() => {
                    p.style.transform = `translate(${tx}px,${ty}px) rotate(${rot}deg)`;
                    p.style.opacity = '0';
                });
            }

            document.body.appendChild(overlay);

            setTimeout(() => {
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                card.style.transform = 'scale(0.85)';
                card.style.opacity = '0';
                setTimeout(() => overlay.remove(), 400);
            }, 2800);
        }

        // ============================================
        // Cloud System
        // ============================================
        let clouds = [];
        
        function initClouds() {
            for (let i = 0; i < 7; i++) {
                clouds.push({
                    x: Math.random() * window.innerWidth,
                    y: 50 + Math.random() * 100,
                    width: 60 + Math.random() * 80,
                    height: 30 + Math.random() * 40,
                    speed: 0.02 + Math.random() * 0.05,
                    opacity: 0.5 + Math.random() * 0.3
                });
            }
        }

        function drawCloud(x, y, width, height) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(x, y, height * 0.5, 0, Math.PI * 2);
            ctx.arc(x + width * 0.3, y - height * 0.2, height * 0.6, 0, Math.PI * 2);
            ctx.arc(x + width * 0.6, y, height * 0.55, 0, Math.PI * 2);
            ctx.arc(x + width, y - height * 0.15, height * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateAndDrawClouds(now) {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > window.innerWidth + cloud.width) {
                    cloud.x = -cloud.width;
                }
                drawCloud(cloud.x, cloud.y, cloud.width, cloud.height);
            });
        }

        // ============================================
        // Day/Night Cycle System
        // ============================================
        let dayNightCycle = 0; // 0 = Day, 1 = Dusk, 2 = Night, 3 = Dawn
        let ambientPhase = 0; // 0-1 cycle every 3 minutes = 180000ms
        
        function updateDayNightCycle() {
            // Disabled — daytime only mode
            ambientPhase = 0.35; // Always daytime
        }

        // CHANGE 6: Draw night time effects (stars, moon, building lights, street lamps)
        function drawNightEffects(ctx, now) {
            if (ambientPhase < 0.75 || ambientPhase > 1) return; // Only during night phase

            const timeInNight = (ambientPhase - 0.75) / 0.25; // 0-1 during night

            // Draw stars (20-30 small white dots with twinkle)
            ctx.save();
            ctx.globalAlpha = 0.3 + timeInNight * 0.4;
            ctx.fillStyle = 'white';

            // Use deterministic random stars based on position
            for (let i = 0; i < 30; i++) {
                const seed = i * 12345;
                const starX = (seed * 7919) % MAP_W;
                const starY = (seed * 6091) % (MAP_H * 0.6); // Upper 60% of sky

                // Twinkle animation
                const twinkle = Math.sin(now * 0.002 + i) * 0.5 + 0.5;
                ctx.globalAlpha = (0.3 + timeInNight * 0.4) * twinkle;
                ctx.beginPath();
                ctx.arc(starX, starY, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw BIG prominent moon in upper-right (CHANGE 1: much bigger, focal point)
            ctx.globalAlpha = 0.8 + timeInNight * 0.15;
            ctx.fillStyle = 'white';
            const moonX = MAP_W - 200;
            const moonY = 120;
            ctx.beginPath();
            ctx.arc(moonX, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

            // Moon shadow for subtle depth (optional crescent effect)
            ctx.globalAlpha = (0.1 + timeInNight * 0.03);
            ctx.fillStyle = 'rgba(25, 50, 130, 1)';
            ctx.beginPath();
            ctx.arc(moonX + 20, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // ============================================
        // Character Interaction System
        // ============================================
        // Cooldown to prevent interaction spam
        let lastInteractionTime = 0;
        let nextInteractionAllowed = Date.now() + 60000; // First event after 60s

        function checkCharacterInteractions(chars) {
            const now = Date.now();

            // Update active interaction timers using real time (not frame-dependent)
            chars.forEach(char => {
                if (char.interacting && char.interactionEndTime) {
                    if (now >= char.interactionEndTime) {
                        char.interacting = false;
                        char.interactionEndTime = 0;
                    }
                    // Keep interactionTimer for animation calculations
                    char.interactionTimer = Math.max(0, char.interactionEndTime - now);
                }
            });

            // Hard cooldown: minimum 60 seconds between events
            if (now < nextInteractionAllowed) return;

            // モーダル/クイズ表示中はインタラクション抑制
            if (window.voteInProgress || document.getElementById('voteModal')?.style.display !== 'none' || document.getElementById('quizModal')) return;

            // Check if any pair is close enough
            let triggered = false;
            for (let i = 0; i < chars.length && !triggered; i++) {
                for (let j = i + 1; j < chars.length && !triggered; j++) {
                    const char1 = chars[i];
                    const char2 = chars[j];
                    const dx = char1.x - char2.x;
                    const dy = char1.y - char2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80 && !char1.interacting && !char2.interacting && !char1.celebrating && !char2.celebrating) {
                        nextInteractionAllowed = now + 60000 + Math.random() * 30000;
                        triggered = true;

                        const allEvents = [
                            { name: 'まいだ！まいだ！', emoji: '🏮', isMikoshi: true },
                            { name: 'じゃんけん大会', emoji: '✊✌️✋' },
                            { name: 'ハイタッチ', emoji: '🙌' },
                            { name: '浦安盆踊り', emoji: '💃🕺' },
                            { name: '記念撮影', emoji: '📸' },
                        ];
                        const event = allEvents[Math.floor(Math.random() * allEvents.length)];

                        char1.interacting = true;
                        char2.interacting = true;
                        char1.interactionEndTime = now + 3000;
                        char2.interactionEndTime = now + 3000;
                        char1.interactionTimer = 3000;
                        char2.interactionTimer = 3000;
                        char1.state = 'idle';
                        char2.state = 'idle';
                        char1.stateTimer = 0;
                        char2.stateTimer = 0;

                        if (event.isMikoshi) {
                            showMikoshiEvent(char1, char2);
                        } else {
                            showSimpleInteractionEvent(char1, char2, event);
                        }
                        playSound('event');
                        break;
                    }
                }
            }
        }

        // ============================================
        // Firefly System
        // ============================================
        let fireflies = [];
        
        function initFireflies() {
            for (let i = 0; i < 20; i++) {
                fireflies.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 1,

            });

        // イージング関数（加減速が自然）
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        // カメラズームアニメーション更新
        function updateCameraAnimation(deltaTime) {
            if (camera.animState === 'idle') return;
            camera.animTimer -= deltaTime;

            if (camera.animState === 'zoom_in') {
                camera.animProgress = Math.min(1, camera.animProgress + deltaTime / 500);
                if (camera.animProgress >= 1) {
                    camera.animProgress = 1;
                    camera.animState = 'hold';
                    camera.animTimer = 1500;
                }
            } else if (camera.animState === 'hold') {
                if (camera.animTimer <= 0) {
                    camera.animState = 'zoom_out';
                }
            } else if (camera.animState === 'zoom_out') {
                camera.animProgress = Math.max(0, camera.animProgress - deltaTime / 500);
                if (camera.animProgress <= 0) {
                    camera.animProgress = 0;
                    camera.animState = 'idle';
                }
            }

        // Seeded pseudo-random for consistent wobble per object
        function seededRandom(seed) {
            let s = seed || 1;
            return function() {
                s = (s * 16807) % 2147483647;
                return (s & 0x7fffffff) / 0x7fffffff;
            };
        }

        // Draw a wobbly rectangle (hand-drawn look)
        function wobbleRect(ctx, x, y, w, h, seed) {
            const rng = seededRandom(seed);
            const jitter = 2;
            ctx.beginPath();
            ctx.moveTo(x + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + h + rng()*jitter);
            ctx.lineTo(x + rng()*jitter, y + h + rng()*jitter);
            ctx.closePath();
        }

        // Draw a wobbly circle
        function wobbleCircle(ctx, cx, cy, r, seed) {
            const rng = seededRandom(seed);
            const points = 20;
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const wobble = r + (rng()-0.5) * r * 0.15;
                const px = cx + Math.cos(angle) * wobble;
                const py = cy + Math.sin(angle) * wobble;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

            // Organic green patches (watercolor effect) - within land only
            for (let i = 0; i < 80; i++) {

                // Simple check: roughly within the polygon (approximate)

                const r = 30 + Math.random() * 80;

                const colors = ['#6db86d','#8dca8d','#5da85d','#9dd89d','#4d984d'];
                const green = colors[Math.floor(Math.random()*colors.length)];
                grad.addColorStop(0, green);
                grad.addColorStop(1, 'rgba(124,184,124,0)');
                staticCtx.fillStyle = grad;
                staticCtx.beginPath();
                wobbleCircle(staticCtx, x, y, r, i*7);
                staticCtx.fill();
            }

            // Tiny flower dots scattered (on land only)
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * MAP_W;
                const y = Math.random() * (MAP_H - 270);

                // Rough land check

                staticCtx.fillStyle = colors[Math.floor(Math.random()*5)];
                staticCtx.beginPath();

        function renderWater() {
            // Tokyo Bay
            const bayGrad = staticCtx.createLinearGradient(0, MAP_H-200, 0, MAP_H);
            bayGrad.addColorStop(0, '#6cb4ee');
            bayGrad.addColorStop(0.5, '#4a9de0');
            bayGrad.addColorStop(1, '#3888cc');
            staticCtx.fillStyle = bayGrad;
            staticCtx.fillRect(0, MAP_H-200, MAP_W, 200);

            // 旧江戸川 (left river)
            const riverGrad = staticCtx.createLinearGradient(0, 0, 120, 0);
            riverGrad.addColorStop(0, '#4a9de0');
            riverGrad.addColorStop(1, '#6cb4ee');
            staticCtx.fillStyle = riverGrad;
            staticCtx.beginPath();
            staticCtx.moveTo(0, 0);
            for (let y = 0; y <= MAP_H; y += 15) {
                staticCtx.lineTo(80 + Math.sin(y*0.02)*15 + Math.sin(y*0.05)*5, y);
            }
            staticCtx.lineTo(0, MAP_H);
            staticCtx.closePath();
            staticCtx.fill();
        }

        function renderRoads() {
            // Draw road paths with chalk/pencil texture
            staticCtx.strokeStyle = '#d4b896';
            staticCtx.lineWidth = 22;
            staticCtx.lineCap = 'round';
            staticCtx.lineJoin = 'round';

            staticCtx.beginPath();
            pathWaypoints.forEach((wp, idx) => {
                const wobble = Math.sin(idx*2.3)*2 + Math.cos(idx*1.7)*2;
                if (idx === 0) staticCtx.moveTo(wp.x, wp.y);
                else staticCtx.lineTo(wp.x, wp.y);
            });
            staticCtx.stroke();

            // Lighter center line
            staticCtx.strokeStyle = '#e8d5b8';
            staticCtx.lineWidth = 12;
            staticCtx.stroke();
        }

        function drawBuilding(ctx, x, y, w, h, type, name, emoji) {
            const seed = x * 1000 + y;

            switch(type) {
                case 'shrine':
                    // Cute red torii gate and shrine
                    ctx.fillStyle = '#e8ddd0';
                    wobbleRect(ctx, x+4, y+h*0.4, w-8, h*0.6, seed);

                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    ctx.fillRect(x+w*0.15, y+h*0.45, w*0.7, 3);
                    // Roof
                    ctx.fillStyle = '#555';
                    ctx.beginPath();
                    ctx.moveTo(x-2, y+h*0.4);
                    ctx.lineTo(x+w/2, y+h*0.15);
                    ctx.lineTo(x+w+2, y+h*0.4);
                    ctx.fill();

                case 'station':
                    // Train station with platform
                    ctx.fillStyle = '#e0e8f0';
                    wobbleRect(ctx, x, y+h*0.2, w, h*0.8, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#7090b0';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Blue roof
                    ctx.fillStyle = '#4a7ca0';
                    ctx.beginPath();
                    ctx.moveTo(x-5, y+h*0.25);
                    ctx.lineTo(x+w/2, y);
                    ctx.lineTo(x+w+5, y+h*0.25);
                    ctx.closePath();
                    ctx.fill();
                    // Windows
                    for (let i = 0; i < 3; i++) {
                        ctx.fillStyle = '#a0c8e8';
                        wobbleRect(ctx, x+8+i*(w-16)/3, y+h*0.35, (w-24)/3, h*0.25, seed+i);
                        ctx.fill();
                        ctx.strokeStyle = '#7090b0';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                    break;

                case 'vote':
                    // Voting booth - white with red accent
                    ctx.fillStyle = '#f8f0e8';
                    wobbleRect(ctx, x, y+h*0.15, w, h*0.85, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#b09070';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Red band at top
                    ctx.fillStyle = '#cc3333';
                    ctx.fillRect(x+3, y+h*0.15, w-6, h*0.12);
                    // Ballot box
                    ctx.fillStyle = '#ddd';
                    wobbleRect(ctx, x+w*0.25, y+h*0.45, w*0.5, h*0.35, seed+5);
                    ctx.fill();
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Slot on top
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x+w*0.35, y+h*0.45);
                    ctx.lineTo(x+w*0.65, y+h*0.45);
                    ctx.stroke();
                    break;

                case 'shop':
                    // Colorful shop

                    wobbleRect(ctx, x, y, w, h, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#cc5555';
                    ctx.lineWidth = 1.5;

                    // Yellow window

                case 'school':

            ctx.stroke();

        function drawTree(ctx, x, y, type, seed) {

        function fixMapTextLabels(ctx) {
            // 境川: AI生成で文字が崩れているので、角丸白背景＋正しい文字で上書き
            ctx.save();
            // 角丸の白背景で崩れた文字を完全に覆う
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            const rx = 1145, ry = 555, rw = 65, rh = 95, r = 8;
            ctx.beginPath();
            ctx.moveTo(rx + r, ry);
            ctx.lineTo(rx + rw - r, ry);
            ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
            ctx.lineTo(rx + rw, ry + rh - r);
            ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
            ctx.lineTo(rx + r, ry + rh);
            ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
            ctx.lineTo(rx, ry + r);
            ctx.quadraticCurveTo(rx, ry, rx + r, ry);
            ctx.closePath();
            ctx.fill();
            // 正しい「境川」を縦書きで描画
            ctx.font = 'bold 30px "Hiragino Sans", "Yu Gothic", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

        }

        // ============================================
        // 海の装飾アニメーションシステム
        // ============================================
        const oceanDecorations = {
            // 小舟（漁船・ヨット）
            boats: [
                { x: 200, y: 750, speed: 0.15, type: 'fishing', dir: 1 },

        function drawOceanDecorations(ctx, t) {
            const time = t * 0.001;

            // === 波紋 ===
            oceanDecorations.rippleTimer += 1;
            if (oceanDecorations.rippleTimer > 90) { // 新しい波紋を定期的に生成
                oceanDecorations.rippleTimer = 0;
                const rx = 100 + Math.random() * (MAP_W - 200);
                const ry = 600 + Math.random() * (MAP_H - 650);
                oceanDecorations.ripples.push({ x: rx, y: ry, age: 0, maxAge: 120 });
            }
            oceanDecorations.ripples = oceanDecorations.ripples.filter(r => r.age < r.maxAge);
            for (const rip of oceanDecorations.ripples) {
                rip.age++;
                const progress = rip.age / rip.maxAge;
                const radius = progress * 25;
                const alpha = (1 - progress) * 0.3;
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(rip.x, rip.y, radius, 0, Math.PI * 2);
                ctx.stroke();
                if (radius > 8) {
                    ctx.beginPath();
                    ctx.arc(rip.x, rip.y, radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // === 魚の群れ（水面下の影） ===
            for (const school of oceanDecorations.fishSchools) {
                const baseX = school.x + Math.sin(time * school.speed + school.phase) * 80;
                const baseY = school.y + Math.cos(time * school.speed * 0.7 + school.phase) * 20;
                for (let i = 0; i < school.count; i++) {
                    const angle = (i / school.count) * Math.PI * 2 + time * school.speed;
                    const fx = baseX + Math.cos(angle) * school.radius;
                    const fy = baseY + Math.sin(angle) * school.radius * 0.5;
                    const fishDir = Math.cos(time * school.speed + school.phase) > 0 ? 1 : -1;
                    ctx.save();
                    ctx.translate(fx, fy);
                    ctx.scale(fishDir, 1);
                    ctx.fillStyle = 'rgba(60,120,180,0.35)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 尾びれ
                    ctx.beginPath();
                    ctx.moveTo(-8, 0);
                    ctx.lineTo(-13, -4);
                    ctx.lineTo(-13, 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            // === 小舟 ===
            for (const boat of oceanDecorations.boats) {
                boat.x += boat.speed * boat.dir;
                // 画面端で折り返し
                if (boat.x > MAP_W + 50) boat.x = -50;
                if (boat.x < -50) boat.x = MAP_W + 50;
                const bobY = boat.y + Math.sin(time * 2 + boat.x * 0.01) * 3;
                const tilt = Math.sin(time * 1.5 + boat.x * 0.01) * 0.05;

                ctx.save();
                ctx.translate(boat.x, bobY);
                ctx.rotate(tilt);
                if (boat.type === 'fishing') {
                    // 漁船
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.moveTo(-18, 0); ctx.lineTo(-14, 8); ctx.lineTo(14, 8); ctx.lineTo(18, 0);
                    ctx.closePath();
                    ctx.fill();
                    // マスト
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(2, 0); ctx.lineTo(2, -16);
                    ctx.stroke();
                    // 旗
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(2, -16); ctx.lineTo(10, -13); ctx.lineTo(2, -10);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // ヨット
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(-14, 0); ctx.lineTo(-10, 6); ctx.lineTo(10, 6); ctx.lineTo(14, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                    // 帆
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.moveTo(0, -20); ctx.lineTo(0, 0); ctx.lineTo(10 * boat.dir, -3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#ccc';
                    ctx.stroke();
                }
                ctx.restore();
            }

            // === カモメ ===
            for (const gull of oceanDecorations.seagulls) {
                gull.x += gull.speed;
                if (gull.x > MAP_W + 30) gull.x = -30;
                gull.wingPhase += 0.08;
                const gy = gull.y + Math.sin(time * 0.8 + gull.x * 0.005) * 10;
                const wingAngle = Math.sin(gull.wingPhase) * 0.5;

                ctx.save();
                ctx.translate(gull.x, gy);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                // 左翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-8, -6 * (1 + wingAngle), -16, -2 + wingAngle * 8);
                ctx.stroke();
                // 右翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(8, -6 * (1 + wingAngle), 16, -2 + wingAngle * 8);
                ctx.stroke();
                // 体
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ============================================

                ctx.restore();
            });
        }

        // ============================================
        // VOTE-BASED TOWN EVOLUTION (大規模演出版)
        // ============================================

        // 点がポリゴン内にあるか判定（ray casting法）
        // polygon: [[x,y], ...] 形式（浦安市域ポリゴン用）
        function isPointInPolygon(px, py, polygon) {
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // 点がゾーンポリゴン内にあるか判定（ray casting法）
        // polygon: [{x,y}, ...] 形式（ゾーンポリゴン用）
        function isPointInZone(px, py, polygon) {
            if (!polygon || polygon.length < 3) return true; // 未設定時は通過
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // 浦安市域ポリゴン（1981年=全埋め立て完了後の最大範囲）
        const urayasuLandPolygon = eraLandPolygons[1981] || [];

        // 固定座標オブジェクトの位置（fixed-positions.jsonと同じ値をデフォルトに設定）
        const fixedPos = {
            lighthouse:          { x: 1020, y: 1051 },

            coral_1:             { x: 200,  y: 1050 },

            coral_4:             { x: 1221, y: 1013 },

        // ランダム配置ゾーンポリゴン（座標エディタで調整可）
        // デフォルト: 矩形（fixed-positions.jsonのデフォルト値と同じ範囲）
        let landZonePolygon = [
            { x: 680,  y: 60  }, { x: 1750, y: 60  },
            { x: 1750, y: 850 }, { x: 680,  y: 850 }
        ];
        let seaZonePolygon = [
            { x: 620,  y: 600  }, { x: 1920, y: 600  },
            { x: 1920, y: 1080 }, { x: 620,  y: 1080 }
        ];

        // 地形制約 + ゾーンポリゴン制約付き位置生成
        // zonePolygon: [{x,y}, ...] ゾーン多角形（この中に収める）
        // terrain: 'land'=浦安市内の陸地のみ, 'sea'=陸地の外（海・川）, 'any'=どこでも
        function generatePositions(seed, count, zonePolygon, terrain) {
            const rng = seededRandom(seed);
            const positions = [];
            let attempts = 0;
            const maxAttempts = count * 40; // ポリゴンフィルタ分、余裕を増やす

            // ゾーンポリゴンのバウンディングボックスを計算
            const xs = zonePolygon.map(p => p.x);
            const ys = zonePolygon.map(p => p.y);
            const xMin = Math.min(...xs), xMax = Math.max(...xs);
            const yMin = Math.min(...ys), yMax = Math.max(...ys);

            while (positions.length < count && attempts < maxAttempts) {
                attempts++;
                const x = xMin + rng() * (xMax - xMin);
                const y = yMin + rng() * (yMax - yMin);

                // ゾーンポリゴン内チェック
                if (!isPointInZone(x, y, zonePolygon)) continue;

                // 地形チェック（浦安市域ポリゴン）
                if (terrain === 'land') {
                    if (!isPointInPolygon(x, y, urayasuLandPolygon)) continue;
                } else if (terrain === 'sea') {
                    if (isPointInPolygon(x, y, urayasuLandPolygon)) continue;
                }
                // 'any' または terrain未指定の場合はチェックなし

                positions.push({
                    x, y,
                    seed: Math.floor(rng() * 99999),
                    size: 0.7 + rng() * 0.6
                });
            }
            return positions;
        }

        // ゾーンポリゴン内にランダムなルート中継点を生成
        function generateRouteWaypoints(polygon, count, seed) {
            const rng = seededRandom(seed);
            const xs = polygon.map(p => p.x), ys = polygon.map(p => p.y);
            const xMin = Math.min(...xs), xMax = Math.max(...xs);
            const yMin = Math.min(...ys), yMax = Math.max(...ys);
            const pts = [];
            let attempts = 0;
            while (pts.length < count && attempts < count * 40) {
                attempts++;
                const x = xMin + rng() * (xMax - xMin);
                const y = yMin + rng() * (yMax - yMin);
                if (isPointInZone(x, y, polygon)) {
                    pts.push({ x: Math.round(x), y: Math.round(y) });
                }
            }
            return pts;
        }

        // キャラクターのルートをゾーンポリゴンに合わせて再生成
        function rebuildCharacterRoutes() {

        // 全ポジション配列（ゾーンポリゴン変更時に再生成できるよう let で宣言）
        let ginkgoPositions, azaleaPositions, fishMarketPositions, beachPositions;

        // 初期生成（デフォルトゾーンポリゴンで）
        regenerateAllPositions();
        rebuildCharacterRoutes();

        // fixed-positions.json があれば座標とゾーンポリゴンを上書きして再生成
        fetch('fixed-positions.json').then(r => r.json()).then(data => {
            // fixedPosオブジェクトの座標を上書き
            Object.keys(data).forEach(id => {
                if (fixedPos[id] && typeof data[id] === 'object' && !Array.isArray(data[id])) {

            // ゾーンポリゴンを上書き

            if (Array.isArray(data.zone_sea) && data.zone_sea.length >= 3) {
                seaZonePolygon = data.zone_sea.map(p => ({ x: p.x, y: p.y }));
                zoneUpdated = true;
            }
            // ゾーンが変わった場合は再生成
            if (zoneUpdated) { regenerateAllPositions(); rebuildCharacterRoutes(); }
            // landmarks配列の座標も上書き（"lm_名前" 形式のキーで管理）
            landmarks.forEach(lm => {

        // 1票=1オブジェクト出現アニメーション
        let newObjectAnim = null; // { charType, startTime }

        function triggerNewObjectAnimation(charType) {

        // バウンスアニメーション計算（0→1.3→1.0に収束）
        function calcBounce(elapsed, duration) {
            const t = Math.min(1, elapsed / duration);
            if (t < 0.4) return (t / 0.4) * 1.3;
            return 1.0 + Math.sin((t - 0.4) / 0.6 * Math.PI) * 0.3 * (1 - t);
        }

        // Persistent vote particles (leaves, petals, etc.)
        let voteParticles = [];

        // 投票後ハイライト用グローバル変数
        let lastVotedCharType = null;
        let lastVoteHighlightTime = 0;
        const HIGHLIGHT_DURATION = 5000; // 5秒間キラキラ

        function drawVoteEffects(ctx, now) {
