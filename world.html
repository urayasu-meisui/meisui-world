            html += '<div style="font-size:16px;color:#888;margin-bottom:4px;">仮想うらやすの発展度</div>';
            html += '<div style="font-size:48px;font-weight:900;color:' + r.color + ';letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,0.1);">ランク ' + r.rank + '</div>';
            html += '<div style="font-size:22px;font-weight:bold;margin:6px 0;">' + r.title + '</div>';
            html += '<div style="font-size:20px;">' + r.star + '</div>';
            html += '<div style="font-size:13px;color:#666;margin-top:4px;">' + r.desc + '</div>';
            html += '</div>';

            // 換算投票率
            const turnoutPercent = ((totalVotes * 17) / 171322 * 100).toFixed(1);
            html += '<div style="background:rgba(21,101,192,0.08);border-radius:10px;padding:10px 16px;margin-bottom:12px;text-align:center;">';
            html += '<div style="font-size:13px;color:#1565c0;font-weight:bold;">📊 換算投票率: ' + turnoutPercent + '%</div>';
            html += '<div style="font-size:11px;color:#888;margin-top:2px;">浦安市有権者 171,322人換算（1票=17票相当）</div>';
            html += '</div>';

            // 総投票数プログレスバー
            html += '<div style="background:#f0f0f0;border-radius:10px;padding:12px 16px;margin-bottom:18px;">';
            html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px;">';
            html += '<span>総投票数: <b style="color:#333;font-size:14px;">' + info.total + '票</b></span>';
            if (info.next) {
                html += '<span>次のランク ' + info.next.rank + ' まであと <b style="color:' + info.next.color + ';">' + (info.next.min - info.total) + '票</b></span>';
            } else {
                html += '<span style="color:#e040fb;font-weight:bold;">MAX 🎉</span>';
            }
            html += '</div>';
            // プログレスバー
            if (info.next) {
                let prevMin = r.min;
                let progress = ((info.total - prevMin) / (info.next.min - prevMin)) * 100;
                html += '<div style="background:#ddd;border-radius:8px;height:12px;overflow:hidden;">';
                html += '<div style="background:linear-gradient(90deg,' + r.color + ',' + (info.next.color) + ');height:100%;border-radius:8px;width:' + Math.min(progress, 100) + '%;transition:width 0.5s;"></div>';
                html += '</div>';
            } else {
                html += '<div style="background:#ddd;border-radius:8px;height:12px;overflow:hidden;">';
                html += '<div style="background:linear-gradient(90deg,#e040fb,#ffd700);height:100%;border-radius:8px;width:100%;"></div>';
                html += '</div>';
            }
            html += '</div>';

            // 各エリアの発展状況
            html += '<div style="font-size:14px;font-weight:bold;color:#555;margin-bottom:10px;">🏘️ エリア別 発展状況</div>';

            areaRanks.forEach(function(area) {
                let lv = getAreaLevel(area.key);
                let v = votes[area.key] || 0;
                let lvName = area.levels[lv];
                let maxLv = area.levels.length - 1;
                let pct = (lv / maxLv) * 100;

                html += '<div style="background:#fafafa;border-radius:12px;padding:10px 14px;margin-bottom:8px;border:1px solid #eee;">';
                html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
                html += '<div style="display:flex;align-items:center;gap:6px;">';
                html += '<span style="font-size:20px;">' + area.emoji + '</span>';
                html += '<span style="font-weight:bold;font-size:13px;">' + area.name + '</span>';
                html += '</div>';
                html += '<div style="display:flex;align-items:center;gap:6px;">';
                html += '<span style="font-size:11px;color:#888;">' + v + '票</span>';
                html += '<span style="background:' + area.color + ';color:#fff;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;">' + lvName + '</span>';
                html += '</div>';
                html += '</div>';
                // ゲージ
                html += '<div style="background:#e8e8e8;border-radius:6px;height:8px;overflow:hidden;">';
                html += '<div style="background:' + area.color + ';height:100%;border-radius:6px;width:' + pct + '%;transition:width 0.5s;"></div>';
                html += '</div>';
                // レベルドット
                html += '<div style="display:flex;justify-content:space-between;margin-top:4px;">';
                for (let d = 0; d <= maxLv; d++) {
                    let dotColor = d <= lv ? area.color : '#ccc';
                    let dotSize = d <= lv ? '8px' : '6px';
                    html += '<div style="width:' + dotSize + ';height:' + dotSize + ';border-radius:50%;background:' + dotColor + ';"></div>';
                }
                html += '</div>';
                html += '</div>';
            });

            // 建設した建物一覧
            html += '<div style="font-size:14px;font-weight:bold;color:#555;margin:18px 0 10px;">🏗️ 建設した建物</div>';
            let allBuildings = buildingsList.concat(charBuildingsList || []);
            let builtCount = 0;
            let totalBuildingCount = allBuildings.length;
            allBuildings.forEach(function(b) {
                let isBuilt = builtBuildings.includes(b.id);
                if (isBuilt) builtCount++;
                let icon = isBuilt ? '✅' : '🔒';
                let opacity = isBuilt ? '1' : '0.4';
                let bgColor = isBuilt ? '#f0faf0' : '#f5f5f5';
                let charLabel = b.char ? (' — ' + (charMetadata[b.char] ? charMetadata[b.char].name : b.char) + 'の力') : '';
                html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;border-radius:10px;background:' + bgColor + ';opacity:' + opacity + ';">';
                html += '<span style="font-size:20px;">' + icon + '</span>';
                html += '<div style="flex:1;">';
                html += '<div style="font-size:13px;font-weight:bold;">' + (b.emoji || '🏠') + ' ' + b.name + '</div>';
                if (!isBuilt) {
                    html += '<div style="font-size:11px;color:#999;">あと ' + (b.unlock_votes) + '票で建設' + charLabel + '</div>';
                } else {
                    html += '<div style="font-size:11px;color:#4caf50;">建設済み！' + charLabel + '</div>';
                }
                html += '</div>';
                html += '</div>';
            });
            html += '<div style="text-align:center;font-size:12px;color:#888;margin-top:8px;">建設: ' + builtCount + ' / ' + totalBuildingCount + '</div>';

            // 過去の世界線の記録
            html += '<div style="font-size:14px;font-weight:bold;color:#555;margin:18px 0 10px;">🌀 過去の世界線の記録</div>';
            html += '<div id="worldLineHistoryContainer" style="font-size:12px;color:#888;">読み込み中...</div>';

            // フッター
            html += '<div style="text-align:center;margin-top:16px;font-size:12px;color:#aaa;">投票して浦安を発展させよう！</div>';

            document.getElementById('rankContent').innerHTML = html;
            document.getElementById('rankPopup').style.display = 'flex';

            // Load world line history from Firebase
            firebaseDb.ref('stats/worldLineHistory').once('value').then(snap => {
                const history = snap.val();
                const container = document.getElementById('worldLineHistoryContainer');
                if (!history || Object.keys(history).length === 0) {
                    container.innerHTML = '<div style="color:#bbb;text-align:center;padding:8px;">まだ記録がありません</div>';
                    return;
                }
                let hHtml = '';
                // Sort by world line number descending (newest first)
                const entries = Object.values(history).sort((a, b) => b.worldLine - a.worldLine);
                entries.forEach(rec => {
                    hHtml += '<div style="background:#f8f8ff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
                    hHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
                    hHtml += '<span style="font-weight:bold;color:#667eea;">第' + rec.worldLine + '世界線</span>';
                    hHtml += '<span style="font-size:11px;color:#aaa;">' + new Date(rec.timestamp).toLocaleDateString('ja-JP') + '</span>';
                    hHtml += '</div>';
                    hHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">';
                    hHtml += '<span style="font-size:20px;">' + (rec.star || '') + '</span>';
                    hHtml += '<span style="font-weight:bold;font-size:14px;color:#333;">ランク ' + rec.rank + ' - ' + rec.title + '</span>';
                    hHtml += '</div>';
                    hHtml += '<div style="font-size:11px;color:#1565c0;margin-bottom:4px;">📊 換算投票率: ' + (rec.turnoutPercent || '?') + '% (' + (rec.totalVotesAtEnd || '?') + '票)</div>';
                    // Area details
                    if (rec.areas) {
                        hHtml += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
                        Object.values(rec.areas).forEach(a => {
                            hHtml += '<span style="background:#eee;padding:2px 8px;border-radius:8px;font-size:10px;">' + a.name + ': ' + a.levelName + ' (' + a.votes + '票)</span>';
                        });
                        hHtml += '</div>';
                    }
                    hHtml += '</div>';
                });
                container.innerHTML = hHtml;
            }).catch(err => {
                const container = document.getElementById('worldLineHistoryContainer');
                if (container) container.innerHTML = '<div style="color:#ccc;">読み込めませんでした</div>';
            });
        }

        function closeRankPopup() {
            document.getElementById('rankPopup').style.display = 'none';
        }

        // Start animation

        // V5 Features: Initialize all new systems
        initClouds();
        initFireflies();
        initAchievements();
        initWelcome();
        document.getElementById('soundToggleBtn').addEventListener('click', toggleSound);
        fitMapToScreen();
        animate();

        // ============================================
        // クイズシステム（V3新機能）
        // ============================================
        
        // クイズシステムは js/quiz-system.js に分離済み

        // 建物システムは js/building-system.js に分離済み

        // ランダムイベント・レベルアップは js/event-system.js に分離済み

    </script>
</body>
</html>
