            // 投票後ハイライト: 該当キャラのエリアにキラキラ
            const highlightActive = lastVotedCharType && (now - lastVoteHighlightTime < HIGHLIGHT_DURATION);
            if (highlightActive) {
                const t = (now - lastVoteHighlightTime) / 1000;
                const alpha = Math.max(0, 1 - t / (HIGHLIGHT_DURATION / 1000)) * 0.8;
                // キャラタイプに応じたキラキラ位置
                const sparkleAreas = {
                    meisui: [{x:600,y:200},{x:700,y:300},{x:500,y:350},{x:650,y:150},{x:550,y:250}],
                    tsutsuji: [{x:450,y:300},{x:550,y:400},{x:500,y:200},{x:600,y:350},{x:400,y:250}],
                    meisui_chan: [{x:950,y:400},{x:1050,y:350},{x:900,y:500},{x:1000,y:300},{x:1100,y:450}],
                    bekabune: [{x:1100,y:600},{x:1200,y:500},{x:1000,y:700},{x:1150,y:550},{x:1050,y:650}],
                    asari: [{x:800,y:850},{x:900,y:800},{x:700,y:900},{x:850,y:750},{x:950,y:850}],
                    ryoushi: [{x:700,y:700},{x:800,y:650},{x:600,y:750},{x:750,y:600},{x:650,y:680}]
                };
                const areas = sparkleAreas[lastVotedCharType] || [];
                const color = charMetadata[lastVotedCharType]?.color || '#ffd700';
                ctx.save();
                ctx.globalAlpha = alpha;
                areas.forEach((pos, i) => {
                    const sparkleSize = 6 + Math.sin(t * 5 + i * 1.5) * 4;
                    const ox = Math.sin(t * 3 + i * 2) * 15;
                    const oy = Math.cos(t * 2.5 + i * 1.8) * 15;
                    // 星型キラキラ
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    for (let j = 0; j < 5; j++) {
                        const angle = (j * 4 * Math.PI / 5) - Math.PI / 2 + t * 2;
                        const r = j % 2 === 0 ? sparkleSize : sparkleSize * 0.4;
                        ctx.lineTo(pos.x + ox + Math.cos(angle) * r, pos.y + oy + Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // 白い光の点
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.arc(pos.x + ox, pos.y + oy, sparkleSize * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            // キャラ別の有効投票数を一括計算
            const cv = {};
            CHAR_TYPES.forEach(t => { cv[t] = Math.max(0, (votes[t] || 0) - (decorationOffset[t] || 0)); });
            const vM = cv.meisui, vT = cv.tsutsuji, vV = cv.meisui_chan;
            const vU = cv.bekabune, vA = cv.asari, vR = cv.ryoushi;

            // ========== 1. めいすいくん → イチョウ並木・黄金の紅葉 ==========
            if (vM > 0) {
                // (color overlay removed - using real map image)

                // 大きなイチョウの木
                const count = Math.min(vM * 2, ginkgoPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = ginkgoPositions[i];
                    let s = p.size;
                    // 新オブジェクトバウンス（最後の2つ）
                    const isNew = newObjectAnim && newObjectAnim.charType === 'meisui' && i >= count - 2;
                    if (isNew) {
                        const elapsed = now - newObjectAnim.startTime;
                        const bounce = calcBounce(elapsed, ANIM_DURATION);
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.scale(bounce, bounce);
                        ctx.translate(-p.x, -p.y);
                    }
                    drawLargeGinkgo(ctx, p.x, p.y, p.seed, s, now);
                    if (isNew) ctx.restore();
                }

                // 落ちるイチョウの葉パーティクル
                if (vM >= 3) {
                    const leafCount = Math.min(vM * 3, 40);
                    for (let i = 0; i < leafCount; i++) {
                        const phase = now * 0.0005 + i * 1.7;
                        const lx = (550 + ((i * 137) % 650)) + Math.sin(phase) * 30;
                        const ly = ((now * 0.02 + i * 80) % 650);
                        const rot = Math.sin(phase * 2) * 0.5;
                        ctx.save();
                        ctx.translate(lx, ly);
                        ctx.rotate(rot);
                        ctx.fillStyle = ['#ffd700','#daa520','#f0c040','#e8b820'][i % 4];
                        ctx.beginPath();
                        // Fan-shaped ginkgo leaf
                        ctx.moveTo(0, 3);
                        ctx.quadraticCurveTo(-5, -3, -3, -6);
                        ctx.quadraticCurveTo(0, -4, 3, -6);
                        ctx.quadraticCurveTo(5, -3, 0, 3);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ========== 2. ツツジ → 花園・ピンクの楽園 ==========
            if (vT > 0) {
                // (color overlay removed - using real map image)

                // 大きなツツジの花壇
                const count = Math.min(vT * 2, azaleaPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = azaleaPositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'tsutsuji' && i >= count - 2;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawLargeAzalea(ctx, p.x, p.y, p.seed, p.size);
                    if (isNew) ctx.restore();
                }

                // 花びら舞うパーティクル
                if (vT >= 3) {
                    const petalCount = Math.min(vT * 3, 45);
                    for (let i = 0; i < petalCount; i++) {
                        const phase = now * 0.0004 + i * 2.1;
                        const px = (550 + ((i * 151) % 450)) + Math.sin(phase * 1.3) * 25;
                        const py = ((now * 0.015 + i * 70) % 500);
                        ctx.save();
                        ctx.translate(px, py);
                        ctx.rotate(Math.sin(phase) * Math.PI);
                        ctx.globalAlpha = 0.7;
                        ctx.fillStyle = ['#ff69b4','#ff1493','#da70d6','#e040fb','#ff85c2'][i % 5];
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 3, 5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ========== 3. ヴィーナス → 海岸線リゾート開発 ==========
            if (vV > 0) {
                // (beach gradient and sea color overlays removed - using real map image)

                // ビーチ施設
                const count = Math.min(vV * 2, beachPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = beachPositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'meisui_chan' && i >= count - 2;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawBeachFacility(ctx, p.x, p.y, p.seed, i, now);
                    if (isNew) ctx.restore();
                }

                // 5票以上で灯台 (near 三番瀬 area)
                if (vV >= 5) {
                    drawLighthouse(ctx, fixedPos.lighthouse.x, fixedPos.lighthouse.y, now);
                }
                // 10票以上でマリーナ (near 総合公園 coast)
                if (vV >= 10) {
                    drawMarina(ctx, fixedPos.marina.x, fixedPos.marina.y, now);
                }
            }

            // ========== 4. 浦安の海 → 海洋生物の楽園 ==========
            if (vU > 0) {
                // (sea/river color overlays removed - using real map image)
                const clarity = Math.min(vU / 12, 1);
                ctx.fill();

                // 海洋生物
                const count = Math.min(vU * 2, marinePositions.length);
                for (let i = 0; i < count; i++) {
                    const p = marinePositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'bekabune' && i >= count - 2;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawMarineCreature(ctx, p.x, p.y, p.seed, i, now);
                    if (isNew) ctx.restore();
                }

                // 5票以上でクジラの噴水 (in Tokyo Bay)
                if (vU >= 5) {
                    drawWhale(ctx, fixedPos.whale.x, fixedPos.whale.y, now);
                }
                // 8票以上でサンゴ礁
                if (vU >= 8) {
                    drawCoralReef(ctx, now);
                }
            }

            // ========== 5. 屋形船 → 海上祭り ==========
            if (vA > 0) {
                // あさり（1票から浅瀬に現れる）
                const clamCount = Math.min(vA * 4, asariClamPositions.length);
                for (let i = 0; i < clamCount; i++) {
                    const p = asariClamPositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'asari' && i >= clamCount - 4;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawAsariClam(ctx, p.x, p.y, p.seed, now);
                    if (isNew) ctx.restore();
                }

                // 屋形船（2票以上）
                if (vA >= 2) {
                    const count = Math.min((vA - 1) * 2, boatPositions.length);
                    for (let i = 0; i < count; i++) {
                        const p = boatPositions[i];
                        const isNew = newObjectAnim && newObjectAnim.charType === 'asari' && i >= count - 2;
                        if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                        drawYakatabune(ctx, p.x, p.y, p.seed, i, now);
                        if (isNew) ctx.restore();
                    }
                }


                // 8票以上で花火
                if (vA >= 8) {
                    drawFireworks(ctx, now);
                }
            }

            // ========== 6. 漁師 → のり養殖・魚市場・商業エリア ==========
            if (vR > 0) {
                // のり養殖フレーム（1票から海に現れる　浦安の伝統産業）
                const noriCount = Math.min(vR * 3, noriFramePositions.length);
                for (let i = 0; i < noriCount; i++) {
                    const p = noriFramePositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'ryoushi' && i >= noriCount - 3;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawNoriFrame(ctx, p.x, p.y, p.seed, now);
                    if (isNew) ctx.restore();
                }

                // 商業エリアの活気オーバーレイ
                const bustleIntensity = Math.min(vR / 15, 1);

                // 商業要素
                const count = Math.min(vR * 2, fishMarketPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = fishMarketPositions[i];
                    const isNew = newObjectAnim && newObjectAnim.charType === 'ryoushi' && i >= count - 2;
                    if (isNew) { const b = calcBounce(now - newObjectAnim.startTime, ANIM_DURATION); ctx.save(); ctx.translate(p.x,p.y); ctx.scale(b,b); ctx.translate(-p.x,-p.y); }
                    drawCommerceElement(ctx, p.x, p.y, p.seed, i, now);
                    if (isNew) ctx.restore();
                }

                // 3票以上で大きな魚市場
                if (vR >= 3) {
                    drawFishMarketBuilding(ctx, fixedPos.fish_market.x, fixedPos.fish_market.y);
                }
                // 6票以上で商店街アーケード
                if (vR >= 6) {
                    drawShoppingArcade(ctx, fixedPos.shopping_arcade.x, fixedPos.shopping_arcade.y, now);
                }
                // 10票以上で港の大型施設
                if (vR >= 10) {
                    drawHarborFacility(ctx, fixedPos.harbor.x, fixedPos.harbor.y);
                }

                // 海面の跳ねる魚
                if (vR >= 2) {
                    const fishCount = Math.min(vR * 2, 20);
                    for (let i = 0; i < fishCount; i++) {
                        const fx = 100 + ((i * 173) % 1400);
                        const fy = MAP_H - 50 - ((i * 47) % 130);
                        const jumpPhase = Math.sin(now * 0.005 + i * 3.7);
                        if (jumpPhase > 0.3) {
                            const jumpH = (jumpPhase - 0.3) * 40;
                            ctx.save();
                            ctx.translate(fx, fy - jumpH);
                            ctx.rotate(-0.4 * jumpPhase);
                            ctx.fillStyle = ['#4169e1','#4682b4','#708090','#cd853f'][i % 4];
                            ctx.beginPath();
                            ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.moveTo(-8, 0);
                            ctx.lineTo(-13, -5);
                            ctx.lineTo(-13, 5);
                            ctx.closePath();
                            ctx.fill();
                            ctx.restore();
                            // Splash ring
                            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.ellipse(fx, fy + 2, 6 + jumpH * 0.2, 3, 0, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // ===== 大きなイチョウの木 =====
        function drawLargeGinkgo(ctx, x, y, seed, scale, now) {
            const rng = seededRandom(seed);
            const s = scale * 1.4;
            // 太い幹
            ctx.fillStyle = '#5a3e28';
            wobbleRect(ctx, x - 4 * s, y, 8 * s, 28 * s, seed);
            ctx.fill();
            ctx.strokeStyle = '#3d2915';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 大きなイチョウの樹冠（扇形・黄金色）
            for (let i = 0; i < 8; i++) {
                const lx = x + (rng() - 0.5) * 28 * s;
                const ly = y - 10 * s + (rng() - 0.5) * 20 * s;
                const r = (10 + rng() * 8) * s;
                const hue = 38 + rng() * 25;
                const light = 50 + rng() * 15;
                ctx.fillStyle = 'hsla(' + hue + ', 95%, ' + light + '%, 0.75)';
                ctx.beginPath();
                wobbleCircle(ctx, lx, ly, r, seed + i * 5);
                ctx.fill();
            }
            // 木漏れ日エフェクト
            ctx.fillStyle = 'rgba(255, 230, 100, 0.08)';
            ctx.beginPath();
            ctx.arc(x, y + 10, 30 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        // ===== 大きなツツジの花壇 =====
        function drawLargeAzalea(ctx, x, y, seed, scale) {
            const rng = seededRandom(seed);
            const s = scale * 1.3;
            // 緑の茂み（大きい）
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = 'rgba(' + (60 + rng() * 30) + ', ' + (120 + rng() * 40) + ', ' + (40 + rng() * 20) + ', 0.8)';
                ctx.beginPath();
                wobbleCircle(ctx, x + (rng() - 0.5) * 12 * s, y + (rng() - 0.5) * 8 * s, (12 + rng() * 6) * s, seed + i);
                ctx.fill();
            }
            // たくさんの花
            const colors = ['#ff1493', '#ff69b4', '#da70d6', '#e040fb', '#ff85c2', '#ff6eb4', '#c71585'];
            for (let i = 0; i < 12; i++) {
                const fx = x + (rng() - 0.5) * 24 * s;
                const fy = y + (rng() - 0.5) * 18 * s;
                const fr = (3 + rng() * 3) * s;
                ctx.fillStyle = colors[Math.floor(rng() * colors.length)];
                ctx.beginPath();
                // 花びら形
                for (let p = 0; p < 5; p++) {
                    const angle = (p / 5) * Math.PI * 2;
                    ctx.ellipse(fx + Math.cos(angle) * fr * 0.4, fy + Math.sin(angle) * fr * 0.4, fr * 0.5, fr * 0.3, angle, 0, Math.PI * 2);
                }
                ctx.fill();
                // 花の中心
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(fx, fy, fr * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ===== ビーチ施設 =====
        function drawBeachFacility(ctx, x, y, seed, index, now) {
            const type = index % 6;
            if (type === 0 || type === 3) {
                // 大きなビーチパラソル
                const color = ['#ff4444', '#ffaa00', '#44aaff', '#ff69b4', '#44dd44', '#aa44ff'][index % 6];
                ctx.fillStyle = '#6b4e3d';
                ctx.fillRect(x - 1, y, 3, 20);
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI, Math.PI + Math.PI / 4);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI + Math.PI / 2, Math.PI + Math.PI * 3 / 4);
                ctx.fill();
                // デッキチェア
                ctx.fillStyle = color;
                wobbleRect(ctx, x + 8, y + 8, 12, 5, seed);
                ctx.fill();
            } else if (type === 1) {
                // 砂の城（大きめ）
                ctx.fillStyle = '#f0d58c';
                wobbleRect(ctx, x - 12, y, 24, 16, seed);
                ctx.fill();
                ctx.fillStyle = '#e8c872';
                wobbleRect(ctx, x - 8, y - 12, 8, 14, seed + 1);
                ctx.fill();
                wobbleRect(ctx, x + 2, y - 8, 6, 10, seed + 2);
                ctx.fill();
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(x - 5, y - 18, 1, 8);
                ctx.fillRect(x - 4, y - 18, 6, 3);
            } else if (type === 2) {
                // ヤシの木（大）
                ctx.fillStyle = '#8b6e4e';
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(0.1);
                ctx.fillRect(-3, -30, 6, 35);
                ctx.restore();
                for (let l = 0; l < 6; l++) {
                    const angle = -Math.PI / 2 + (l - 2.5) * 0.5;
                    ctx.strokeStyle = '#228b22';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 28);
                    const cx = x + Math.cos(angle) * 20;
                    const cy = y - 28 + Math.sin(angle) * 20 - 5;
                    const ex = x + Math.cos(angle) * 30;
                    const ey = y - 28 + Math.sin(angle) * 30 + 3;
                    ctx.quadraticCurveTo(cx, cy, ex, ey);
                    ctx.stroke();
                }
                // ココナッツ
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(x + 2, y - 26, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 4) {
                // サーフボード
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(0.3);
                ctx.fillStyle = ['#ff6b6b', '#42a5f5', '#66bb6a', '#ffa726'][index % 4];
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.stroke();
                ctx.restore();
            } else {
                // ビーチハウス
                ctx.fillStyle = '#fff5e6';
                wobbleRect(ctx, x - 16, y - 8, 32, 22, seed);
                ctx.fill();
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#42a5f5';
                ctx.beginPath();
                ctx.moveTo(x - 18, y - 8);
                ctx.lineTo(x, y - 22);
                ctx.lineTo(x + 18, y - 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#87ceeb';
                wobbleRect(ctx, x - 6, y, 12, 10, seed + 3);
                ctx.fill();
            }
        }

        // ===== 灯台 =====
        function drawLighthouse(ctx, x, y, now) {
            // 本体
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(x - 12, y + 50);
            ctx.lineTo(x - 8, y);
            ctx.lineTo(x + 8, y);
            ctx.lineTo(x + 12, y + 50);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 赤ストライプ
            ctx.fillStyle = '#cc0000';
            ctx.fillRect(x - 10, y + 10, 20, 8);
            ctx.fillRect(x - 11, y + 28, 22, 8);
            ctx.fillRect(x - 11.5, y + 42, 23, 6);
            // ライト部分
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 6, y - 5, 12, 6);
            // ライトの光（回転）
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            // 光線
            const beamAngle = now * 0.002;
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(x, y - 8);
            ctx.lineTo(x + Math.cos(beamAngle) * 120, y - 8 + Math.sin(beamAngle) * 120);
            ctx.lineTo(x + Math.cos(beamAngle + 0.15) * 120, y - 8 + Math.sin(beamAngle + 0.15) * 120);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // ===== マリーナ =====
        function drawMarina(ctx, x, y, now) {
            // 桟橋
            ctx.fillStyle = '#8b6e4e';
            wobbleRect(ctx, x, y, 120, 8, 8888);
            ctx.fill();
            // 縦の桟橋
            for (let i = 0; i < 4; i++) {
                wobbleRect(ctx, x + 10 + i * 30, y, 6, 30, 8889 + i);
                ctx.fill();
            }
            // 停泊ヨット
            for (let i = 0; i < 3; i++) {
                const bx = x + 20 + i * 30;
                const by = y + 18;
                const bob = Math.sin(now * 0.002 + i * 1.5) * 2;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(bx - 8, by + bob);
                ctx.lineTo(bx - 5, by + 6 + bob);
                ctx.lineTo(bx + 5, by + 6 + bob);
                ctx.lineTo(bx + 8, by + bob);
                ctx.closePath();
                ctx.fill();
                // マスト
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(bx, by + bob);
                ctx.lineTo(bx, by - 14 + bob);
                ctx.stroke();
                // 帆
                ctx.fillStyle = ['#ff6b6b', '#42a5f5', '#ffa726'][i];
                ctx.beginPath();
                ctx.moveTo(bx, by - 12 + bob);
                ctx.lineTo(bx + 8, by - 2 + bob);
                ctx.lineTo(bx, by + bob);
                ctx.closePath();
                ctx.fill();
            }
        }

        // ===== 海洋生物 =====
        function drawMarineCreature(ctx, x, y, seed, index, now) {
            const type = index % 5;
            if (type === 0) {
                // 大きなイルカ（ジャンプ）
                const jumpPhase = Math.sin(now * 0.0015 + seed) * 0.5 + 0.5;
                const dy = -jumpPhase * 45;
                ctx.fillStyle = '#4682b4';
                ctx.save();
                ctx.translate(x, y + dy);
                ctx.rotate(-0.4 * jumpPhase);
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                // 背びれ
                ctx.beginPath();
                ctx.moveTo(-2, -6);
                ctx.lineTo(2, -14);
                ctx.lineTo(6, -6);
                ctx.fill();
                // 尾びれ
                ctx.beginPath();
                ctx.moveTo(-16, 0);
                ctx.lineTo(-24, -8);
                ctx.lineTo(-22, 2);
                ctx.fill();
                // お腹
                ctx.fillStyle = '#87ceeb';
                ctx.beginPath();
                ctx.ellipse(2, 3, 12, 4, 0, 0, Math.PI);
                ctx.fill();
                // 目
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(12, -2, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // 水しぶき
                if (jumpPhase > 0.2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    for (let s = 0; s < 6; s++) {
                        const sx = x + (s - 3) * 8;
                        const sy = y + 4 - Math.random() * 4;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 2 + Math.random() * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else if (type === 1) {
                // 大きなウミガメ
                const tx = x + Math.sin(now * 0.0008 + seed) * 25;
                const dir = Math.cos(now * 0.0008 + seed) > 0 ? 1 : -1;
                ctx.save();
                ctx.translate(tx, y);
                ctx.scale(dir, 1);
                // 甲羅
                ctx.fillStyle = '#2e8b57';
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                // 甲羅模様
                ctx.strokeStyle = '#1a6b3a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-6, -4);
                ctx.lineTo(6, 4);
                ctx.moveTo(6, -4);
                ctx.lineTo(-6, 4);
                ctx.moveTo(0, -8);
                ctx.lineTo(0, 8);
                ctx.stroke();
                // 頭
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.arc(14, -1, 5, 0, Math.PI * 2);
                ctx.fill();
                // ヒレ
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.ellipse(-4, -10, 8, 3, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-4, 10, 8, 3, 0.3, 0, Math.PI * 2);
                ctx.fill();
                // 目
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(16, -2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else if (type === 2) {
                // ヒトデ（大きめ、カラフル）
                const colors = ['#ff6347', '#ff4500', '#ffa500', '#ff69b4', '#9370db'];
                ctx.fillStyle = colors[index % 5];
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(seed * 0.01);
                for (let a = 0; a < 5; a++) {
                    const angle = (a / 5) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle - 0.2) * 4, Math.sin(angle - 0.2) * 4);
                    ctx.lineTo(Math.cos(angle) * 10, Math.sin(angle) * 10);
                    ctx.lineTo(Math.cos(angle + 0.2) * 4, Math.sin(angle + 0.2) * 4);
                    ctx.fill();
                }
                // Dots on starfish
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                for (let d = 0; d < 5; d++) {
                    const da = (d / 5) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.arc(Math.cos(da) * 5, Math.sin(da) * 5, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            } else if (type === 3) {
                // クラゲ（ふわふわアニメーション）
                const bob = Math.sin(now * 0.002 + seed) * 10;
                const pulse = Math.sin(now * 0.004 + seed) * 0.15 + 1;
                ctx.save();
                ctx.translate(x, y + bob);
                // 傘
                ctx.fillStyle = 'rgba(180, 130, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, 10 * pulse, Math.PI, 0);
                ctx.fill();
                // 触手
                ctx.strokeStyle = 'rgba(180, 130, 255, 0.4)';
                ctx.lineWidth = 1;
                for (let t = 0; t < 5; t++) {
                    ctx.beginPath();
                    const tx2 = -6 + t * 3;
                    ctx.moveTo(tx2, 2);
                    ctx.quadraticCurveTo(tx2 + Math.sin(now * 0.003 + t) * 4, 12, tx2, 20);
                    ctx.stroke();
                }
                ctx.restore();
            } else {
                // 熱帯魚の群れ
                for (let f = 0; f < 4; f++) {
                    const fx = x + Math.sin(now * 0.001 + seed + f * 1.5) * 20 + f * 8;
                    const fy = y + Math.cos(now * 0.0015 + seed + f) * 5;
                    const colors = ['#ff6347', '#ffd700', '#00ced1', '#ff69b4'];
                    ctx.fillStyle = colors[f % 4];
                    ctx.beginPath();
                    ctx.ellipse(fx, fy, 5, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Tail
                    ctx.beginPath();
                    ctx.moveTo(fx - 5, fy);
                    ctx.lineTo(fx - 9, fy - 3);
                    ctx.lineTo(fx - 9, fy + 3);
                    ctx.closePath();
                    ctx.fill();
                    // Stripe
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(fx - 1, fy - 3, 2, 6);
                }
            }
        }

        // ===== クジラ =====
        function drawWhale(ctx, x, y, now) {
            const bob = Math.sin(now * 0.001) * 5;
            const breathPhase = Math.sin(now * 0.0005);
            ctx.save();
            ctx.translate(x, y + bob);
            // 体
            ctx.fillStyle = '#2c3e6b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 40, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            // お腹
            ctx.fillStyle = '#7b9cc4';
            ctx.beginPath();
            ctx.ellipse(5, 6, 28, 10, 0, 0, Math.PI);
            ctx.fill();
            // 尾
            ctx.fillStyle = '#2c3e6b';
            ctx.beginPath();
            ctx.moveTo(-38, 0);
            ctx.quadraticCurveTo(-50, -15, -55, -20);
            ctx.quadraticCurveTo(-45, -5, -38, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-38, 0);
            ctx.quadraticCurveTo(-50, 15, -55, 20);
            ctx.quadraticCurveTo(-45, 5, -38, 0);
            ctx.fill();
            // 目
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(28, -4, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(29, -4, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // 潮吹き
            if (breathPhase > 0.3) {
                const sprayH = (breathPhase - 0.3) * 60;
                ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + 15, y + bob - 16);
                ctx.quadraticCurveTo(x + 12, y + bob - 16 - sprayH * 0.7, x + 5, y + bob - 16 - sprayH);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 15, y + bob - 16);
                ctx.quadraticCurveTo(x + 18, y + bob - 16 - sprayH * 0.7, x + 25, y + bob - 16 - sprayH);
                ctx.stroke();
                // 水滴
                ctx.fillStyle = 'rgba(150, 200, 255, 0.4)';
                for (let d = 0; d < 5; d++) {
                    ctx.beginPath();
                    ctx.arc(x + 10 + (d - 2) * 6, y + bob - 16 - sprayH + d * 4, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ===== サンゴ礁 =====
        function drawCoralReef(ctx, now) {
            const coralData = [
                { x: fixedPos.coral_1.x, y: fixedPos.coral_1.y, color: '#ff6b6b', h: 20 },
                { x: fixedPos.coral_2.x, y: fixedPos.coral_2.y, color: '#ff69b4', h: 18 },
                { x: fixedPos.coral_3.x, y: fixedPos.coral_3.y, color: '#ffa500', h: 22 },
                { x: fixedPos.coral_4.x, y: fixedPos.coral_4.y, color: '#da70d6', h: 16 },
                { x: fixedPos.coral_5.x, y: fixedPos.coral_5.y, color: '#ff6347', h: 20 },
                { x: fixedPos.coral_6.x, y: fixedPos.coral_6.y, color: '#e040fb', h: 18 },
                { x: fixedPos.coral_7.x, y: fixedPos.coral_7.y, color: '#ff4500', h: 15 },
            ];
            coralData.forEach(function(c, i) {
                // サンゴの枝
                ctx.fillStyle = c.color;
                for (let b = 0; b < 4; b++) {
                    const bx = c.x - 8 + b * 6;
                    const bh = c.h * (0.6 + Math.sin(b * 2 + i) * 0.3);
                    ctx.beginPath();
                    ctx.moveTo(bx, c.y);
                    ctx.quadraticCurveTo(bx - 3, c.y - bh * 0.6, bx - 2, c.y - bh);
                    ctx.quadraticCurveTo(bx, c.y - bh - 3, bx + 2, c.y - bh);
                    ctx.quadraticCurveTo(bx + 3, c.y - bh * 0.6, bx, c.y);
                    ctx.fill();
                }
                // 気泡
                const bubblePhase = (now * 0.002 + i * 3) % 30;
                if (bubblePhase < 20) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(c.x + 2, c.y - c.h - bubblePhase, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // ===== 屋形船 =====
        function drawYakatabune(ctx, baseX, baseY, seed, index, now) {
            const speed = 0.00025 + (seed % 10) * 0.00004;
            const x = baseX + Math.sin(now * speed + index * 2.5) * 150;
            const y = baseY + Math.cos(now * speed * 0.4 + index) * 8;
            const bob = Math.sin(now * 0.003 + seed) * 2;
            const dir = Math.cos(now * speed + index * 2.5) > 0 ? 1 : -1;

            ctx.save();
            ctx.translate(x, y + bob);
            ctx.scale(dir, 1);

            // 船体（大きめ）
            ctx.fillStyle = '#5a3320';
            ctx.beginPath();
            ctx.moveTo(-28, 0);
            ctx.lineTo(-22, 12);
            ctx.lineTo(22, 12);
            ctx.lineTo(28, 0);
            ctx.closePath();
            ctx.fill();

            // 甲板
            ctx.fillStyle = '#c4956a';
            ctx.fillRect(-22, -3, 44, 5);

            // 屋根
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(-20, -16);
            ctx.lineTo(-22, -6);
            ctx.lineTo(22, -6);
            ctx.lineTo(20, -16);
            ctx.closePath();
            ctx.fill();
            // 屋根の反り
            ctx.beginPath();
            ctx.moveTo(-22, -16);
            ctx.quadraticCurveTo(-15, -20, -20, -16);
            ctx.fill();

            // 柱
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(-18, -16, 2, 12);
            ctx.fillRect(16, -16, 2, 12);

            // 提灯（大きめ、光あり）
            let lanternGlow = 0.6 + Math.sin(now * 0.005 + seed) * 0.2;
            ctx.fillStyle = 'rgba(255, 60, 0, ' + lanternGlow + ')';
            ctx.beginPath();
            ctx.ellipse(-14, -19, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(14, -19, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // 光のグロー
            ctx.fillStyle = 'rgba(255, 100, 0, 0.1)';
            ctx.beginPath();
            ctx.arc(-14, -19, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(14, -19, 18, 0, Math.PI * 2);
            ctx.fill();

            // 客人（シルエット）
            ctx.fillStyle = '#333';
            for (let p = 0; p < 5; p++) {
                ctx.beginPath();
                ctx.arc(-12 + p * 6, -8, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-13 + p * 6, -6, 3, 3);
            }

            ctx.restore();

            // 航跡
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1.5;
            for (let w = 0; w < 3; w++) {
                ctx.beginPath();
                let wakeX = x - dir * 30 - dir * w * 10;
                ctx.moveTo(wakeX, y + 10 + bob);
                ctx.quadraticCurveTo(wakeX - dir * 15, y + 8 + w * 3 + bob, wakeX - dir * 30, y + 12 + w * 5 + bob);
                ctx.stroke();
            }
        }

        // ===== 花火 =====
        function drawFireworks(ctx, now) {
            let fwData = [
                { x: fixedPos.firework_1.x, y: fixedPos.firework_1.y, period: 4000, offset: 0 },
                { x: fixedPos.firework_2.x, y: fixedPos.firework_2.y, period: 5000, offset: 1500 },
                { x: fixedPos.firework_3.x, y: fixedPos.firework_3.y, period: 4500, offset: 3000 },
            ];
            fwData.forEach(function(fw) {
                let phase = ((now + fw.offset) % fw.period) / fw.period;
                if (phase < 0.6) {
                    let expand = phase / 0.6;
                    let alpha = 1 - expand * 0.8;
                    let radius = expand * 60;
                    let colors = ['#ff4444', '#ffd700', '#ff69b4', '#44ff44', '#44aaff', '#ff8c00'];
                    for (let r = 0; r < 12; r++) {
                        let angle = (r / 12) * Math.PI * 2;
                        let sparkX = fw.x + Math.cos(angle) * radius;
                        let sparkY = fw.y + Math.sin(angle) * radius;
                        ctx.fillStyle = colors[r % colors.length];
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(sparkX, sparkY, 3 - expand * 2, 0, Math.PI * 2);
                        ctx.fill();
                        // Trail
                        ctx.strokeStyle = colors[r % colors.length];
                        ctx.lineWidth = 1;
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(fw.x, fw.y);
                        ctx.lineTo(sparkX, sparkY);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }
            });
        }

        // ===== 商業要素 =====
        function drawCommerceElement(ctx, x, y, seed, index, now) {
            let type = index % 5;
            if (type === 0) {
                // 魚の屋台
                ctx.fillStyle = '#a0522d';
                wobbleRect(ctx, x - 18, y - 6, 36, 20, seed);
                ctx.fill();
                ctx.strokeStyle = '#6b3a1f';
                ctx.lineWidth = 1;
                ctx.stroke();
                // のれん（赤白）
                ctx.fillStyle = '#cc0000';
                for (let n = 0; n < 4; n++) {
                    ctx.fillRect(x - 15 + n * 9, y - 6, 7, 8);
                }
                // 魚の陳列
                let fishColors = ['#c0c0c0', '#87ceeb', '#ffa07a'];
                for (let f = 0; f < 4; f++) {
                    ctx.fillStyle = fishColors[f % 3];
                    ctx.beginPath();
                    ctx.ellipse(x - 10 + f * 7, y + 6, 5, 2.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (type === 1) {
                // アサリの山
                ctx.fillStyle = '#d2b48c';
                ctx.beginPath();
                ctx.moveTo(x - 14, y + 8);
                ctx.quadraticCurveTo(x, y - 8, x + 14, y + 8);
                ctx.closePath();
                ctx.fill();
                // アサリの模様
                ctx.strokeStyle = '#b8996e';
                ctx.lineWidth = 0.5;
                for (let a = 0; a < 8; a++) {
                    let ax = x - 8 + (a % 4) * 5;
                    let ay = y + (a < 4 ? 0 : -4);
                    ctx.beginPath();
                    ctx.arc(ax, ay, 3, 0, Math.PI, true);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(ax, ay, 3, 0, Math.PI);
                    ctx.stroke();
                }
                // ラベル
                ctx.font = 'bold 7px sans-serif';
                ctx.fillStyle = '#333';
                ctx.textAlign = 'center';
                ctx.fillText('浦安あさり', x, y + 16);
            } else if (type === 2) {
                // 干物
                ctx.fillStyle = '#6b4e3d';
                ctx.fillRect(x - 12, y - 14, 2, 20);
                ctx.fillRect(x + 10, y - 14, 2, 20);
                // 竿
                ctx.strokeStyle = '#8b6e4e';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x - 11, y - 12);
                ctx.lineTo(x + 11, y - 12);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x - 11, y - 6);
                ctx.lineTo(x + 11, y - 6);
                ctx.stroke();
                // 干物
                ctx.fillStyle = '#daa520';
                for (let h = 0; h < 4; h++) {
                    ctx.beginPath();
                    ctx.ellipse(x - 6 + h * 4, y - 10, 2, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (type === 3) {
                // 寿司屋台
                ctx.fillStyle = '#f5f5dc';
                wobbleRect(ctx, x - 16, y - 4, 32, 18, seed);
                ctx.fill();
                ctx.strokeStyle = '#8b7355';
                ctx.lineWidth = 1;
                ctx.stroke();
                // 暖簾
                ctx.fillStyle = '#1a3a5c';
                ctx.fillRect(x - 14, y - 4, 10, 7);
                ctx.fillRect(x + 4, y - 4, 10, 7);
                // 寿司
                let sushiColors = ['#ff6b6b', '#ffa07a', '#ff4500', '#e8e800'];
                for (let s = 0; s < 4; s++) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x - 10 + s * 6, y + 6, 5, 3);
                    ctx.fillStyle = sushiColors[s];
                    ctx.fillRect(x - 10 + s * 6, y + 4, 5, 3);
                }
                ctx.font = 'bold 6px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('鮨', x, y + 2);
            } else {
                // 煙を出す焼き場
                ctx.fillStyle = '#8b4513';
                wobbleRect(ctx, x - 14, y, 28, 12, seed);
                ctx.fill();
                // 炭火
                ctx.fillStyle = '#ff4500';
                ctx.fillRect(x - 10, y + 2, 20, 4);
                // 煙（アニメーション）
                ctx.fillStyle = 'rgba(180, 180, 180, 0.25)';
                for (let sm = 0; sm < 4; sm++) {
                    let smokeY = y - 5 - ((now * 0.02 + sm * 15) % 40);
                    let smokeX = x + Math.sin(now * 0.002 + sm) * 5;
                    let smokeR = 4 + ((now * 0.02 + sm * 15) % 40) * 0.15;
                    ctx.beginPath();
                    ctx.arc(smokeX, smokeY, smokeR, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.font = 'bold 6px sans-serif';
                ctx.fillStyle = '#333';
                ctx.textAlign = 'center';
                ctx.fillText('浜焼き', x, y + 18);
            }
        }

        // ===== あさり（貝） =====
        function drawAsariClam(ctx, x, y, seed, now) {
            const rng = (n) => ((seed * 9301 + n * 49297) % 233280) / 233280;
            const size = 8 + rng(1) * 6; // 8〜14px
            const wobble = Math.sin(now * 0.001 + seed * 2.3) * 1.5; // 波でゆらゆら

            ctx.save();
            ctx.translate(x, y + wobble);

            // 貝殻（2枚）
            const colors = ['#d4a96a', '#c8956a', '#bfa090', '#e8c88a'];
            const shellColor = colors[seed % colors.length];
            ctx.fillStyle = shellColor;

            // 右殻
            ctx.beginPath();
            ctx.ellipse(size * 0.4, 0, size * 0.55, size * 0.38, 0.2, 0, Math.PI * 2);
            ctx.fill();
            // 左殻
            ctx.beginPath();
            ctx.ellipse(-size * 0.4, 0, size * 0.55, size * 0.38, -0.2, 0, Math.PI * 2);
            ctx.fill();

            // 貝殻の模様（縦筋）
            ctx.strokeStyle = 'rgba(100,60,20,0.35)';
            ctx.lineWidth = 0.8;
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(size * 0.4 + i * size * 0.12, -size * 0.28);
                ctx.quadraticCurveTo(size * 0.4 + i * size * 0.08, 0, size * 0.4 + i * size * 0.12, size * 0.28);
                ctx.stroke();
            }

            // つなぎ目（丁番部分）
            ctx.fillStyle = '#8b6040';
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.15, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // ===== のり養殖フレーム =====
        function drawNoriFrame(ctx, x, y, seed, now) {
            const rng = (n) => ((seed * 9301 + n * 49297) % 233280) / 233280;
            const w = 28 + rng(1) * 14; // 幅28〜42px
            const h = 18 + rng(2) * 8;  // 高さ18〜26px
            const sway = Math.sin(now * 0.0008 + seed * 1.7) * 1.5; // 水流でゆれる

            ctx.save();
            ctx.translate(x, y + sway);

            // のりシート（黒緑）
            const noriAlpha = 0.65 + Math.sin(now * 0.0012 + seed) * 0.1;
            ctx.fillStyle = `rgba(20, 50, 20, ${noriAlpha})`;
            ctx.fillRect(-w / 2, -h / 2, w, h);

            // のりの光沢（濡れた感じ）
            ctx.fillStyle = 'rgba(60, 120, 60, 0.25)';
            ctx.fillRect(-w / 2 + 2, -h / 2 + 2, w * 0.4, h * 0.35);

            // 格子模様
            ctx.strokeStyle = 'rgba(0, 30, 0, 0.5)';
            ctx.lineWidth = 0.6;
            const cols = Math.floor(w / 7);
            const rows = Math.floor(h / 6);
            for (let c = 1; c < cols; c++) {
                ctx.beginPath();
                ctx.moveTo(-w / 2 + c * (w / cols), -h / 2);
                ctx.lineTo(-w / 2 + c * (w / cols), h / 2);
                ctx.stroke();
            }
            for (let r = 1; r < rows; r++) {
                ctx.beginPath();
                ctx.moveTo(-w / 2, -h / 2 + r * (h / rows));
                ctx.lineTo(w / 2, -h / 2 + r * (h / rows));
                ctx.stroke();
            }

            // 支柱（木の棒）
            ctx.strokeStyle = '#8b5e2e';
            ctx.lineWidth = 2.5;
            const poleCount = 3;
            for (let p = 0; p < poleCount; p++) {
                const px = -w / 2 + (p / (poleCount - 1)) * w;
                ctx.beginPath();
                ctx.moveTo(px, -h / 2 - 6);
                ctx.lineTo(px, h / 2 + 4);
                ctx.stroke();
                // 棒の先端
                ctx.fillStyle = '#6b4020';
                ctx.beginPath();

        // (duplicate drawBuilding removed - using version at line ~1512 with ctx parameter)

        function drawCharacter(char) {
            const img = charImages[char.type];
            if (!img || !img.complete) return;

            // キャラサイズ（票数で変化しない固定サイズ）
            const voteBonus = votes[char.type] || 0;
            const baseSize = (charMetadata[char.type]?.baseSize || 160) * 1.3;
            const size = baseSize;
            const aspect = img.naturalWidth / img.naturalHeight;
            const w = size * aspect;
            const h = size;

            // Shadow
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(char.x, char.y + h / 2 + 5, w / 2.5, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Glow effect for popular characters
            if (voteBonus > 0) {
                ctx.save();
                ctx.shadowColor = charMetadata[char.type]?.color || '#ffd700';
                ctx.shadowBlur = 5 + voteBonus * 2;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // Bobbing animation when walking, interacting (mikoshi), or celebration
            let bob = char.state === 'walking' ? Math.sin(Date.now() * 0.008) * 2 : 0;
            if (char.interacting && char.interactionTimer > 0) {
                // Mikoshi bounce animation during interaction
                bob = -Math.abs(Math.sin((4000 - char.interactionTimer) / 500 * Math.PI)) * 8;
            }

            // お祝いアニメーション: ピョンピョン跳ねてキラキラ降り注ぐ
            if (char.celebrating && char.celebrateTimer > 0) {
                const timeElapsed = 30000 - char.celebrateTimer;

                // ピョンピョン跳ねる（5秒間ずっと）
                const jumpSpeed = 8; // 跳ねる速度
                const jumpHeight = 40 + Math.sin(timeElapsed * 0.002) * 15; // 高さに変化
                bob = -Math.abs(Math.sin(timeElapsed * 0.001 * jumpSpeed)) * jumpHeight;

                // 金色のオーラ
                const glowIntensity = 20 + Math.sin(timeElapsed * 0.005) * 15;
                ctx.shadowColor = charMetadata[char.type]?.color || '#FFD700';
                ctx.shadowBlur = glowIntensity;

                // キラキラパーティクルを大量に降らせる
                const particleColor = charMetadata[char.type]?.particleColor || '#FFD700';

                // 常にキラキラを生成（確率を高く）
                if (Math.random() < 0.6) {
                    // 上から降ってくるキラキラ
                    particles.push({
                        x: char.x + (Math.random() - 0.5) * 120,
                        y: char.y - 80 - Math.random() * 60,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: 0.5 + Math.random() * 1.5,
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.2,
                        size: 2 + Math.random() * 5,
                        alpha: 1,
                        color: Math.random() < 0.5 ? particleColor : (Math.random() < 0.5 ? '#FFD700' : '#FFFFFF'),
                        type: 'confetti',
                        life: 60 + Math.random() * 40
                    });
                }
                // 星型キラキラ（まばらに）
                if (Math.random() < 0.15) {
                    particles.push({
                        x: char.x + (Math.random() - 0.5) * 100,
                        y: char.y - 40 - Math.random() * 80,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: -0.3 + Math.random() * 0.5,
                        rotation: 0,
                        rotSpeed: 0.05,
                        size: 6 + Math.random() * 6,
                        alpha: 1,
                        color: '#FFFFFF',
                        type: 'star',
                        life: 40 + Math.random() * 30
                    });
                }

                // フェードアウト（最後の2秒）
                if (timeElapsed > 28000) {
                    const fade = (30000 - timeElapsed) / 2000;
                    ctx.shadowBlur = glowIntensity * fade;
                    bob *= fade;
                }
            }

            // Scale pulse effect（投票時の一時的な拡大演出）
            let scaleFactor = 1;
            if (char.scalePulse && char.scalePulseTimer > 0) {
                const pulsePhase = 1 - (char.scalePulseTimer / 1000);
                scaleFactor = 1 + 0.5 * (1 - Math.pow(pulsePhase, 2));
            }
            const scaledW = w * scaleFactor;
            const scaledH = h * scaleFactor;

            // Draw character image (with drag wiggle animation)
            if (draggedChar === char) {
                // ゆらゆらぶんぶんアニメーション：掴まれた点を起点に振り子運動
                const t = Date.now() * 0.001;
                // 複数の周波数を組み合わせて「いやいや」感を出す
                const swing = Math.sin(t * 8) * 15 + Math.sin(t * 12.7) * 8 + Math.sin(t * 5.3) * 5;
                const angleRad = swing * Math.PI / 180;
                // 少し上下にもバウンス
                const bounceY = Math.abs(Math.sin(t * 6)) * 5;

                ctx.save();
                // 掴んだ点（キャラの上端）を起点に回転
                ctx.translate(char.x, char.y - scaledH / 2 + bob - 10);
                ctx.rotate(angleRad);
                ctx.drawImage(img, -scaledW / 2, bounceY, scaledW, scaledH);
                ctx.restore();
            } else {
                ctx.drawImage(img, char.x - scaledW / 2, char.y - scaledH / 2 + bob - 10, scaledW, scaledH);
            }

            if (voteBonus > 0) {
                ctx.restore();
            }

            // Name label
            ctx.font = 'bold 20px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth = 4;
            ctx.strokeText(char.name, char.x, char.y + h / 2 + 18);
            ctx.fillText(char.name, char.x, char.y + h / 2 + 18);

            // Thought bubble when idle
            // Thought bubbles disabled (too noisy)
            if (false && char.state === 'idle' && char.currentThought) {
                drawThoughtBubble(ctx, char.x, char.y - h / 2 - 45, char.currentThought);
            }
        }

        function drawThoughtBubble(ctx, x, y, text) {
            // CHANGE 5: Improved thought bubble with proper text measurement
            ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Set font first to measure correctly
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Measure text width
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;

            // Calculate bubble dimensions (generous padding)
            let bubbleW = Math.max(140, Math.min(260, textWidth + 30));
            const bubbleH = 48;
            const radius = 12;

            // Bubble background - fully opaque white with shadow
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.fill();
            ctx.restore();

            // Border
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.stroke();

            // Tail (pointing down to character)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(x - 8, y + bubbleH / 2 - 3);
            ctx.lineTo(x, y + bubbleH / 2 + 14);
            ctx.lineTo(x + 8, y + bubbleH / 2 - 3);
            ctx.fill();

            // Text - display full text at once, larger font
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#222';
            ctx.fillText(text, x, y + 6);
        }

        function drawParticles() {
            // Hard limit on particles to prevent memory issues
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }

            particles = particles.filter(p => {
                if (p.type === 'confetti' || p.type === 'star') {
                    return p.life > 0;
                } else {
                    return p.y < MAP_H;
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;

                ctx.save();

                if (p.type === 'star') {
                    // 星型キラキラ
                    p.life--;
                    p.alpha = p.life / 70;
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        const r = p.size;
                        if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                        else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // キラッと光る
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                } else if (p.type === 'confetti') {
                    p.vy += 0.05; // gravity
                    p.life--;
                    ctx.globalAlpha = p.alpha * (p.life / 120);
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                } else {
                    ctx.globalAlpha = p.alpha * (1 - p.y / MAP_H);
                    ctx.fillStyle = '#ffb6c1';
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });
        }

        function updateCharacters(deltaTime) {
            characters.forEach(char => {
                // Skip AI movement if being dragged by user
                if (draggedChar === char) return;

                // Handle celebration
                if (char.celebrating && char.celebrateTimer > 0) {
                    char.celebrateTimer -= deltaTime;
                    if (char.celebrateTimer <= 0) {
                        char.celebrating = false;
                    }
                }

                // CHANGE 4: Handle scale pulse
                if (char.scalePulse && char.scalePulseTimer > 0) {
                    char.scalePulseTimer -= deltaTime;
                    if (char.scalePulseTimer <= 0) {
                        char.scalePulse = false;
                    }
                }

                char.stateTimer += deltaTime;

                // Decide to move or idle
                if (char.state === 'idle') {
                    if (char.stateTimer > 3000 + Math.random() * 3000) {
                        // Pick next waypoint from character's route
                        const route = characterRoutes[char.type];
                        if (route) {
                            const year = getCurrentYear();
                            let nextIdx = ((char.routeIndex || 0) + 1) % route.length;
                            // minYear未満のウェイポイントをスキップ（陸地がまだ海の場合）
                            let attempts = 0;
                            while (route[nextIdx].minYear && route[nextIdx].minYear > year && attempts < route.length) {
                                nextIdx = (nextIdx + 1) % route.length;
                                attempts++;
                            }
                            char.routeIndex = nextIdx;
                            const waypoint = route[char.routeIndex];
                            char.targetX = waypoint.x;
                            char.targetY = waypoint.y;
                            char.state = 'walking';
                            char.stateTimer = 0;
                            char.currentThought = null; // Clear thought when starting to walk
                            char.locationDialogueShown = false;
                        }
                    } else if (!char.currentThought && char.stateTimer > 5000 && !char.locationDialogueShown) {
                        // Show random thought after location dialogue expires (stays for full idle period)
                        char.currentThought = char.thoughts[Math.floor(Math.random() * char.thoughts.length)];
                    }
                } else if (char.state === 'walking') {
                    const dx = char.targetX - char.x;
                    const dy = char.targetY - char.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 15) {
                        char.state = 'idle';
                        char.stateTimer = 0;
                        char.x = char.targetX;
                        char.y = char.targetY;

                        // Set location-specific dialogue when arriving at named waypoint
                        const route = characterRoutes[char.type];
                        if (route) {
                            const waypoint = route[char.routeIndex || 0];
                            if (waypoint && waypoint.name && locationDialogues[waypoint.name]) {
                                const dialogues = locationDialogues[waypoint.name];
                                char.currentThought = dialogues[char.type] || dialogues._default || null;
                                char.locationDialogueShown = true;
                            }
                        }
                    } else {
                        const speed = char.speed;
                        char.x += (dx / dist) * speed;
                        char.y += (dy / dist) * speed;
                        // 海キャラはパネル左端まで移動可、陸キャラはパネル右側に制限
                        const terrain = charTerrain[char.type];
                        const minX = (terrain === 'sea') ? 350 : 620;
                        char.x = Math.max(minX, Math.min(MAP_W - 50, char.x));
                        char.y = Math.max(80, Math.min(MAP_H - 50, char.y));
                    }
                }
            });
        }

        // ========== ERA-BASED LAND POLYGONS (kept for reference) ==========
        // Pre-computed sorted era years (avoid sorting every frame)

        // Animation loop
        let lastTime = Date.now();
        function animate() {
          try {
            const now = Date.now();
            const deltaTime = now - lastTime;
            lastTime = now;

            // Update
            updateCharacters(deltaTime);


            // V5 Features: Character interactions
            checkCharacterInteractions(characters);

            // V5 Features: Day/Night cycle
            updateDayNightCycle();

            // V5 Features: Fireflies update
            if (ambientPhase > 0.75) {
                updateFireflies();
            }
            // カメラ基本値
            camera.zoomX = camera.baseZoomX;
            camera.zoomY = camera.baseZoomY;

            // ズームアニメーション更新
            updateCameraAnimation(deltaTime);

            // Clear canvas with sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#c8e6f5');
            gradient.addColorStop(1, '#e0f6ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // V5 Features: Draw clouds on sky
            updateAndDrawClouds(now);

            // カメラ変換（ズームアニメーション対応）
            ctx.save();
            const easedT = easeInOutCubic(camera.animProgress);
            const zMul = 1 + (camera.targetZoom - 1) * easedT;
            const camTx = (W / 2 - camera.focusX * camera.baseZoomX * zMul) * easedT;
            const camTy = (H / 2 - camera.focusY * camera.baseZoomY * zMul) * easedT;
            ctx.translate(camTx, camTy);
            ctx.scale(camera.baseZoomX * zMul, camera.baseZoomY * zMul);

            // Draw map based on current year
            const currentYear = getCurrentYear();
            // Always draw real map image (MAP_2009-)
            if (mapImage && mapImage.complete) {
                ctx.drawImage(mapImage, 0, 0, MAP_W, MAP_H);
            }
            // Sea overlay images for reclamation stages
            if (currentYear < 1969 && seaStage1.complete) {
                ctx.drawImage(seaStage1, 0, 0, MAP_W, MAP_H);
            } else if (currentYear < 1979 && seaStage2.complete) {
                ctx.drawImage(seaStage2, 0, 0, MAP_W, MAP_H);
            } else if (currentYear < 1989 && seaStage3.complete) {
                ctx.drawImage(seaStage3, 0, 0, MAP_W, MAP_H);
            }
            // 1989年以降: オーバーレイなし（フルマップ表示）

            // For future years (after 2026), draw easter egg elements on top of map
            if (currentYear >= 2049) {
                // 浦葛大橋（橋本体）
                // 橋の幅をstart/endの両端から上下に広げて描画
                const bsx = fixedPos.kasai_bridge_start.x, bsy = fixedPos.kasai_bridge_start.y;
                const bex = fixedPos.kasai_bridge_end.x,   bey = fixedPos.kasai_bridge_end.y;
                // 橋の法線方向（垂直方向）を計算
                const bdx = bex - bsx, bdy = bey - bsy;
                const blen = Math.hypot(bdx, bdy);
                const bnx = -bdy / blen, bny = bdx / blen; // 法線
                const halfW = 18; // 橋の半幅（px）
                // 橋の塗り（道路部分）
                ctx.beginPath();
                ctx.moveTo(bsx + bnx * halfW, bsy + bny * halfW);
                ctx.lineTo(bex + bnx * halfW, bey + bny * halfW);
                ctx.lineTo(bex - bnx * halfW, bey - bny * halfW);
                ctx.lineTo(bsx - bnx * halfW, bsy - bny * halfW);
                ctx.closePath();
                ctx.fillStyle = 'rgba(230, 81, 0, 0.35)';
                ctx.fill();
                // 橋の輪郭線（両端）
                ctx.strokeStyle = '#E65100';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 5]);
                ctx.beginPath();
                ctx.moveTo(bsx + bnx * halfW, bsy + bny * halfW);
                ctx.lineTo(bex + bnx * halfW, bey + bny * halfW);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(bsx - bnx * halfW, bsy - bny * halfW);
                ctx.lineTo(bex - bnx * halfW, bey - bny * halfW);
                ctx.stroke();
                ctx.setLineDash([]);
                // 橋名ラベル
                ctx.font = 'bold 18px sans-serif';
                ctx.fillStyle = '#E65100';
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 4;
                ctx.textAlign = 'center';
                ctx.strokeText('浦葛大橋', fixedPos.kasai_bridge.x, fixedPos.kasai_bridge.y - 6);
                ctx.fillText('浦葛大橋', fixedPos.kasai_bridge.x, fixedPos.kasai_bridge.y - 6);
            }
            if (currentYear >= 2069) {
                // Ropeway
                ctx.strokeStyle = '#9C27B0';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();

            if (nextEl) {
                const eventYears = Object.keys(historicalEvents).map(Number).sort((a, b) => a - b);
                const nextEvent = eventYears.find(y => y > year);
                if (nextEvent) {
                    const votesNeeded = Math.ceil((nextEvent - START_YEAR) / YEARS_PER_VOTE) - getEffectiveVotes();
                    const ev = historicalEvents[nextEvent];
                    nextEl.textContent = `あと${votesNeeded}票で「${ev.text.split('—')[0].split('！')[0]}」${ev.emoji}`;

            if (typeof checkBuildingUnlock === 'function') {
                const decoTotal = Object.values(decorationOffset || {}).reduce((a, b) => a + b, 0);

                setTimeout(() => playEventQueue(), 500);

        function showCutinAnimation(charType) {
            const charName = charMetadata[charType]?.name || '';
            const charColor = charMetadata[charType]?.color || '#ffd700';
            const charImg = charImages[charType];

            // Create full-screen overlay
            const overlay = document.createElement('div');
            overlay.id = 'cutinOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9000;overflow:visible;pointer-events:none;';

            // Step 1: White flash (0-0.15s)
            const flash = document.createElement('div');
            flash.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:white;opacity:0;animation:cutinFlash 0.3s ease;z-index:1;';
            overlay.appendChild(flash);

            // Step 2: Concentration lines background (radial lines)
            const linesCanvas = document.createElement('canvas');
            linesCanvas.width = window.innerWidth;
            linesCanvas.height = window.innerHeight;
            linesCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;opacity:0;animation:cutinFadeIn 0.3s 0.1s forwards;';
            const lctx = linesCanvas.getContext('2d');
            // Draw radial concentration lines
            const cx = linesCanvas.width / 2, cy = linesCanvas.height / 2;
            lctx.fillStyle = 'rgba(0,0,0,0.85)';
            lctx.fillRect(0, 0, linesCanvas.width, linesCanvas.height);
            // Cut out radial wedges to create speed lines effect
            lctx.globalCompositeOperation = 'destination-out';
            for (let i = 0; i < 36; i++) {
                const angle = (i / 36) * Math.PI * 2;
                const nextAngle = angle + (Math.PI / 60); // thin wedge
                lctx.beginPath();
                lctx.moveTo(cx, cy);
                lctx.arc(cx, cy, Math.max(linesCanvas.width, linesCanvas.height), angle, nextAngle);
                lctx.closePath();
                lctx.fill();
            }
            lctx.globalCompositeOperation = 'source-over';
            overlay.appendChild(linesCanvas);

            // Step 3: Diagonal slash line
            const slash = document.createElement('div');
            slash.style.cssText = `position:absolute;top:0;left:-50%;width:200%;height:8px;background:${charColor};z-index:3;transform:rotate(-30deg);transform-origin:center;top:45%;animation:cutinSlash 0.3s 0.15s both;box-shadow:0 0 30px ${charColor},0 0 60px ${charColor};`;

            // Step 4: Character image (huge, enters from right)

                overlay.appendChild(img);

            // CHANGE 6: Creative 4-character idiom with ruby text

            const textDiv = document.createElement('div');
            textDiv.style.cssText = `position:absolute;left:5%;top:20%;z-index:5;transform:rotate(-8deg);opacity:0;animation:cutinTextPop 0.4s 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;`;
            textDiv.innerHTML = `<div style="font-size:32px;font-weight:bold;color:white;letter-spacing:6px;text-shadow:0 0 20px ${charColor},0 0 40px ${charColor},2px 2px 0 #000;animation:cutinTextPop 0.3s 0.4s both;margin-bottom:8px;">${idiom.ruby}</div><div style="font-size:90px;font-weight:900;color:${charColor};text-shadow:5px 5px 0 #000,-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,0 0 50px ${charColor},0 0 80px ${charColor};letter-spacing:16px;animation:cutinTextPop 0.4s 0.5s both;">${idiom.kanji}</div><div style="font-size:28px;font-weight:bold;color:white;margin-top:12px;text-shadow:2px 2px 0 #000,0 0 15px ${charColor};">${idiom.desc}</div>`;
            overlay.appendChild(textDiv);
