        }

        // (duplicate drawBuilding removed - using version at line ~1512 with ctx parameter)

        function drawCharacter(char) {
            const img = charImages[char.type];
            if (!img || !img.complete) return;

            // Vote bonus scaling and glow
            const voteBonus = votes[char.type] || 0;
            const voteScale = 1 + Math.min(voteBonus * 0.02, 0.5); // Up to 50% bigger
            const baseSize = 144;
            const size = baseSize * voteScale;
            const aspect = img.naturalWidth / img.naturalHeight;
            const w = size * aspect;
            const h = size;

            // Shadow
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(char.x, char.y + h / 2, w / 3, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Glow effect for popular characters
            if (voteBonus > 0) {
                ctx.save();
                ctx.shadowColor = charMetadata[char.type]?.color || '#ffd700';
                ctx.shadowBlur = 5 + voteBonus * 2;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // Bobbing animation when walking or celebration
            let bob = char.state === 'walking' ? Math.sin(Date.now() * 0.008) * 2 : 0;

            // CHANGE 5: Enhanced 5-second celebration animation with phases
            if (char.celebrating && char.celebrateTimer > 0) {
                const timeElapsed = 5000 - char.celebrateTimer;
                const phase1End = 1000;   // 0-1s
                const phase2End = 3000;   // 1-3s
                const phase3End = 4500;   // 3-4.5s
                // phase4 is 4.5-5s

                if (timeElapsed < phase1End) {
                    // Phase 1: Large jump + aura glowing
                    const p1 = timeElapsed / phase1End;
                    bob = -Math.abs(Math.sin(p1 * Math.PI)) * 50;
                    ctx.shadowBlur = Math.max(5 + voteBonus * 2, 5 + voteBonus * 2 + p1 * 30);
                } else if (timeElapsed < phase2End) {
                    // Phase 2: Bouncing + sparkle particles
                    const p2 = (timeElapsed - phase1End) / (phase2End - phase1End);
                    bob = -Math.abs(Math.sin(p2 * Math.PI * 4)) * 25;

                    // Spawn character-specific colored particles
                    if (Math.random() < 0.3) {
                        const particleColor = {
                            meisui: '#FFD700',           // Gold/yellow
                            tsutsuji: '#FF69B4',         // Pink
                            meisui_chan: '#87CEEB',      // Blue
                            bekabune: '#00CED1',         // Cyan/turquoise
                            asari: '#FF6347',            // Orange/red
                            ryoushi: '#90EE90'           // Green/silver
                        }[char.type] || '#FFD700';

                        particles.push({
                            x: char.x + (Math.random() - 0.5) * 40,
                            y: char.y - 30,
                            vx: (Math.random() - 0.5) * 2,
                            vy: -1 - Math.random() * 2,
                            rotation: Math.random() * Math.PI * 2,
                            rotSpeed: (Math.random() - 0.5) * 0.1,
                            size: 3 + Math.random() * 3,
                            alpha: 1,
                            color: particleColor,
                            type: 'confetti',
                            life: 80
                        });
                    }
                } else if (timeElapsed < phase3End) {
                    // Phase 3: Particles decrease, aura fades
                    const p3 = (timeElapsed - phase2End) / (phase3End - phase2End);
                    bob = -Math.abs(Math.sin(p3 * Math.PI * 2)) * 15 * (1 - p3);
                    ctx.shadowBlur = Math.max(5 + voteBonus * 2, 5 + voteBonus * 2 + (1 - p3) * 30);
                } else {
                    // Phase 4: Smooth fade back to normal
                    const p4 = (timeElapsed - phase3End) / (5000 - phase3End);
                    bob = 0;
                    ctx.shadowBlur = 5 + voteBonus * 2;
                }
            }

            // CHANGE 4: Apply scale pulse effect
            let scaleFactor = voteScale;
            if (char.scalePulse && char.scalePulseTimer > 0) {
                const pulsePhase = 1 - (char.scalePulseTimer / 1000);
                scaleFactor = voteScale * (1 + 0.5 * (1 - Math.pow(pulsePhase, 2)));
            }
            const scaledW = w * scaleFactor / voteScale;
            const scaledH = h * scaleFactor / voteScale;

            // Draw character image
            ctx.drawImage(img, char.x - scaledW / 2, char.y - scaledH / 2 + bob - 10, scaledW, scaledH);

            if (voteBonus > 0) {
                ctx.restore();
            }

            // Name label
            ctx.font = 'bold 10px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth = 3;
            ctx.strokeText(char.name, char.x, char.y + h / 2 + 10);
            ctx.fillText(char.name, char.x, char.y + h / 2 + 10);

            // Thought bubble when idle
            if (char.state === 'idle' && char.currentThought) {
                drawThoughtBubble(ctx, char.x, char.y - h / 2 - 45, char.currentThought);
            }
        }

        function drawThoughtBubble(ctx, x, y, text) {
            // CHANGE 5: Improved thought bubble with proper text measurement
            ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Set font first to measure correctly
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Measure text width
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;

            // Calculate bubble dimensions (generous padding)
            let bubbleW = Math.max(140, Math.min(260, textWidth + 30));
            const bubbleH = 48;
            const radius = 12;

            // Bubble background - fully opaque white with shadow
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.fill();
            ctx.restore();

            // Border
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.stroke();

            // Tail (pointing down to character)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(x - 8, y + bubbleH / 2 - 3);
            ctx.lineTo(x, y + bubbleH / 2 + 14);
            ctx.lineTo(x + 8, y + bubbleH / 2 - 3);
            ctx.fill();

            // Text - display full text at once, larger font
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#222';
            ctx.fillText(text, x, y + 6);
        }

        function drawParticles() {
            particles = particles.filter(p => {
                if (p.type === 'confetti') {
                    return p.life > 0;
                } else {
                    return p.y < MAP_H;
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;

                ctx.save();

                if (p.type === 'confetti') {
                    p.vy += 0.05; // gravity
                    p.life--;
                    ctx.globalAlpha = p.alpha * (p.life / 120);
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                } else {
                    ctx.globalAlpha = p.alpha * (1 - p.y / MAP_H);
                    ctx.fillStyle = '#ffb6c1';
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });
        }

        function updateCharacters(deltaTime) {
            characters.forEach(char => {
                // Handle celebration
                if (char.celebrating && char.celebrateTimer > 0) {
                    char.celebrateTimer -= deltaTime;
                    if (char.celebrateTimer <= 0) {
                        char.celebrating = false;
                    }
                }

                // CHANGE 4: Handle scale pulse
                if (char.scalePulse && char.scalePulseTimer > 0) {
                    char.scalePulseTimer -= deltaTime;
                    if (char.scalePulseTimer <= 0) {
                        char.scalePulse = false;
                    }
                }

                char.stateTimer += deltaTime;

                // Decide to move or idle
                if (char.state === 'idle') {
                    if (char.stateTimer > 3000 + Math.random() * 3000) {
                        // Pick next waypoint from character's route
                        const route = characterRoutes[char.type];
                        if (route) {
                            char.routeIndex = ((char.routeIndex || 0) + 1) % route.length;
                            const waypoint = route[char.routeIndex];
                            char.targetX = waypoint.x;
                            char.targetY = waypoint.y;
                            char.state = 'walking';
                            char.stateTimer = 0;
                            char.currentThought = null; // Clear thought when starting to walk
                        }
                    } else if (!char.currentThought && char.stateTimer > 1000) {
                        // Show random thought once when idle (stays for full idle period)
                        char.currentThought = char.thoughts[Math.floor(Math.random() * char.thoughts.length)];
                    }
                } else if (char.state === 'walking') {
                    const dx = char.targetX - char.x;
                    const dy = char.targetY - char.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 15) {
                        char.state = 'idle';
                        char.stateTimer = 0;
                        char.x = char.targetX;
                        char.y = char.targetY;
                    } else {
                        const speed = char.speed;
                        char.x += (dx / dist) * speed;
                        char.y += (dy / dist) * speed;
                    }
                }
            });
        }

        // CHANGE 4: drawMinimap function removed

        // CHANGE 4: Special attack effect after cut-in

        // Animation loop
        let lastTime = Date.now();
        function animate() {

            lastTime = now;

            updateCharacters(deltaTime);

            drawNightEffects(ctx, now);

            // Draw animated water overlay (shimmer effect)
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';

            for (let i = 0; i < 6; i++) {

                for (let x = 0; x <= MAP_W; x += 15) {
                    const y = MAP_H - 180 + i*20 + Math.sin(x*0.03 + now*0.001)*4 + Math.sin(x*0.07)*2;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // Draw characters (sort by y for depth)
            characters.sort((a, b) => a.y - b.y);

        // Input handling
        let dragging = false;
        let lastMx = 0, lastMy = 0;

        canvas.addEventListener('mousedown', e => {
            dragging = true;
            lastMx = e.clientX;
            lastMy = e.clientY;
            canvas.style.cursor = 'grabbing';
        });

        canvas.addEventListener('mousemove', e => {
            if (dragging) {
                camera.x -= (e.clientX - lastMx) / camera.zoom;
                camera.y -= (e.clientY - lastMy) / camera.zoom;
                lastMx = e.clientX;
                lastMy = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            dragging = false;
            canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const oldZoom = camera.targetZoom;
            camera.targetZoom = Math.max(0.5, Math.min(2.5, camera.targetZoom * (e.deltaY > 0 ? 0.9 : 1.1)));

            const mx = (e.clientX - W / 2) / oldZoom + camera.x;
            const my = (e.clientY - H / 2) / oldZoom + camera.y;
            camera.x = mx - (e.clientX - W / 2) / camera.targetZoom;
            camera.y = my - (e.clientY - H / 2) / camera.targetZoom;
        }, { passive: false });

        // Touch support for mobile
        let lastTouchDist = 0;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (e.touches.length === 1) {
                dragging = true;
                lastMx = e.touches[0].clientX;
                lastMy = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && dragging) {
                camera.x -= (e.touches[0].clientX - lastMx) / camera.zoom;
                camera.y -= (e.touches[0].clientY - lastMy) / camera.zoom;
                lastMx = e.touches[0].clientX;
                lastMy = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (lastTouchDist > 0) {
                    const scale = dist / lastTouchDist;
                    camera.targetZoom = Math.max(0.5, Math.min(2.5, camera.targetZoom * scale));
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            dragging = false;
            lastTouchDist = 0;
        });

            const cx = linesCanvas.width / 2, cy = linesCanvas.height / 2;
            lctx.fillStyle = 'rgba(0,0,0,0.85)';
            lctx.fillRect(0, 0, linesCanvas.width, linesCanvas.height);

            for (let i = 0; i < 36; i++) {
                const angle = (i / 36) * Math.PI * 2;
                const nextAngle = angle + (Math.PI / 60); // thin wedge
                lctx.beginPath();
                lctx.moveTo(cx, cy);
                lctx.arc(cx, cy, Math.max(linesCanvas.width, linesCanvas.height), angle, nextAngle);
                lctx.closePath();
                lctx.fill();

            lctx.globalCompositeOperation = 'source-over';

            { q: "うらやすしの よさんは？", a: "830おくえん", choices: ["830おくえん", "100おくえん", "3000おくえん"], explanation: "41%は こまっているひとを たすけるため", category: "うらやすトリビア" },
            { q: "うらやすの むかしのしごとは？", a: "りょうし", choices: ["りょうし", "いなかんこう", "ほんや"], explanation: "べかぶねで のりや あさりを とっていたよ", category: "うらやすトリビア" },
            { q: "うらやすしの はなは？", a: "つつじ", choices: ["つつじ", "ざくら", "ひまわり"], explanation: "まちのあちこちに さいているよ", category: "うらやすトリビア" },
            { q: "いちばん わかいしちょうは？", a: "25さい", choices: ["25さい", "35さい", "45さい"], explanation: "わかくても リーダーに なれるんだよ", category: "せんきょのひみつ" },
            { q: "1ぴょうの おもさは？", a: "けっかを かえることも ある", choices: ["けっかを かえることも ある", "ほとんど いみがない", "たいせつじゃない"], explanation: "1ぴょうさで まけたひとも いるよ", category: "せんきょのひみつ" },
            { q: "がいこくの にほんじんは？", a: "とうひょうできる", choices: ["とうひょうできる", "できない", "ちょっとだけ"], explanation: "ざいがいとうひょう というしくみ", category: "せんきょのひみつ" },
            { q: "めの ふじゆうなひとは？", a: "てんじとうひょう", choices: ["てんじとうひょう", "いけない", "ほかのひとに まかせる"], explanation: "だれでも とうひょうできる くふうがあるよ", category: "せんきょのひみつ" },
            { q: "いちばん おおいのは？", a: "こまったひとを たすける", choices: ["こまったひとを たすける", "どうろをつくる", "がっこうをつくる"], explanation: "41%が つかわれているよ", category: "ぜいきんのつかいみち" },
            { q: "がっこうは なんばんめ？", a: "2ばんめ", choices: ["2ばんめ", "1ばんめ", "3ばんめ"], explanation: "17%が がっこうや としょかんに", category: "ぜいきんのつかいみち" },
            { q: "みちや はしを なおすのは？", a: "やく8%", choices: ["やく8%", "やく20%", "やく50%"], explanation: "なおしつづけることが だいじ", category: "ぜいきんのつかいみち" },
            { q: "しょうぼうしゃの おかねは？", a: "やく3%", choices: ["やく3%", "やく10%", "やく25%"], explanation: "24じかん 365にち まもっているよ", category: "ぜいきんのつかいみち" },
        ];
        
        function getRandomQuiz() {
            return quizzes[Math.floor(Math.random() * quizzes.length)];
        }
        
        function showQuizModal(charType) {
            const quiz = getRandomQuiz();
            const shuffled = [...quiz.choices].sort(() => Math.random() - 0.5);
            
            const quizModal = document.createElement('div');
            quizModal.id = 'quizModal';
            quizModal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 500;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.4);
            `;
            
            let buttonsHTML = '';
            shuffled.forEach(choice => {
                const isCorrect = choice === quiz.a;
                buttonsHTML += `<button style="
                    width: 100%;
                    padding: 16px;
                    margin: 8px 0;
                    background: linear-gradient(135deg, #ffc9c9, #ffb3b3);
                    border: 2px solid #ff9999;
                    border-radius: 12px;
                    font-size: 18px;
                    font-weight: bold;
                    color: #333;
                    cursor: pointer;
                    min-height: 60px;
                    font-family: sans-serif;
                    transition: all 0.2s;
                " onclick="handleQuizAnswer(this, ${isCorrect}, \`${quiz.explanation}\`, '${charType}', '${quiz.a}')">${choice}</button>`;
            });
            
            quizModal.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #fffdf0, #fffbf0);
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 500px;
                    width: 90%;
                    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                ">
                    <h2 style="color: #d32f2f; margin-bottom: 20px; font-size: 24px; text-align: center;">クイズ！</h2>
                    <p style="font-size: 20px; color: #333; margin-bottom: 20px; text-align: center; line-height: 1.6;">${quiz.q}</p>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
            
            document.body.appendChild(quizModal);
        }
        
        function handleQuizAnswer(button, isCorrect, explanation, charType, correctAnswer) {
            const modal = document.getElementById('quizModal');
            const buttons = modal.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                playSound('correct');
                button.style.background = 'linear-gradient(135deg, #90ee90, #70dd70)';
                button.style.borderColor = '#40dd40';
                showQuizFeedback('🎉 せいかい！', '#2d8659', true);
            } else {
                playSound('wrong');
                button.style.background = 'linear-gradient(135deg, #ff6b6b, #ff5555)';
                button.style.borderColor = '#ff3333';
                showQuizFeedback('😢 ざんねん！\nこたえは「' + (correctAnswer || '') + '」', '#d32f2f', false);
            }

            setTimeout(() => {
                modal.remove();
                showExplanationCard(explanation);
            }, 3500);
        }

        function showQuizFeedback(text, color, isCorrect) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 700;
                animation: fadeIn 0.3s ease;
            `;

            const card = document.createElement('div');
            const bgColor = isCorrect ? '#e8f5e9' : '#fce4ec';
            const borderColor = isCorrect ? '#4caf50' : '#e53935';
            card.style.cssText = `
                background: ${bgColor};
                border: 6px solid ${borderColor};
                border-radius: 24px;
                padding: 40px 60px;
                box-shadow: 0 15px 50px rgba(0,0,0,0.4);
                animation: popScale 0.4s ease;
                max-width: 80%;
            `;

            const feedback = document.createElement('div');
            feedback.style.cssText = `
                font-size: 64px;
                font-weight: 900;
                color: ${color};
                text-align: center;
                white-space: pre-wrap;
                line-height: 1.5;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
                font-family: sans-serif;
            `;
            feedback.textContent = text;
            card.appendChild(feedback);

            overlay.appendChild(card);
            document.body.appendChild(overlay);

            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.5s ease';
                setTimeout(() => overlay.remove(), 500);
            }, 3000);
        }

        function showExplanationCard(explanation) {
            const card = document.createElement('div');
            card.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
                border: 3px solid #4caf50;
                border-radius: 16px;
                padding: 25px;
                text-align: center;
                z-index: 600;
                font-size: 20px;
                color: #333;
                max-width: 450px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                line-height: 1.8;
            `;
            card.innerHTML = `なるほど！<br>${explanation}`;
            document.body.appendChild(card);
            
            setTimeout(() => {
                card.style.opacity = '0';
                card.style.transition = 'opacity 0.5s';
                setTimeout(() => card.remove(), 500);
            }, 3000);
        }

        // ============================================
        // ビルディング解放システム（V3新機能）
        // ============================================
        
        const buildingsList = [{"id": "house", "name": "おうち", "unlock_votes": 0, "happiness_bonus": 2, "service_bonus": 0, "category": "住居"}, {"id": "school", "name": "がっこう", "unlock_votes": 5, "happiness_bonus": 5, "service_bonus": 10, "category": "教育", "real_count": 9}, {"id": "park", "name": "こうえん", "unlock_votes": 10, "happiness_bonus": 8, "service_bonus": 5, "category": "環境", "real_count": 130}, {"id": "library", "name": "としょかん", "unlock_votes": 20, "happiness_bonus": 7, "service_bonus": 8, "category": "文化", "real_count": 7}, {"id": "hospital", "name": "びょういん", "unlock_votes": 35, "happiness_bonus": 10, "service_bonus": 15, "category": "医療"}, {"id": "station", "name": "えき", "unlock_votes": 50, "happiness_bonus": 5, "service_bonus": 12, "category": "交通", "real_note": "浦安駅・新浦安駅・舞浜駅"}, {"id": "fire_station", "name": "しょうぼうしょ", "unlock_votes": 70, "happiness_bonus": 3, "service_bonus": 15, "category": "防災", "real_count": 4, "disaster_reduction": 0.3}, {"id": "community_center", "name": "こうみんかん", "unlock_votes": 90, "happiness_bonus": 6, "service_bonus": 10, "category": "交流", "real_count": 7}, {"id": "museum", "name": "はくぶつかん", "unlock_votes": 120, "happiness_bonus": 8, "service_bonus": 8, "category": "文化", "real_note": "浦安市郷土博物館"}, {"id": "city_hall", "name": "しやくしょ", "unlock_votes": 150, "happiness_bonus": 3, "service_bonus": 20, "category": "行政", "policy_multiplier": 1.2}, {"id": "cultural_hall", "name": "ぶんかかいかん", "unlock_votes": 200, "happiness_bonus": 10, "service_bonus": 12, "category": "文化"}, {"id": "sanbanze", "name": "さんばんぜ", "unlock_votes": 250, "happiness_bonus": 15, "service_bonus": 5, "category": "自然", "special": true}];
        
        let builtBuildings = JSON.parse(localStorage.getItem('meisui_builtBuildings') || '[]');
        
        function checkBuildingUnlock(prevVotes) {
            buildingsList.forEach(building => {
                if (prevVotes < building.unlock_votes && totalVotes >= building.unlock_votes && !builtBuildings.includes(building.id)) {
                    builtBuildings.push(building.id);
                    localStorage.setItem('meisui_builtBuildings', JSON.stringify(builtBuildings));
                    showBuildingNotification(building);
                }
            });
        }
        
        function showBuildingNotification(building) {
            
            // V5 Features: Play sound for building unlock
            playSound('unlock');
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #fff3e0, #ffe0b2);
                border: 3px solid #ff9800;
                border-radius: 16px;
                padding: 20px;
                z-index: 400;
                text-align: center;
                font-size: 24px;
                font-weight: bold;
                color: #ff6f00;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
                animation: slideDown 0.5s ease-out;
                font-family: sans-serif;
            `;
            notif.innerHTML = `🏗️ ${building.name}が たった！`;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 0.5s';
                setTimeout(() => notif.remove(), 500);
            }, 3000);
        }

        // ============================================
        // イベントシステム（V3新機能）
        // ============================================
        
        let lastEventVotes = 0;
        
        const goodEvents = [{"name": "おまつりだ！", "trigger": "random", "effect": "happiness+10", "probability": 0.1}, {"name": "あたらしいお店がオープン", "trigger": "random", "effect": "tax_revenue+5%", "probability": 0.08}, {"name": "三番瀬にめずらしい鳥が来た", "trigger": "votes>50", "effect": "population+2", "probability": 0.05}, {"name": "うらやすシティマラソン開催", "trigger": "random", "effect": "happiness+8", "probability": 0.06}];
        const challengeEvents = [{"name": "たいふうが きた！", "trigger": "random", "effect": "infrastructure_decay+10", "mitigation": "fire_station", "probability": 0.08}, {"name": "えきまえが こんざつ！", "trigger": "population>30", "effect": "happiness-5", "mitigation": "station", "probability": 0.07}, {"name": "こうれいかが すすんだ", "trigger": "votes>100", "effect": "service_demand+15%", "mitigation": "hospital", "probability": 0.06}, {"name": "じしん！えきじょうかに ちゅうい", "trigger": "random", "effect": "infrastructure_decay+15", "mitigation": "fire_station", "probability": 0.04, "urayasu_special": true}];
        
        function checkEventTrigger() {
            const votesSince = totalVotes - lastEventVotes;
            if (votesSince >= 20) {
                lastEventVotes = totalVotes;
                triggerRandomEvent();
            }
        }
        
        function triggerRandomEvent() {
            const good = goodEvents.filter(e => canTriggerEvent(e));
            const bad = challengeEvents.filter(e => canTriggerEvent(e));
            
            const allEvents = [...good, ...bad];
            if (allEvents.length === 0) return;
            
            const event = allEvents[Math.floor(Math.random() * allEvents.length)];
            showEventPopup(event);
        }
        
        function canTriggerEvent(event) {
            if (event.trigger === 'random') return Math.random() < (event.probability || 0.1);
            if (event.trigger.includes('votes>')) {
                const threshold = parseInt(event.trigger.split('>')[1]);
                return totalVotes > threshold;
            }
            if (event.trigger.includes('population>')) {
                return true;
            }
            return true;
        }
        
        function showEventPopup(event) {
            
            // V5 Features: Play sound for event
            playSound('event');
            const popup = document.createElement('div');
            popup.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #fff9e6, #fff3cc);
                border: 4px solid #ffc107;
                border-radius: 20px;
                padding: 30px;
                z-index: 450;
                text-align: center;
                font-size: 28px;
                font-weight: bold;
                color: #f57f17;
                max-width: 500px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
                animation: popupBounce 0.5s ease-out;
                font-family: sans-serif;
            `;
            
            const eventText = event.name.includes('た！') || event.name.includes('開催') 
                ? event.name 
                : event.name + '！';
            
            popup.innerHTML = eventText;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                popup.style.opacity = '0';
                popup.style.transition = 'opacity 0.5s';
                setTimeout(() => popup.remove(), 500);
            }, 4000);
        }

        // ============================================
        // レベルシステム更新（V3新機能）
        // (levelThresholds + getCurrentLevel moved before updateBarGraph)
        // ============================================
        
        function showLevelUpAnimation(newLevel) {
            const anim = document.createElement('div');
            anim.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 550;
                text-align: center;
                animation: levelUpBurst 1.5s ease-out forwards;
                font-family: sans-serif;
            `;
            anim.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 20px;">${newLevel.emoji}</div>
                <div style="
                    font-size: 48px;
                    font-weight: bold;
                    color: #fff;
                    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
                    margin-bottom: 10px;
                ">${newLevel.title}</div>
                <div style="font-size: 24px; color: #ffd700;">に レベルアップ！</div>
            `;
            document.body.appendChild(anim);
            
            setTimeout(() => anim.remove(), 3000);
        }

    </script>
