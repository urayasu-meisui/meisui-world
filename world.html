                            hHtml += '<span style="background:#eee;padding:2px 8px;border-radius:8px;font-size:10px;">' + a.name + ': ' + a.levelName + ' (' + a.votes + '票)</span>';
                        });
                        hHtml += '</div>';
                    }
                    hHtml += '</div>';
                });
                container.innerHTML = hHtml;
            }).catch(err => {
                const container = document.getElementById('worldLineHistoryContainer');
                if (container) container.innerHTML = '<div style="color:#ccc;">読み込めませんでした</div>';
            });
        }

        function closeRankPopup() {
            document.getElementById('rankPopup').style.display = 'none';
        }

        // Start animation

        // V5 Features: Initialize all new systems
        initClouds();
        initFireflies();
        initAchievements();
        initWelcome();
        document.getElementById('soundToggleBtn').addEventListener('click', toggleSound);
        fitMapToScreen();
        animate();

        // ============================================
        // クイズシステム（V3新機能）
        // ============================================
        
        // クイズデータは quizzes.json から読み込み（編集はJSONファイルで）
        let quizzes = [];
        fetch('quizzes.json')
            .then(r => r.json())
            .then(data => { quizzes = data; console.log('📝 クイズ読み込み完了:', data.length, '問'); })
            .catch(err => {
                console.error('クイズ読み込み失敗:', err);
                // フォールバック: 最低限の1問
                quizzes = [{ q: "せんきょけんは なんさいから？", a: "18さい", choices: ["18さい", "20さい", "21さい"], explanation: "2016ねんに 20さいから 18さいに かわったよ", category: "せんきょのきほん" }];
            });

        // Track used quiz indices to avoid repeats
        let usedQuizIndices = [];

        function getRandomQuiz() {
            // Reset if all questions used
            if (usedQuizIndices.length >= quizzes.length) {
                usedQuizIndices = [];
            }
            // Pick unused question
            let idx;
            do {
                idx = Math.floor(Math.random() * quizzes.length);
            } while (usedQuizIndices.includes(idx));
            usedQuizIndices.push(idx);
            return quizzes[idx];
        }
        
        function showQuizModal(charType) {
            const quiz = getRandomQuiz();
            const shuffled = [...quiz.choices].sort(() => Math.random() - 0.5);
            
            const quizModal = document.createElement('div');
            quizModal.id = 'quizModal';
            quizModal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 600;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.4);
            `;
            
            // Store quiz data in JS to avoid HTML attribute escaping issues
            window._currentQuizData = { explanation: quiz.explanation, answer: quiz.a, charType: charType };
            let buttonsHTML = '';
            shuffled.forEach((choice, idx) => {
                const isCorrect = choice === quiz.a;
                const escapedChoice = choice.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                buttonsHTML += `<button style="
                    width: 100%;
                    padding: 16px;
                    margin: 8px 0;
                    background: linear-gradient(135deg, #ffc9c9, #ffb3b3);
                    border: 2px solid #ff9999;
                    border-radius: 12px;
                    font-size: 18px;
                    font-weight: bold;
                    color: #333;
                    cursor: pointer;
                    min-height: 60px;
                    font-family: sans-serif;
                    transition: all 0.2s;
                " data-correct="${isCorrect}" onclick="handleQuizAnswer(this, ${isCorrect})">${escapedChoice}</button>`;
            });
            
            quizModal.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #fffdf0, #fffbf0);
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 500px;
                    width: 90%;
                    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                ">
                    <h2 style="color: #d32f2f; margin-bottom: 20px; font-size: 24px; text-align: center;">クイズ！</h2>
                    <p style="font-size: 20px; color: #333; margin-bottom: 20px; text-align: center; line-height: 1.6;">${quiz.q}</p>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
            
            document.body.appendChild(quizModal);
        }
        
        function handleQuizAnswer(button, isCorrect) {
            const quizData = window._currentQuizData || {};
            const explanation = quizData.explanation || '';
            const charType = quizData.charType || '';
            const correctAnswer = quizData.answer || '';
            const modal = document.getElementById('quizModal');
            const buttons = modal.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                playSound('correct');
                button.style.background = 'linear-gradient(135deg, #90ee90, #70dd70)';
                button.style.borderColor = '#40dd40';
                showQuizFeedback('🎉 せいかい！', '#2d8659', true);
            } else {
                playSound('wrong');
                button.style.background = 'linear-gradient(135deg, #ff6b6b, #ff5555)';
                button.style.borderColor = '#ff3333';
                showQuizFeedback('😢 ざんねん！\nこたえは「' + (correctAnswer || '') + '」', '#d32f2f', false);
            }

            setTimeout(() => {
                modal.remove();
                showExplanationCard(explanation);
            }, 3500);
        }

        function showQuizFeedback(text, color, isCorrect) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 700;
                animation: fadeIn 0.3s ease;
            `;

            const card = document.createElement('div');
            const bgColor = isCorrect ? '#e8f5e9' : '#fce4ec';
            const borderColor = isCorrect ? '#4caf50' : '#e53935';
            card.style.cssText = `
                background: ${bgColor};
                border: 6px solid ${borderColor};
                border-radius: 24px;
                padding: 40px 60px;
                box-shadow: 0 15px 50px rgba(0,0,0,0.4);
                animation: popScale 0.4s ease;
                max-width: 80%;
            `;

            const feedback = document.createElement('div');
            feedback.style.cssText = `
                font-size: 64px;
                font-weight: 900;
                color: ${color};
                text-align: center;
                white-space: pre-wrap;
                line-height: 1.5;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
                font-family: sans-serif;
            `;
            feedback.textContent = text;
            card.appendChild(feedback);

            overlay.appendChild(card);
            document.body.appendChild(overlay);

            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.5s ease';
                setTimeout(() => overlay.remove(), 500);
            }, 3000);
        }

        function showExplanationCard(explanation) {
            const card = document.createElement('div');
            card.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
                border: 3px solid #4caf50;
                border-radius: 16px;
                padding: 25px;
                text-align: center;
                z-index: 600;
                font-size: 20px;
                color: #333;
                max-width: 450px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
                line-height: 1.8;
            `;
            card.innerHTML = `なるほど！<br>${explanation}`;
            document.body.appendChild(card);
            
            setTimeout(() => {
                card.style.opacity = '0';
                card.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    card.remove();
                    // Play queued events after quiz flow is fully done
                    playEventQueue();
                }, 500);
            }, 6000);
        }

        // ============================================
        // ビルディング解放システム（V3新機能）
        // ============================================
        
        const buildingsList = [{"id": "house", "name": "おうち", "unlock_votes": 0, "happiness_bonus": 2, "service_bonus": 0, "category": "住居"}, {"id": "school", "name": "がっこう", "unlock_votes": 5, "happiness_bonus": 5, "service_bonus": 10, "category": "教育", "real_count": 9}, {"id": "park", "name": "こうえん", "unlock_votes": 10, "happiness_bonus": 8, "service_bonus": 5, "category": "環境", "real_count": 130}, {"id": "library", "name": "としょかん", "unlock_votes": 20, "happiness_bonus": 7, "service_bonus": 8, "category": "文化", "real_count": 7}, {"id": "hospital", "name": "びょういん", "unlock_votes": 35, "happiness_bonus": 10, "service_bonus": 15, "category": "医療"}, {"id": "station", "name": "えき", "unlock_votes": 50, "happiness_bonus": 5, "service_bonus": 12, "category": "交通", "real_note": "浦安駅・新浦安駅・舞浜駅"}, {"id": "fire_station", "name": "しょうぼうしょ", "unlock_votes": 70, "happiness_bonus": 3, "service_bonus": 15, "category": "防災", "real_count": 4, "disaster_reduction": 0.3}, {"id": "community_center", "name": "こうみんかん", "unlock_votes": 90, "happiness_bonus": 6, "service_bonus": 10, "category": "交流", "real_count": 7}, {"id": "museum", "name": "はくぶつかん", "unlock_votes": 120, "happiness_bonus": 8, "service_bonus": 8, "category": "文化", "real_note": "浦安市郷土博物館"}, {"id": "city_hall", "name": "しやくしょ", "unlock_votes": 150, "happiness_bonus": 3, "service_bonus": 20, "category": "行政", "policy_multiplier": 1.2}, {"id": "cultural_hall", "name": "ぶんかかいかん", "unlock_votes": 200, "happiness_bonus": 10, "service_bonus": 12, "category": "文化"}, {"id": "sanbanze", "name": "さんばんぜ", "unlock_votes": 250, "happiness_bonus": 15, "service_bonus": 5, "category": "自然", "special": true}];
        
        var builtBuildings = JSON.parse(localStorage.getItem('meisui_builtBuildings') || '[]');

        // Firebase同期: 建物アンロック状態を全端末で共有
        firebaseDb.ref('stats/builtBuildings').on('value', snap => {
            const data = snap.val();
            if (data && Array.isArray(data)) {
                builtBuildings = data;
                localStorage.setItem('meisui_builtBuildings', JSON.stringify(builtBuildings));
            }
        });

        function saveBuildingsToFirebase() {
            firebaseDb.ref('stats/builtBuildings').set(builtBuildings).catch(err => {
                console.error('建物同期失敗:', err);
            });
        }

        function checkBuildingUnlock(prevVotes) {
            const decoTotal = Object.values(decorationOffset || {}).reduce((a, b) => a + b, 0);
            const adjustedTotal = totalVotes - decoTotal;
            let newUnlock = false;
            buildingsList.forEach(building => {
                if (prevVotes < building.unlock_votes && adjustedTotal >= building.unlock_votes && !builtBuildings.includes(building.id)) {
                    builtBuildings.push(building.id);
                    newUnlock = true;
                    queueEvent(() => showBuildingNotification(building));
                }
            });
            if (newUnlock) {
                localStorage.setItem('meisui_builtBuildings', JSON.stringify(builtBuildings));
                saveBuildingsToFirebase();
            }
        }
        
        function showBuildingNotification(building) {
            
            // V5 Features: Play sound for building unlock
            playSound('unlock');
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #fff3e0, #ffe0b2);
                border: 3px solid #ff9800;
                border-radius: 16px;
                padding: 20px;
                z-index: 400;
                text-align: center;
                font-size: 24px;
                font-weight: bold;
                color: #ff6f00;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
                animation: slideDown 0.5s ease-out;
                font-family: sans-serif;
            `;
            notif.innerHTML = `🏗️ ${building.name}が たった！`;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 0.5s';
                setTimeout(() => { notif.remove(); onEventDone(); }, 500);
            }, 3000);
        }

        // ============================================
        // イベントシステム（V3新機能）
        // ============================================
        
        var lastEventVotes = 0;
        
        const goodEvents = [{"name": "おまつりだ！", "trigger": "random", "effect": "happiness+10", "probability": 0.1}, {"name": "あたらしいお店がオープン", "trigger": "random", "effect": "tax_revenue+5%", "probability": 0.08}, {"name": "三番瀬にめずらしい鳥が来た", "trigger": "votes>50", "effect": "population+2", "probability": 0.05}, {"name": "うらやすシティマラソン開催", "trigger": "random", "effect": "happiness+8", "probability": 0.06}];
        const challengeEvents = [{"name": "たいふうが きた！", "trigger": "random", "effect": "infrastructure_decay+10", "mitigation": "fire_station", "probability": 0.08}, {"name": "えきまえが こんざつ！", "trigger": "population>30", "effect": "happiness-5", "mitigation": "station", "probability": 0.07}, {"name": "こうれいかが すすんだ", "trigger": "votes>100", "effect": "service_demand+15%", "mitigation": "hospital", "probability": 0.06}, {"name": "じしん！えきじょうかに ちゅうい", "trigger": "random", "effect": "infrastructure_decay+15", "mitigation": "fire_station", "probability": 0.04, "urayasu_special": true}];
        
        function checkEventTrigger() {
            const votesSince = totalVotes - lastEventVotes;
            if (votesSince >= 20) {
                lastEventVotes = totalVotes;
                triggerRandomEvent();
            }
        }
        
        function triggerRandomEvent() {
            const good = goodEvents.filter(e => canTriggerEvent(e));
            const bad = challengeEvents.filter(e => canTriggerEvent(e));
            
            const allEvents = [...good, ...bad];
            if (allEvents.length === 0) return;
            
            const event = allEvents[Math.floor(Math.random() * allEvents.length)];
            queueEvent(() => showEventPopup(event));
        }
        
        function canTriggerEvent(event) {
            if (event.trigger === 'random') return Math.random() < (event.probability || 0.1);
            if (event.trigger.includes('votes>')) {
                const threshold = parseInt(event.trigger.split('>')[1]);
                return totalVotes > threshold;
            }
            if (event.trigger.includes('population>')) {
                return true;
            }
            return true;
        }
        
        function showEventPopup(event) {
            
            // V5 Features: Play sound for event
            playSound('event');
            const popup = document.createElement('div');
            popup.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #fff9e6, #fff3cc);
                border: 4px solid #ffc107;
                border-radius: 20px;
                padding: 30px;
                z-index: 450;
                text-align: center;
                font-size: 28px;
                font-weight: bold;
                color: #f57f17;
                max-width: 500px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
                animation: popupBounce 0.5s ease-out;
                font-family: sans-serif;
            `;
            
            const eventText = event.name.includes('た！') || event.name.includes('開催') 
                ? event.name 
                : event.name + '！';
            
            popup.innerHTML = eventText;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                popup.style.opacity = '0';
                popup.style.transition = 'opacity 0.5s';
                setTimeout(() => { popup.remove(); onEventDone(); }, 500);
            }, 4000);
        }

        // ============================================
        // レベルシステム更新（V3新機能）
        // (levelThresholds + getCurrentLevel moved before updateBarGraph)
        // ============================================
        
        function showLevelUpAnimation(newLevel) {
            const anim = document.createElement('div');
            anim.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 550;
                text-align: center;
                animation: levelUpBurst 1.5s ease-out forwards;
                font-family: sans-serif;
            `;
            anim.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 20px;">${newLevel.emoji}</div>
                <div style="
                    font-size: 48px;
                    font-weight: bold;
                    color: #fff;
                    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
                    margin-bottom: 10px;
                ">${newLevel.title}</div>
                <div style="font-size: 24px; color: #ffd700;">に レベルアップ！</div>
            `;
            document.body.appendChild(anim);
            
            setTimeout(() => { anim.remove(); onEventDone(); }, 3000);
        }

    </script>
