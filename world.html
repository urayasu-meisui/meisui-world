h<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>浦安めいすいくん総選挙～あなたの一票で未来が変わる～</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/popup-manager.js"></script>
    <script src="js/game-logic.js"></script>
    <script src="js/audio.js"></script>
    <!-- quiz-system.js 廃止: 市民まつりでは操作者不在のため -->
    <script src="js/building-system.js"></script>
    <script src="js/event-system.js"></script>
</head>
<body>
    <!-- Firebase connection indicator -->
    <div id="firebaseStatus" style="position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:9999;padding:4px 16px;border-radius:20px;font-size:11px;font-weight:bold;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;display:none;pointer-events:none;"></div>


    <!-- Sound Toggle Button（設定画面に移行済みのため非表示） -->
    <button id="soundToggleBtn" title="音声ON/OFF" style="display:none;">🔊</button>

    <!-- Ambient Overlay for Day/Night Cycle -->
    <div id="ambientOverlay"></div>

    <div class="title-bar">
        🗳️ 浦安めいすいくん総選挙～明るい選挙がみらいを変える～ <img id="titleMeisuiImg" style="height:39px;vertical-align:middle;margin-left:4px;" alt="めいすいくん">
    </div>

    <!-- Year Display — 非表示（タイムラインバーに統合） -->
    <div id="yearDisplay" style="display:none;">
        <div id="yearText">1889年</div>
        <div id="worldLineText">第1世界線</div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- CHANGE 4: Minimap removed -->

    <div class="character-popup" id="characterPopup">
        <h4 id="popupName">Character Name</h4>
        <p id="popupThought"></p>
    </div>

    <!-- 投票UIはiPad(vote.html)に移行済み。大画面は表示専用 -->
    <button id="voteBtn" style="display:none;">🗳️ 投票する！</button>
    <div id="voteModal" style="display:none;">
        <div id="voteModalOverlay" class="vote-overlay"></div>
        <div class="vote-panel">
            <div class="vote-grid" id="voteGridContainer"></div>
        </div>
    </div>

    <!-- 左サイドパネル：iPhone フレーム -->
    <div id="leftPanel" style="position:fixed;top:40px;left:0;bottom:34px;z-index:200;width:318px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;padding:4px 5px 4px 0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);">

      <!-- ── iPhone フレーム本体 ── -->
      <div id="phoneFrame" style="position:relative;width:308px;height:599px;background:#1c1c1e;border-radius:46px;flex-shrink:0;box-shadow:0 0 0 1.5px #48484a,0 0 0 3.5px #2c2c2e,inset 0 0 0 1px rgba(255,255,255,0.07),0 28px 56px rgba(0,0,0,0.9),0 6px 18px rgba(0,0,0,0.5);">

        <!-- サイドボタン装飾（右：電源） -->
        <div style="position:absolute;right:-3px;top:124px;width:3.5px;height:74px;background:#3a3a3c;border-radius:0 3px 3px 0;"></div>
        <!-- サイドボタン装飾（左：マナーモード） -->
        <div style="position:absolute;left:-3px;top:62px;width:3.5px;height:24px;background:#3a3a3c;border-radius:3px 0 0 3px;"></div>
        <!-- サイドボタン装飾（左：音量＋） -->
        <div style="position:absolute;left:-3px;top:96px;width:3.5px;height:38px;background:#3a3a3c;border-radius:3px 0 0 3px;"></div>
        <!-- サイドボタン装飾（左：音量－） -->
        <div style="position:absolute;left:-3px;top:146px;width:3.5px;height:38px;background:#3a3a3c;border-radius:3px 0 0 3px;"></div>

        <!-- ── スクリーン ── -->
        <div id="phoneScreen" style="position:absolute;inset:12px;border-radius:35px;overflow:hidden;background:#000;display:flex;flex-direction:column;">

          <!-- Dynamic Island -->
          <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:92px;height:30px;background:#1c1c1e;border-radius:22px;z-index:25;pointer-events:none;"></div>

          <!-- ステータスバー -->
          <div style="background:#000;padding:14px 18px 5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;min-height:48px;">
            <span id="phoneTime" style="font-size:16px;font-weight:700;color:#fff;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;letter-spacing:-0.4px;"></span>
            <div style="display:flex;align-items:center;gap:6px;">
              <!-- 電波 -->
              <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><rect x="0" y="7.5" width="2.5" height="4.5" rx="0.5"/><rect x="4.5" y="5" width="2.5" height="7" rx="0.5"/><rect x="9" y="2.5" width="2.5" height="9.5" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.5"/></svg>
              <!-- Wi-Fi -->
              <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><circle cx="7.5" cy="10.2" r="1.3" fill="white"/><path d="M4.1 7.1Q7.5 4 10.9 7.1" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M1.2 4.2Q7.5 -0.5 13.8 4.2" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
              <!-- バッテリー -->
              <div style="display:flex;align-items:center;">
                <div style="width:22px;height:11px;border:1.5px solid rgba(255,255,255,0.65);border-radius:3px;padding:1.5px;">
                  <div style="width:100%;height:100%;background:#4cd964;border-radius:1.5px;"></div>
                </div>
                <div style="width:2px;height:5px;background:rgba(255,255,255,0.45);border-radius:0 1.5px 1.5px 0;margin-left:-0.5px;"></div>
              </div>
            </div>
          </div>

          <!-- 投票速報ヘッダー（縦10%細め） -->
          <div style="background:linear-gradient(135deg,#1a237e,#283593);padding:6px 10px 5px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
            <div style="font-weight:900;font-size:14px;letter-spacing:2px;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">📊 投票速報</div>
            <div style="font-weight:900;font-size:14px;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;white-space:nowrap;">総投票数 <span id="totalVotesDisplay">0</span>票 <span id="advanceCounter" style="font-size:12px;margin-left:4px;color:#ffd740;">●●●</span></div>
          </div>

          <!-- ランキング本体 -->
          <div id="barGraph" style="padding:10px 10px 6px;flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center;background:#ffffff;">
            <div id="barGraphBars"></div>
          </div>

          <!-- 下部ボタンエリア -->
          <div style="flex-shrink:0;background:#f2f2f7;padding:7px 9px 6px;border-top:0.5px solid rgba(0,0,0,0.13);">
            <div style="display:flex;gap:5px;">
              <button onclick="openRankPopup()" style="flex:1;font-size:13px;color:#fff;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;padding:9px 0;border-radius:11px;cursor:pointer;font-weight:bold;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">🏆 街ランク</button>
              <button onclick="showTutorial()" style="flex:1;font-size:13px;color:#fff;background:linear-gradient(135deg,#42a5f5,#7e57c2);border:none;padding:9px 0;border-radius:11px;cursor:pointer;font-weight:bold;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">📖 遊び方</button>
              <button onclick="openSettings()" style="flex:1;font-size:13px;color:#fff;background:linear-gradient(135deg,#636366,#2c2c2e);border:none;padding:9px 0;border-radius:11px;cursor:pointer;font-weight:bold;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">⚙️ 設定</button>
            </div>
          </div>

          <!-- ホームインジケーター -->
          <div style="background:#000;padding:6px 0 8px;display:flex;justify-content:center;flex-shrink:0;">
            <div style="width:108px;height:4px;background:rgba(255,255,255,0.27);border-radius:2px;"></div>
          </div>

          <!-- ── 設定スクリーン（スライドイン） ── -->
          <div id="settingsScreen" style="position:absolute;inset:0;background:#f2f2f7;z-index:30;transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">

            <!-- iOSナビゲーションバー -->
            <div style="background:rgba(242,242,247,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:36px 14px 7px;display:flex;align-items:center;border-bottom:0.5px solid rgba(60,60,67,0.18);flex-shrink:0;">
              <button onclick="closeSettings()" style="background:none;border:none;color:#007aff;font-size:15px;cursor:pointer;padding:4px 10px 4px 0;display:flex;align-items:center;gap:1px;font-family:inherit;">
                <svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#007aff" stroke-width="2.2" stroke-linecap="round"><path d="M8 1L2 8l6 7"/></svg>
                戻る
              </button>
              <span style="flex:1;text-align:center;font-weight:600;font-size:16px;color:#000;margin-right:54px;">設定</span>
            </div>

            <!-- 設定コンテンツ（スクロールなし・flex均等配置） -->
            <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding:8px 14px 6px;gap:0;">

              <!-- セクション：サウンド -->
              <div style="font-size:10px;font-weight:600;color:#6c6c70;padding:0 6px 4px;text-transform:uppercase;letter-spacing:0.5px;">サウンド</div>
              <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;">
                <!-- ON / OFF トグル -->
                <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 16px;">
                  <span style="font-size:14px;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">🔊 サウンド</span>
                  <label class="ios-toggle">
                    <input type="checkbox" id="settingsSoundToggle" checked onchange="toggleSound()">
                    <span class="ios-toggle-track"><span class="ios-toggle-thumb"></span></span>
                  </label>
                </div>
                <div style="height:0.5px;background:#e5e5ea;margin-left:16px;"></div>
                <!-- 音量スライダー -->
                <div style="padding:8px 16px 10px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
                    <span style="font-size:14px;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">🎚️ 音量</span>
                    <span id="volumeLabel" style="font-size:13px;color:#6c6c70;font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;min-width:36px;text-align:right;">80%</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:12px;opacity:0.4;">🔈</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80"
                      class="ios-slider"
                      oninput="setMasterVolume(this.value/100)">
                    <span style="font-size:12px;opacity:0.4;">🔊</span>
                  </div>
                </div>
              </div>

              <!-- セクション：デバッグ -->
              <div style="font-size:10px;font-weight:600;color:#6c6c70;padding:0 6px 4px;text-transform:uppercase;letter-spacing:0.5px;">デバッグ・テスト</div>
              <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;">
                <button onclick="debugAddVotes(3);closeSettings();" class="ios-cell ios-cell-sm">
                  <span>⏩ ＋10年進める</span>
                  <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
                </button>
                <div style="height:0.5px;background:#e5e5ea;margin-left:16px;"></div>
                <button onclick="debugAddVotes(15);closeSettings();" class="ios-cell ios-cell-sm">
                  <span>⏩ ＋50年進める</span>
                  <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
                </button>
              </div>

              <!-- セクション：データ管理 -->
              <div style="font-size:10px;font-weight:600;color:#6c6c70;padding:0 6px 4px;text-transform:uppercase;letter-spacing:0.5px;">データ管理</div>
              <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;">
                <button onclick="resetAllData()" class="ios-cell ios-cell-sm ios-cell-destructive">
                  <span>🔄 全データリセット</span>
                  <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
                </button>
              </div>

              <!-- セクション：表示 -->
              <div style="font-size:10px;font-weight:600;color:#6c6c70;padding:0 6px 4px;text-transform:uppercase;letter-spacing:0.5px;">表示</div>
              <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;">
                <button onclick="hidePhone();closeSettings();" class="ios-cell ios-cell-sm">
                  <span>📱 スマホをしまう</span>
                  <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
                </button>
              </div>

              <!-- セクション：電源 -->
              <div style="font-size:10px;font-weight:600;color:#6c6c70;padding:0 6px 4px;text-transform:uppercase;letter-spacing:0.5px;">電源</div>
              <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;">
                <button onclick="shutdownPhone()" class="ios-cell ios-cell-sm ios-cell-destructive">
                  <span>⏻ 電源を切る</span>
                  <svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
                </button>
              </div>

              <!-- バージョン情報（残りスペースを埋める） -->
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aeaeb2;font-size:11px;padding:2px 0;">
                めいすいくん総選挙<br>
                <span id="versionDisplay" style="font-size:12px;font-weight:600;color:#8e8e93;font-family:monospace;letter-spacing:0.5px;">v--------</span><br>
                <span style="font-size:10px;">浦安市明るい選挙推進協議会<br>浦安市選挙管理委員会</span>
              </div>
            </div>

            <!-- 設定画面ホームバー -->
            <div style="background:#f2f2f7;padding:5px 0 7px;display:flex;justify-content:center;flex-shrink:0;">
              <div style="width:108px;height:4px;background:rgba(0,0,0,0.14);border-radius:2px;"></div>
            </div>
          </div><!-- / settingsScreen -->

        </div><!-- / phoneScreen -->
      </div><!-- / phoneFrame -->
    </div><!-- / leftPanel -->

    <!-- スマホを取り出すボタン（非表示時のみ表示） -->
    <button id="showPhoneBtn" onclick="showPhone()" style="display:none;position:fixed;bottom:44px;left:16px;z-index:210;background:linear-gradient(135deg,rgba(20,60,100,0.75),rgba(10,40,80,0.70));color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,0.3);font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;transition:opacity 0.3s;">📱 スマホを取り出す</button>

    <!-- タイムラインバー（大画面下部に常時表示） -->
    <div id="timelineBar">
        <span class="tl-label">1889</span>
        <div class="tl-track">
            <div class="tl-filled" id="tlFilled"></div>
            <div class="tl-marker" id="tlMarker"></div>
        </div>
        <span class="tl-label">2100</span>
        <span class="tl-year" id="tlYear">1889年</span>
        <div class="tl-next" id="tlNext"></div>
    </div>

    <!-- 街ランクポップアップ -->
    <div id="rankPopup" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:550;align-items:center;justify-content:center;">
        <div onclick="closeRankPopup()" style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);"></div>
        <div id="rankCard" style="position:relative;background:#fff;border-radius:20px;padding:30px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.3);font-family:'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;">
            <button onclick="closeRankPopup()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>
            <div id="rankContent"></div>
        </div>
    </div>

    <script>
        // ページ読み込み時刻（エンディング誤発火防止用）
        window._pageLoadTime = Date.now();

        // ============================================
        // Sound Manager (Web Audio API)
        // ============================================
        // オーディオシステムは js/audio.js に分離済み

        // Character image data URLs


        // Load real map image (MAP_2009- = real Urayasu map)
        const mapImage = new Image();
        mapImage.src = 'map_realb.png';
        mapImage.onerror = function() {
            this.src = 'urayasu_map.webp'; // fallback to old map
        };

        // Sea overlay images for reclamation stages
        const seaStage1 = new Image(); seaStage1.src = 'sea_stage1b.png'; // 1889-1959: 元町のみ
        const seaStage2 = new Image(); seaStage2.src = 'sea_stage2b.png'; // 1969-1978: 元町+中町
        const seaStage3 = new Image(); seaStage3.src = 'sea_stage3b.png'; // 1979-1988: +舞浜+新町

        // Initialize voting grid
        function initVoteGrid() {
            const voteGridContainer = document.getElementById('voteGridContainer');
            const voteData = CHAR_TYPES.map(t => ({
                type: t, name: charMetadata[t].name, img: charImages[t]
            }));

            let html = '';
            voteData.forEach(data => {
                const cardHtml = '<div class="vote-card" data-type="' + data.type + '" onclick="castVote(\'' + data.type + '\')"><img src="' + data.img.src + '" /><div class="vote-card-name">' + data.name + '</div><div class="vote-card-count" id="vc-' + data.type + '">0票</div></div>';
                html += cardHtml;
            });
            voteGridContainer.innerHTML = html;
        }

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // CHANGE 4: minimapCanvas and minimapCtx removed

        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight - 36;

        // Map constants
        const TILE_SIZE = 32;

        // Landmarks (x, y, width, height, type, name, emoji)

        // Character walking routes - waypoints along actual roads on the map
        // キャラクターの行動圏: 'land'=陸のみ, 'sea'=海/川のみ, 'both'=両方


        // Location-specific dialogues for named waypoints

        // Character data

        // ============================================
        // Mikoshi Event Display
        // ============================================
        function showMikoshiEvent(char1, char2) {
            // Calculate center point between two characters
            const centerX = (char1.x + char2.x) / 2;
            const centerY = (char1.y + char2.y) / 2;

            // Create DOM overlay for mikoshi event
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                left: 0; top: 0; width: 100%; height: 100%;
                pointer-events: none;
                z-index: 300;
            `;

            // Calculate screen position from map coordinates
            const titleBarH = window.innerWidth <= 768 ? 36 : 50;
            const screenX = centerX * camera.zoomX;
            const screenY = centerY * camera.zoomY + 36;

            // Mikoshi text that bounces
            const mikoshi = document.createElement('div');
            mikoshi.style.cssText = `
                position: absolute;
                left: ${screenX - 100}px;
                top: ${Math.max(20, screenY - 120)}px;
                width: 200px;
                text-align: center;
                font-size: 32px;
                font-weight: 900;
                color: #d32f2f;
                text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 20px #ffd700;
                animation: mikoshiBounce 0.5s ease infinite;
                font-family: 'BIZ UDGothic','Yu Gothic UI','Hiragino Sans','Meiryo',sans-serif;
            `;
            mikoshi.innerHTML = '🏮 まいだ！まいだ！🏮<br><span style="font-size:16px;color:#ff6f00;">' + char1.type.replace('_', ' ') + ' × ' + char2.type.replace('_', ' ') + '</span>';
            overlay.appendChild(mikoshi);

            // Spawn festival particles
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const colors = ['#ff1744', '#ffd600', '#ff6d00', '#ff4081', '#ffab00'];
                const size = 6 + Math.random() * 8;
                particle.style.cssText = `
                    position: absolute;
                    width: ${size}px; height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    left: ${screenX + (Math.random() - 0.5) * 200}px;

        // CHANGE 6: Draw night time effects (stars, moon, building lights, street lamps)
        function drawNightEffects(ctx, now) {
            if (ambientPhase < 0.75 || ambientPhase > 1) return; // Only during night phase

            const timeInNight = (ambientPhase - 0.75) / 0.25; // 0-1 during night

            // Draw stars (20-30 small white dots with twinkle)
            ctx.save();
            ctx.globalAlpha = 0.3 + timeInNight * 0.4;
            ctx.fillStyle = 'white';

            // Use deterministic random stars based on position
            for (let i = 0; i < 30; i++) {
                const seed = i * 12345;
                const starX = (seed * 7919) % MAP_W;
                const starY = (seed * 6091) % (MAP_H * 0.6); // Upper 60% of sky

                // Twinkle animation
                const twinkle = Math.sin(now * 0.002 + i) * 0.5 + 0.5;
                ctx.globalAlpha = (0.3 + timeInNight * 0.4) * twinkle;
                ctx.beginPath();
                ctx.arc(starX, starY, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw BIG prominent moon in upper-right (CHANGE 1: much bigger, focal point)
            ctx.globalAlpha = 0.8 + timeInNight * 0.15;
            ctx.fillStyle = 'white';
            const moonX = MAP_W - 200;
            const moonY = 120;
            ctx.beginPath();
            ctx.arc(moonX, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

            // Moon shadow for subtle depth (optional crescent effect)
            ctx.globalAlpha = (0.1 + timeInNight * 0.03);
            ctx.fillStyle = 'rgba(25, 50, 130, 1)';
            ctx.beginPath();
            ctx.arc(moonX + 20, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

        function checkCharacterInteractions(chars) {
            const now = Date.now();

            // Update active interaction timers using real time (not frame-dependent)
            chars.forEach(char => {
                if (char.interacting && char.interactionEndTime) {
                    if (now >= char.interactionEndTime) {
                        char.interacting = false;
                        char.interactionEndTime = 0;
                    }
                    // Keep interactionTimer for animation calculations
                    char.interactionTimer = Math.max(0, char.interactionEndTime - now);
                }
            });

            // Hard cooldown: minimum 60 seconds between events
            if (now < nextInteractionAllowed) return;

            // モーダル/クイズ表示中はインタラクション抑制
            if (window.voteInProgress || document.getElementById('voteModal')?.style.display !== 'none' || document.getElementById('quizModal')) return;

            // Check if any pair is close enough
            let triggered = false;
            for (let i = 0; i < chars.length && !triggered; i++) {
                for (let j = i + 1; j < chars.length && !triggered; j++) {
                    const char1 = chars[i];
                    const char2 = chars[j];
                    const dx = char1.x - char2.x;
                    const dy = char1.y - char2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80 && !char1.interacting && !char2.interacting && !char1.celebrating && !char2.celebrating) {
                        nextInteractionAllowed = now + 60000 + Math.random() * 30000;
                        triggered = true;

                        }
                        playSound('event');
                        break;
                    }
                }
            }

        // イージング関数（加減速が自然）

            camera.animTimer -= deltaTime;

            if (camera.animState === 'zoom_in') {
                camera.animProgress = Math.min(1, camera.animProgress + deltaTime / 500);
                if (camera.animProgress >= 1) {
                    camera.animProgress = 1;

        // Seeded pseudo-random for consistent wobble per object
        function seededRandom(seed) {
            let s = seed || 1;
            return function() {
                s = (s * 16807) % 2147483647;
                return (s & 0x7fffffff) / 0x7fffffff;
            };
        }

        // Draw a wobbly rectangle (hand-drawn look)
        function wobbleRect(ctx, x, y, w, h, seed) {
            const rng = seededRandom(seed);
            const jitter = 2;
            ctx.beginPath();
            ctx.moveTo(x + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + h + rng()*jitter);
            ctx.lineTo(x + rng()*jitter, y + h + rng()*jitter);
            ctx.closePath();
        }

        // Draw a wobbly circle
        function wobbleCircle(ctx, cx, cy, r, seed) {
            const rng = seededRandom(seed);
            const points = 20;
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const wobble = r + (rng()-0.5) * r * 0.15;
                const px = cx + Math.cos(angle) * wobble;
                const py = cy + Math.sin(angle) * wobble;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

            staticCtx.fillStyle = '#4a9de0';

            staticCtx.fillStyle = '#7cb87c';
            staticCtx.beginPath();
            staticCtx.moveTo(urayasuPath[0][0], urayasuPath[0][1]);
            for (let i = 1; i < urayasuPath.length; i++) {

            for (let i = 0; i < 80; i++) {
                const x = Math.random() * MAP_W;
                const y = Math.random() * (MAP_H - 250);

                // Simple check: roughly within the polygon (approximate)
                if (x < 100 || x > 1500 || y > 700) continue; // Skip obvious ocean areas

                const r = 30 + Math.random() * 80;
                const grad = staticCtx.createRadialGradient(x, y, 0, x, y, r);
                const colors = ['#6db86d','#8dca8d','#5da85d','#9dd89d','#4d984d'];
                const green = colors[Math.floor(Math.random()*colors.length)];
                grad.addColorStop(0, green);
                grad.addColorStop(1, 'rgba(124,184,124,0)');
                staticCtx.fillStyle = grad;
                staticCtx.beginPath();
                wobbleCircle(staticCtx, x, y, r, i*7);
                staticCtx.fill();
            }

            // Tiny flower dots scattered (on land only)
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * MAP_W;
                const y = Math.random() * (MAP_H - 270);

                // Rough land check
                if (x < 100 || x > 1500 || y > 700) continue;

                const colors = ['#ff9','#fcc','#ccf','#ffc','#cff'];
                staticCtx.fillStyle = colors[Math.floor(Math.random()*5)];
                staticCtx.beginPath();
                staticCtx.arc(x, y, 1.5 + Math.random()*2, 0, Math.PI*2);
                staticCtx.fill();
            }
        }

        function renderWater() {
            // Tokyo Bay
            const bayGrad = staticCtx.createLinearGradient(0, MAP_H-200, 0, MAP_H);
            bayGrad.addColorStop(0, '#6cb4ee');
            bayGrad.addColorStop(0.5, '#4a9de0');
            bayGrad.addColorStop(1, '#3888cc');
            staticCtx.fillStyle = bayGrad;
            staticCtx.fillRect(0, MAP_H-200, MAP_W, 200);

            // 旧江戸川 (left river)
            const riverGrad = staticCtx.createLinearGradient(0, 0, 120, 0);
            riverGrad.addColorStop(0, '#4a9de0');
            riverGrad.addColorStop(1, '#6cb4ee');
            staticCtx.fillStyle = riverGrad;
            staticCtx.beginPath();
            staticCtx.moveTo(0, 0);
            for (let y = 0; y <= MAP_H; y += 15) {
                staticCtx.lineTo(80 + Math.sin(y*0.02)*15 + Math.sin(y*0.05)*5, y);
            }
            staticCtx.lineTo(0, MAP_H);
            staticCtx.closePath();
            staticCtx.fill();
        }

        function renderRoads() {
            // Draw road paths with chalk/pencil texture
            staticCtx.strokeStyle = '#d4b896';
            staticCtx.lineWidth = 22;
            staticCtx.lineCap = 'round';
            staticCtx.lineJoin = 'round';

            staticCtx.beginPath();
            pathWaypoints.forEach((wp, idx) => {
                const wobble = Math.sin(idx*2.3)*2 + Math.cos(idx*1.7)*2;
                if (idx === 0) staticCtx.moveTo(wp.x, wp.y);
                else staticCtx.lineTo(wp.x, wp.y);
            });
            staticCtx.stroke();

            // Lighter center line
            staticCtx.strokeStyle = '#e8d5b8';
            staticCtx.lineWidth = 12;
            staticCtx.stroke();
        }

        function drawBuilding(ctx, x, y, w, h, type, name, emoji) {
            const seed = x * 1000 + y;

                case 'shrine':
                    // Cute red torii gate and shrine
                    ctx.fillStyle = '#e8ddd0';
                    wobbleRect(ctx, x+4, y+h*0.4, w-8, h*0.6, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#8b7355';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Red torii
                    ctx.fillStyle = '#cc3333';
                    ctx.fillRect(x+w*0.2, y+h*0.3, 4, h*0.7);

                    ctx.fillStyle = '#555';
                    ctx.beginPath();
                    ctx.moveTo(x-2, y+h*0.4);

            ctx.lineTo(rx + rw - r, ry);
            ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
            ctx.lineTo(rx + rw, ry + rh - r);
            ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
            ctx.lineTo(rx + r, ry + rh);
            ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
            ctx.lineTo(rx, ry + r);
            ctx.quadraticCurveTo(rx, ry, rx + r, ry);
            ctx.closePath();
            ctx.fill();

        function drawOceanDecorations(ctx, t) {
            const time = t * 0.001;

            // === 波紋 ===
            oceanDecorations.rippleTimer += 1;
            if (oceanDecorations.rippleTimer > 90) { // 新しい波紋を定期的に生成
                oceanDecorations.rippleTimer = 0;
                const rx = 100 + Math.random() * (MAP_W - 200);
                const ry = 600 + Math.random() * (MAP_H - 650);
                oceanDecorations.ripples.push({ x: rx, y: ry, age: 0, maxAge: 120 });
            }
            oceanDecorations.ripples = oceanDecorations.ripples.filter(r => r.age < r.maxAge);
            for (const rip of oceanDecorations.ripples) {
                rip.age++;
                const progress = rip.age / rip.maxAge;
                const radius = progress * 25;
                const alpha = (1 - progress) * 0.3;
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(rip.x, rip.y, radius, 0, Math.PI * 2);
                ctx.stroke();
                if (radius > 8) {
                    ctx.beginPath();
                    ctx.arc(rip.x, rip.y, radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // === 魚の群れ（水面下の影） ===
            for (const school of oceanDecorations.fishSchools) {
                const baseX = school.x + Math.sin(time * school.speed + school.phase) * 80;
                const baseY = school.y + Math.cos(time * school.speed * 0.7 + school.phase) * 20;
                for (let i = 0; i < school.count; i++) {
                    const angle = (i / school.count) * Math.PI * 2 + time * school.speed;
                    const fx = baseX + Math.cos(angle) * school.radius;
                    const fy = baseY + Math.sin(angle) * school.radius * 0.5;
                    const fishDir = Math.cos(time * school.speed + school.phase) > 0 ? 1 : -1;
                    ctx.save();
                    ctx.translate(fx, fy);
                    ctx.scale(fishDir, 1);
                    ctx.fillStyle = 'rgba(60,120,180,0.35)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 尾びれ
                    ctx.beginPath();
                    ctx.moveTo(-8, 0);
                    ctx.lineTo(-13, -4);
                    ctx.lineTo(-13, 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            // === 小舟 ===
            for (const boat of oceanDecorations.boats) {
                boat.x += boat.speed * boat.dir;
                // 画面端で折り返し
                if (boat.x > MAP_W + 50) boat.x = -50;
                if (boat.x < -50) boat.x = MAP_W + 50;
                const bobY = boat.y + Math.sin(time * 2 + boat.x * 0.01) * 3;
                const tilt = Math.sin(time * 1.5 + boat.x * 0.01) * 0.05;

                ctx.save();
                ctx.translate(boat.x, bobY);
                ctx.rotate(tilt);
                if (boat.type === 'fishing') {
                    // 漁船
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.moveTo(-18, 0); ctx.lineTo(-14, 8); ctx.lineTo(14, 8); ctx.lineTo(18, 0);
                    ctx.closePath();
                    ctx.fill();
                    // マスト
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(2, 0); ctx.lineTo(2, -16);
                    ctx.stroke();
                    // 旗
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(2, -16); ctx.lineTo(10, -13); ctx.lineTo(2, -10);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // ヨット
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(-14, 0); ctx.lineTo(-10, 6); ctx.lineTo(10, 6); ctx.lineTo(14, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                    // 帆
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.moveTo(0, -20); ctx.lineTo(0, 0); ctx.lineTo(10 * boat.dir, -3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#ccc';
                    ctx.stroke();
                }
                ctx.restore();
            }

            // === カモメ ===
            for (const gull of oceanDecorations.seagulls) {
                gull.x += gull.speed;
                if (gull.x > MAP_W + 30) gull.x = -30;
                gull.wingPhase += 0.08;
                const gy = gull.y + Math.sin(time * 0.8 + gull.x * 0.005) * 10;
                const wingAngle = Math.sin(gull.wingPhase) * 0.5;

                ctx.save();
                ctx.translate(gull.x, gy);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                // 左翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-8, -6 * (1 + wingAngle), -16, -2 + wingAngle * 8);
                ctx.stroke();
                // 右翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(8, -6 * (1 + wingAngle), 16, -2 + wingAngle * 8);
                ctx.stroke();
                // 体
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ============================================

        // 点がポリゴン内にあるか判定（ray casting法）
        // polygon: [[x,y], ...] 形式（浦安市域ポリゴン用）
        function isPointInPolygon(px, py, polygon) {
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // 点がゾーンポリゴン内にあるか判定（ray casting法）
        // polygon: [{x,y}, ...] 形式（ゾーンポリゴン用）
        function isPointInZone(px, py, polygon) {
            if (!polygon || polygon.length < 3) return true; // 未設定時は通過
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        // 浦安市域ポリゴン（1981年=全埋め立て完了後の最大範囲）

        // ランダム配置ゾーンポリゴン（座標エディタで調整可）
        // デフォルト: 矩形（fixed-positions.jsonのデフォルト値と同じ範囲）
        let landZonePolygon = [
            { x: 680,  y: 60  }, { x: 1750, y: 60  },

        let seaZonePolygon = [

        // 地形制約 + ゾーンポリゴン制約付き位置生成
        // zonePolygon: [{x,y}, ...] ゾーン多角形（この中に収める）
        // terrain: 'land'=浦安市内の陸地のみ, 'sea'=陸地の外（海・川）, 'any'=どこでも
        function generatePositions(seed, count, zonePolygon, terrain) {
            const rng = seededRandom(seed);
            const positions = [];
            let attempts = 0;
            const maxAttempts = count * 40; // ポリゴンフィルタ分、余裕を増やす

            // ゾーンポリゴンのバウンディングボックスを計算
            const xs = zonePolygon.map(p => p.x);
            const ys = zonePolygon.map(p => p.y);
            const xMin = Math.min(...xs), xMax = Math.max(...xs);
            const yMin = Math.min(...ys), yMax = Math.max(...ys);

            while (positions.length < count && attempts < maxAttempts) {
                attempts++;
                const x = xMin + rng() * (xMax - xMin);
                const y = yMin + rng() * (yMax - yMin);

                // ゾーンポリゴン内チェック
                if (!isPointInZone(x, y, zonePolygon)) continue;

                // 地形チェック（浦安市域ポリゴン）
                if (terrain === 'land') {
                    if (!isPointInPolygon(x, y, urayasuLandPolygon)) continue;
                } else if (terrain === 'sea') {
                    if (isPointInPolygon(x, y, urayasuLandPolygon)) continue;
                }
                // 'any' または terrain未指定の場合はチェックなし

                positions.push({
                    x, y,
                    seed: Math.floor(rng() * 99999),
                    size: 0.7 + rng() * 0.6
                });
            }
            return positions;
        }

        // ゾーンポリゴン内にランダムなルート中継点を生成
        function generateRouteWaypoints(polygon, count, seed) {
            const rng = seededRandom(seed);
            const xs = polygon.map(p => p.x), ys = polygon.map(p => p.y);
            const xMin = Math.min(...xs), xMax = Math.max(...xs);
            const yMin = Math.min(...ys), yMax = Math.max(...ys);
            const pts = [];
            let attempts = 0;
            while (pts.length < count && attempts < count * 40) {
                attempts++;
                const x = xMin + rng() * (xMax - xMin);
                const y = yMin + rng() * (yMax - yMin);
                if (isPointInZone(x, y, polygon)) {
                    pts.push({ x: Math.round(x), y: Math.round(y) });
                }
            }
            return pts;
        }

        // キャラクターのルートをゾーンポリゴンに合わせて再生成
        function rebuildCharacterRoutes() {
            // 陸キャラ: 陸ゾーン内を移動
            characterRoutes.meisui   = generateRouteWaypoints(landZonePolygon, 8, 7001);
            characterRoutes.tsutsuji = generateRouteWaypoints(landZonePolygon, 8, 7002);
            // 海キャラ（bekabune/ryoushi）: 海ゾーン全体を移動
            characterRoutes.bekabune = generateRouteWaypoints(seaZonePolygon, 10, 7003);
            characterRoutes.ryoushi  = generateRouteWaypoints(seaZonePolygon, 10, 7005);
            // 屋形船（asari）: 海ゾーンの左下エリアに集中
            // 海ゾーンのバウンディングボックスを計算して左40%・下50%に絞る
            const sxs = seaZonePolygon.map(p => p.x), sys = seaZonePolygon.map(p => p.y);
            const sxMin = Math.min(...sxs), sxMax = Math.max(...sxs);
            const syMin = Math.min(...sys), syMax = Math.max(...sys);
            const asariXMax = sxMin + (sxMax - sxMin) * 0.42; // 左40%
            const asariYMin = syMin + (syMax - syMin) * 0.50; // 下50%
            // 左下に絞ったサブポリゴンを作成（海ゾーンと矩形の交差）
            const asariSubPoly = [
                { x: sxMin,     y: asariYMin },
                { x: asariXMax, y: asariYMin },
                { x: asariXMax, y: syMax     },
                { x: sxMin,     y: syMax     },
            ];
            // サブポリゴン内かつ海ゾーン内の点を生成（両方を満たす）
            const asariPts = [];
            const rng = seededRandom(7004);
            let att = 0;
            while (asariPts.length < 10 && att < 400) {
                att++;
                const x = sxMin + rng() * (asariXMax - sxMin);
                const y = asariYMin + rng() * (syMax - asariYMin);
                if (isPointInZone(x, y, seaZonePolygon)) {
                    asariPts.push({ x: Math.round(x), y: Math.round(y) });
                }
            }
            characterRoutes.asari = asariPts.length >= 3 ? asariPts : generateRouteWaypoints(seaZonePolygon, 10, 7004);
            // ビーナスめいちゃん: 陸ゾーン5点 + 海ゾーン5点を組み合わせ
            const chanLand = generateRouteWaypoints(landZonePolygon, 5, 7006);
            const chanSea  = generateRouteWaypoints(seaZonePolygon,  5, 7007);
            characterRoutes.meisui_chan = [...chanLand, ...chanSea];
        }

        // 全ポジション配列（ゾーンポリゴン変更時に再生成できるよう let で宣言）
        let ginkgoPositions, azaleaPositions, fishMarketPositions, beachPositions;
        let marinePositions, boatPositions, asariClamPositions, noriFramePositions;

        // キャラ別の位置配列マッピング（regenerateAllPositions内で更新）
        let charPositionArrays = {

            azaleaPositions     = generatePositions(2002, 40, landZonePolygon, 'land');
            fishMarketPositions = generatePositions(6006, 25, landZonePolygon, 'land');

        // fixed-positions.json があれば座標とゾーンポリゴンを上書きして再生成

        // 1票=1オブジェクト出現アニメーション
        let newObjectAnim = null; // { charType, startTime }

        function triggerNewObjectAnimation(charType) {
