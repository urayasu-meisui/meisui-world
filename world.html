        function drawOceanDecorations(ctx, t) {
            const time = t * 0.001;

            // === 波紋 ===
            oceanDecorations.rippleTimer += 1;
            if (oceanDecorations.rippleTimer > 90) { // 新しい波紋を定期的に生成
                oceanDecorations.rippleTimer = 0;
                const rx = 100 + Math.random() * (MAP_W - 200);
                const ry = 600 + Math.random() * (MAP_H - 650);
                oceanDecorations.ripples.push({ x: rx, y: ry, age: 0, maxAge: 120 });
            }
            oceanDecorations.ripples = oceanDecorations.ripples.filter(r => r.age < r.maxAge);
            for (const rip of oceanDecorations.ripples) {
                rip.age++;
                const progress = rip.age / rip.maxAge;
                const radius = progress * 25;
                const alpha = (1 - progress) * 0.3;
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(rip.x, rip.y, radius, 0, Math.PI * 2);
                ctx.stroke();
                if (radius > 8) {
                    ctx.beginPath();
                    ctx.arc(rip.x, rip.y, radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // === 魚の群れ（水面下の影） ===
            for (const school of oceanDecorations.fishSchools) {
                const baseX = school.x + Math.sin(time * school.speed + school.phase) * 80;
                const baseY = school.y + Math.cos(time * school.speed * 0.7 + school.phase) * 20;
                for (let i = 0; i < school.count; i++) {
                    const angle = (i / school.count) * Math.PI * 2 + time * school.speed;
                    const fx = baseX + Math.cos(angle) * school.radius;
                    const fy = baseY + Math.sin(angle) * school.radius * 0.5;
                    const fishDir = Math.cos(time * school.speed + school.phase) > 0 ? 1 : -1;
                    ctx.save();
                    ctx.translate(fx, fy);
                    ctx.scale(fishDir, 1);
                    ctx.fillStyle = 'rgba(60,120,180,0.35)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 尾びれ
                    ctx.beginPath();
                    ctx.moveTo(-8, 0);
                    ctx.lineTo(-13, -4);
                    ctx.lineTo(-13, 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            // === 小舟 ===
            for (const boat of oceanDecorations.boats) {
                boat.x += boat.speed * boat.dir;
                // 画面端で折り返し
                if (boat.x > MAP_W + 50) boat.x = -50;
                if (boat.x < -50) boat.x = MAP_W + 50;
                const bobY = boat.y + Math.sin(time * 2 + boat.x * 0.01) * 3;
                const tilt = Math.sin(time * 1.5 + boat.x * 0.01) * 0.05;

                ctx.save();
                ctx.translate(boat.x, bobY);
                ctx.rotate(tilt);
                if (boat.type === 'fishing') {
                    // 漁船
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.moveTo(-18, 0); ctx.lineTo(-14, 8); ctx.lineTo(14, 8); ctx.lineTo(18, 0);
                    ctx.closePath();
                    ctx.fill();
                    // マスト
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(2, 0); ctx.lineTo(2, -16);
                    ctx.stroke();
                    // 旗
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(2, -16); ctx.lineTo(10, -13); ctx.lineTo(2, -10);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // ヨット
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(-14, 0); ctx.lineTo(-10, 6); ctx.lineTo(10, 6); ctx.lineTo(14, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                    // 帆
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.moveTo(0, -20); ctx.lineTo(0, 0); ctx.lineTo(10 * boat.dir, -3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#ccc';
                    ctx.stroke();
                }
                ctx.restore();
            }

            // === カモメ ===
            for (const gull of oceanDecorations.seagulls) {
                gull.x += gull.speed;
                if (gull.x > MAP_W + 30) gull.x = -30;
                gull.wingPhase += 0.08;
                const gy = gull.y + Math.sin(time * 0.8 + gull.x * 0.005) * 10;
                const wingAngle = Math.sin(gull.wingPhase) * 0.5;

                ctx.save();
                ctx.translate(gull.x, gy);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                // 左翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-8, -6 * (1 + wingAngle), -16, -2 + wingAngle * 8);
                ctx.stroke();
                // 右翼
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(8, -6 * (1 + wingAngle), 16, -2 + wingAngle * 8);
                ctx.stroke();
                // 体
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ============================================
        // 投票所の建物描画
        // ============================================
        function drawVotingStations(ctx, now) {
            // Voting stations only appear in modern era (2026 onwards)
            if (getCurrentYear && getCurrentYear() < 2026) return;

            const votingStations = landmarks.filter(lm => lm.type === 'vote');
            votingStations.forEach((station, idx) => {
                const x = station.x;
                const y = station.y;
                const w = 50;
                const h = 40;
                const seed = idx * 123;
                const bob = Math.sin(now * 0.002 + idx) * 1.5; // gentle float

                ctx.save();

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(x + w/2, y + h + 4, w/2 + 2, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Building body (white/cream)
                ctx.fillStyle = '#f8f0e8';
                ctx.fillRect(x, y + bob, w, h);
                ctx.strokeStyle = '#b09070';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x, y + bob, w, h);

                // Red roof/header band (投票所らしさ)
                ctx.fillStyle = '#cc3333';
                ctx.fillRect(x, y + bob, w, h * 0.22);

                // White "投票所" text on red band
                ctx.font = 'bold 8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('投票所', x + w/2, y + bob + h * 0.17);

                // Door
                ctx.fillStyle = '#8b6e4e';
                ctx.fillRect(x + w * 0.38, y + bob + h * 0.5, w * 0.24, h * 0.5);

                // Ballot box icon
                ctx.fillStyle = '#ddd';
                ctx.fillRect(x + w * 0.15, y + bob + h * 0.35, w * 0.2, h * 0.25);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 0.8;
                ctx.strokeRect(x + w * 0.15, y + bob + h * 0.35, w * 0.2, h * 0.25);
                // Slot on box
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.18, y + bob + h * 0.35);
                ctx.lineTo(x + w * 0.32, y + bob + h * 0.35);
                ctx.stroke();

                // 🗳️ emoji above
                ctx.font = '16px sans-serif';
                ctx.fillText('🗳️', x + w/2, y + bob - 6);

                // Name label below
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                // White background for label
                const labelW = ctx.measureText(station.name).width + 8;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillRect(x + w/2 - labelW/2, y + h + 6, labelW, 14);
                ctx.strokeStyle = 'rgba(200,50,50,0.4)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + w/2 - labelW/2, y + h + 6, labelW, 14);
                ctx.fillStyle = '#cc3333';
                ctx.fillText(station.name, x + w/2, y + h + 16);

                ctx.restore();
            });
        }

        // ============================================
        // VOTE-BASED TOWN EVOLUTION (大規模演出版)
        // ============================================

        function generatePositions(seed, count, xMin, xMax, yMin, yMax) {
            const rng = seededRandom(seed);
            const positions = [];
            for (let i = 0; i < count; i++) {
                positions.push({
                    x: xMin + rng() * (xMax - xMin),
                    y: yMin + rng() * (yMax - yMin),
                    seed: Math.floor(rng() * 99999),
                    size: 0.7 + rng() * 0.6
                });
            }
            return positions;
        }

        // Vote effect positions - mapped to real Urayasu map coordinates
        // Ginkgo positions - parks and green areas (central north)
        const ginkgoPositions = generatePositions(1001, 40, 550, 1200, 100, 650);
        // Azalea/flower positions - residential and school areas (元町〜中町)
        const azaleaPositions = generatePositions(2002, 40, 550, 1000, 150, 500);
        // Beach positions - south coastline area
        const beachPositions = generatePositions(3003, 25, 500, 1150, 700, 850);
        // Marine positions - Tokyo Bay area
        const marinePositions = generatePositions(4004, 30, 800, 1200, 750, 1050);
        // Boat positions - river and bay
        const boatPositions = generatePositions(5005, 20, 450, 1100, 650, 900);
        // Fish market positions - old town area (元町)
        const fishMarketPositions = generatePositions(6006, 25, 550, 850, 150, 400);

        // Persistent vote particles (leaves, petals, etc.)
        let voteParticles = [];

        function drawVoteEffects(ctx, now) {
            const COASTLINE_Y = 780; // South coastline on the actual Urayasu map
            const WATER_START_Y = 800; // Where water begins

            const vM = Math.max(0, (votes.meisui || 0) - (decorationOffset.meisui || 0));
            const vT = Math.max(0, (votes.tsutsuji || 0) - (decorationOffset.tsutsuji || 0));
            const vV = Math.max(0, (votes.meisui_chan || 0) - (decorationOffset.meisui_chan || 0));
            const vU = Math.max(0, (votes.bekabune || 0) - (decorationOffset.bekabune || 0));
            const vA = Math.max(0, (votes.asari || 0) - (decorationOffset.asari || 0));
            const vR = Math.max(0, (votes.ryoushi || 0) - (decorationOffset.ryoushi || 0));

            // ========== 1. めいすいくん → イチョウ並木・黄金の紅葉 ==========
            if (vM > 0) {
                // (color overlay removed - using real map image)

                // 大きなイチョウの木
                const count = Math.min(vM * 2, ginkgoPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = ginkgoPositions[i];
                    const s = p.size;
                    drawLargeGinkgo(ctx, p.x, p.y, p.seed, s, now);
                }

                // 落ちるイチョウの葉パーティクル
                if (vM >= 3) {
                    const leafCount = Math.min(vM * 3, 40);
                    for (let i = 0; i < leafCount; i++) {
                        const phase = now * 0.0005 + i * 1.7;
                        const lx = (550 + ((i * 137) % 650)) + Math.sin(phase) * 30;
                        const ly = ((now * 0.02 + i * 80) % 650);
                        const rot = Math.sin(phase * 2) * 0.5;
                        ctx.save();
                        ctx.translate(lx, ly);
                        ctx.rotate(rot);
                        ctx.fillStyle = ['#ffd700','#daa520','#f0c040','#e8b820'][i % 4];
                        ctx.beginPath();
                        // Fan-shaped ginkgo leaf
                        ctx.moveTo(0, 3);
                        ctx.quadraticCurveTo(-5, -3, -3, -6);
                        ctx.quadraticCurveTo(0, -4, 3, -6);
                        ctx.quadraticCurveTo(5, -3, 0, 3);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ========== 2. ツツジ → 花園・ピンクの楽園 ==========
            if (vT > 0) {
                // (color overlay removed - using real map image)

                // 大きなツツジの花壇
                const count = Math.min(vT * 2, azaleaPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = azaleaPositions[i];
                    drawLargeAzalea(ctx, p.x, p.y, p.seed, p.size);
                }

                // 花びら舞うパーティクル
                if (vT >= 3) {
                    const petalCount = Math.min(vT * 3, 45);
                    for (let i = 0; i < petalCount; i++) {
                        const phase = now * 0.0004 + i * 2.1;
                        const px = (550 + ((i * 151) % 450)) + Math.sin(phase * 1.3) * 25;
                        const py = ((now * 0.015 + i * 70) % 500);
                        ctx.save();
                        ctx.translate(px, py);
                        ctx.rotate(Math.sin(phase) * Math.PI);
                        ctx.globalAlpha = 0.7;
                        ctx.fillStyle = ['#ff69b4','#ff1493','#da70d6','#e040fb','#ff85c2'][i % 5];
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 3, 5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ========== 3. ヴィーナス → 海岸線リゾート開発 ==========
            if (vV > 0) {
                // (beach gradient and sea color overlays removed - using real map image)

                // ビーチ施設
                const count = Math.min(vV * 2, beachPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = beachPositions[i];
                    drawBeachFacility(ctx, p.x, p.y, p.seed, i, now);
                }

                // 5票以上で灯台 (near 三番瀬 area)
                if (vV >= 5) {
                    drawLighthouse(ctx, 1150, 500, now);
                }
                // 10票以上でマリーナ (near 総合公園 coast)
                if (vV >= 10) {
                    drawMarina(ctx, 1150, 650, now);
                }
            }

            // ========== 4. 浦安の海 → 海洋生物の楽園 ==========
            if (vU > 0) {
                // (sea/river color overlays removed - using real map image)
                const clarity = Math.min(vU / 12, 1);
                ctx.fill();

                // 海洋生物
                const count = Math.min(vU * 2, marinePositions.length);
                for (let i = 0; i < count; i++) {
                    const p = marinePositions[i];
                    drawMarineCreature(ctx, p.x, p.y, p.seed, i, now);
                }

                // 5票以上でクジラの噴水 (in Tokyo Bay)
                if (vU >= 5) {
                    drawWhale(ctx, 1000, 900, now);
                }
                // 8票以上でサンゴ礁
                if (vU >= 8) {
                    drawCoralReef(ctx, now);
                }
            }

            // ========== 5. 屋形船 → 海上祭り ==========
            if (vA > 0) {
                // 屋形船
                const count = Math.min(vA * 2, boatPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = boatPositions[i];
                    drawYakatabune(ctx, p.x, p.y, p.seed, i, now);
                }

                // 5票以上で提灯が海岸線に並ぶ
                if (vA >= 3) {
                    const lanternCount = Math.min(vA * 3, 30);
                    for (let i = 0; i < lanternCount; i++) {
                        const lx = 500 + (i / lanternCount) * 600;
                        const ly = 850;
                        const swing = Math.sin(now * 0.002 + i * 0.8) * 3;
                        // 提灯
                        ctx.fillStyle = '#ff4500';
                        ctx.beginPath();
                        ctx.ellipse(lx, ly + swing, 5, 7, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // 光
                        ctx.fillStyle = 'rgba(255, 140, 0, ' + (0.15 + Math.sin(now * 0.003 + i) * 0.05) + ')';
                        ctx.beginPath();
                        ctx.arc(lx, ly + swing, 15, 0, Math.PI * 2);
                        ctx.fill();
                        // 紐
                        ctx.strokeStyle = '#8b4513';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(lx, ly + swing - 7);
                        ctx.lineTo(lx, ly - 12);
                        ctx.stroke();
                    }
                }

                // 8票以上で花火
                if (vA >= 8) {
                    drawFireworks(ctx, now);
                }
            }

            // ========== 6. 漁師 → 魚市場・商業エリア ==========
            if (vR > 0) {
                // 商業エリアの活気オーバーレイ
                const bustleIntensity = Math.min(vR / 15, 1);

                // 商業要素
                const count = Math.min(vR * 2, fishMarketPositions.length);
                for (let i = 0; i < count; i++) {
                    const p = fishMarketPositions[i];
                    drawCommerceElement(ctx, p.x, p.y, p.seed, i, now);
                }

                // 3票以上で大きな魚市場
                if (vR >= 3) {
                    drawFishMarketBuilding(ctx, 700, 660);
                }
                // 6票以上で商店街アーケード
                if (vR >= 6) {
                    drawShoppingArcade(ctx, 400, 680, now);
                }
                // 10票以上で港の大型施設
                if (vR >= 10) {
                    drawHarborFacility(ctx, 1100, 670);
                }

                // 海面の跳ねる魚
                if (vR >= 2) {
                    const fishCount = Math.min(vR * 2, 20);
                    for (let i = 0; i < fishCount; i++) {
                        const fx = 100 + ((i * 173) % 1400);
                        const fy = MAP_H - 50 - ((i * 47) % 130);
                        const jumpPhase = Math.sin(now * 0.005 + i * 3.7);
                        if (jumpPhase > 0.3) {
                            const jumpH = (jumpPhase - 0.3) * 40;
                            ctx.save();
                            ctx.translate(fx, fy - jumpH);
                            ctx.rotate(-0.4 * jumpPhase);
                            ctx.fillStyle = ['#4169e1','#4682b4','#708090','#cd853f'][i % 4];
                            ctx.beginPath();
                            ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.moveTo(-8, 0);
                            ctx.lineTo(-13, -5);
                            ctx.lineTo(-13, 5);
                            ctx.closePath();
                            ctx.fill();
                            ctx.restore();
                            // Splash ring
                            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.ellipse(fx, fy + 2, 6 + jumpH * 0.2, 3, 0, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // ===== 大きなイチョウの木 =====
        function drawLargeGinkgo(ctx, x, y, seed, scale, now) {
            const rng = seededRandom(seed);
            const s = scale * 1.4;
            // 太い幹
            ctx.fillStyle = '#5a3e28';
            wobbleRect(ctx, x - 4 * s, y, 8 * s, 28 * s, seed);
            ctx.fill();
            ctx.strokeStyle = '#3d2915';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 大きなイチョウの樹冠（扇形・黄金色）
            for (let i = 0; i < 8; i++) {
                const lx = x + (rng() - 0.5) * 28 * s;
                const ly = y - 10 * s + (rng() - 0.5) * 20 * s;
                const r = (10 + rng() * 8) * s;
                const hue = 38 + rng() * 25;
                const light = 50 + rng() * 15;
                ctx.fillStyle = 'hsla(' + hue + ', 95%, ' + light + '%, 0.75)';
                ctx.beginPath();
                wobbleCircle(ctx, lx, ly, r, seed + i * 5);
                ctx.fill();
            }
            // 木漏れ日エフェクト
            ctx.fillStyle = 'rgba(255, 230, 100, 0.08)';
            ctx.beginPath();
            ctx.arc(x, y + 10, 30 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        // ===== 大きなツツジの花壇 =====
        function drawLargeAzalea(ctx, x, y, seed, scale) {
            const rng = seededRandom(seed);
            const s = scale * 1.3;
            // 緑の茂み（大きい）
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = 'rgba(' + (60 + rng() * 30) + ', ' + (120 + rng() * 40) + ', ' + (40 + rng() * 20) + ', 0.8)';
                ctx.beginPath();
                wobbleCircle(ctx, x + (rng() - 0.5) * 12 * s, y + (rng() - 0.5) * 8 * s, (12 + rng() * 6) * s, seed + i);
                ctx.fill();
            }
            // たくさんの花
            const colors = ['#ff1493', '#ff69b4', '#da70d6', '#e040fb', '#ff85c2', '#ff6eb4', '#c71585'];
            for (let i = 0; i < 12; i++) {
                const fx = x + (rng() - 0.5) * 24 * s;
                const fy = y + (rng() - 0.5) * 18 * s;
                const fr = (3 + rng() * 3) * s;
                ctx.fillStyle = colors[Math.floor(rng() * colors.length)];
                ctx.beginPath();
                // 花びら形
                for (let p = 0; p < 5; p++) {
                    const angle = (p / 5) * Math.PI * 2;
                    ctx.ellipse(fx + Math.cos(angle) * fr * 0.4, fy + Math.sin(angle) * fr * 0.4, fr * 0.5, fr * 0.3, angle, 0, Math.PI * 2);
                }
                ctx.fill();
                // 花の中心
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(fx, fy, fr * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ===== ビーチ施設 =====
        function drawBeachFacility(ctx, x, y, seed, index, now) {
            const type = index % 6;
            if (type === 0 || type === 3) {
                // 大きなビーチパラソル
                const color = ['#ff4444', '#ffaa00', '#44aaff', '#ff69b4', '#44dd44', '#aa44ff'][index % 6];
                ctx.fillStyle = '#6b4e3d';
                ctx.fillRect(x - 1, y, 3, 20);
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI, Math.PI + Math.PI / 4);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, 16, Math.PI + Math.PI / 2, Math.PI + Math.PI * 3 / 4);
                ctx.fill();
                // デッキチェア
                ctx.fillStyle = color;
                wobbleRect(ctx, x + 8, y + 8, 12, 5, seed);
                ctx.fill();
            } else if (type === 1) {
                // 砂の城（大きめ）
                ctx.fillStyle = '#f0d58c';
                wobbleRect(ctx, x - 12, y, 24, 16, seed);
                ctx.fill();
                ctx.fillStyle = '#e8c872';
                wobbleRect(ctx, x - 8, y - 12, 8, 14, seed + 1);
                ctx.fill();
                wobbleRect(ctx, x + 2, y - 8, 6, 10, seed + 2);
                ctx.fill();
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(x - 5, y - 18, 1, 8);
                ctx.fillRect(x - 4, y - 18, 6, 3);
            } else if (type === 2) {
                // ヤシの木（大）
                ctx.fillStyle = '#8b6e4e';
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(0.1);
                ctx.fillRect(-3, -30, 6, 35);
                ctx.restore();
                for (let l = 0; l < 6; l++) {
                    const angle = -Math.PI / 2 + (l - 2.5) * 0.5;
                    ctx.strokeStyle = '#228b22';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 28);
                    const cx = x + Math.cos(angle) * 20;
                    const cy = y - 28 + Math.sin(angle) * 20 - 5;
                    const ex = x + Math.cos(angle) * 30;
                    const ey = y - 28 + Math.sin(angle) * 30 + 3;
                    ctx.quadraticCurveTo(cx, cy, ex, ey);
                    ctx.stroke();
                }
                // ココナッツ
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(x + 2, y - 26, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 4) {
                // サーフボード
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(0.3);
                ctx.fillStyle = ['#ff6b6b', '#42a5f5', '#66bb6a', '#ffa726'][index % 4];
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.stroke();
                ctx.restore();
            } else {
                // ビーチハウス
                ctx.fillStyle = '#fff5e6';
                wobbleRect(ctx, x - 16, y - 8, 32, 22, seed);
                ctx.fill();
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#42a5f5';
                ctx.beginPath();
                ctx.moveTo(x - 18, y - 8);
                ctx.lineTo(x, y - 22);
                ctx.lineTo(x + 18, y - 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#87ceeb';
                wobbleRect(ctx, x - 6, y, 12, 10, seed + 3);
                ctx.fill();
            }
        }

        // ===== 灯台 =====
        function drawLighthouse(ctx, x, y, now) {
            // 本体
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(x - 12, y + 50);
            ctx.lineTo(x - 8, y);
            ctx.lineTo(x + 8, y);
            ctx.lineTo(x + 12, y + 50);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.stroke();
            // 赤ストライプ
            ctx.fillStyle = '#cc0000';
            ctx.fillRect(x - 10, y + 10, 20, 8);
            ctx.fillRect(x - 11, y + 28, 22, 8);
            ctx.fillRect(x - 11.5, y + 42, 23, 6);
            // ライト部分
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 6, y - 5, 12, 6);
            // ライトの光（回転）
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            // 光線
            const beamAngle = now * 0.002;
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(x, y - 8);
            ctx.lineTo(x + Math.cos(beamAngle) * 120, y - 8 + Math.sin(beamAngle) * 120);
            ctx.lineTo(x + Math.cos(beamAngle + 0.15) * 120, y - 8 + Math.sin(beamAngle + 0.15) * 120);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // ===== マリーナ =====
        function drawMarina(ctx, x, y, now) {
            // 桟橋
            ctx.fillStyle = '#8b6e4e';
            wobbleRect(ctx, x, y, 120, 8, 8888);
            ctx.fill();
            // 縦の桟橋
            for (let i = 0; i < 4; i++) {
                wobbleRect(ctx, x + 10 + i * 30, y, 6, 30, 8889 + i);
                ctx.fill();
            }
            // 停泊ヨット
            for (let i = 0; i < 3; i++) {
                const bx = x + 20 + i * 30;
                const by = y + 18;
                const bob = Math.sin(now * 0.002 + i * 1.5) * 2;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(bx - 8, by + bob);
                ctx.lineTo(bx - 5, by + 6 + bob);
                ctx.lineTo(bx + 5, by + 6 + bob);
                ctx.lineTo(bx + 8, by + bob);
                ctx.closePath();
                ctx.fill();
                // マスト
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(bx, by + bob);
                ctx.lineTo(bx, by - 14 + bob);
                ctx.stroke();
                // 帆
                ctx.fillStyle = ['#ff6b6b', '#42a5f5', '#ffa726'][i];
                ctx.beginPath();
                ctx.moveTo(bx, by - 12 + bob);
                ctx.lineTo(bx + 8, by - 2 + bob);
                ctx.lineTo(bx, by + bob);
                ctx.closePath();
                ctx.fill();
            }
        }

        // ===== 海洋生物 =====
        function drawMarineCreature(ctx, x, y, seed, index, now) {
            const type = index % 5;
            if (type === 0) {
                // 大きなイルカ（ジャンプ）
                const jumpPhase = Math.sin(now * 0.0015 + seed) * 0.5 + 0.5;
                const dy = -jumpPhase * 45;
                ctx.fillStyle = '#4682b4';
                ctx.save();
                ctx.translate(x, y + dy);
                ctx.rotate(-0.4 * jumpPhase);
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                // 背びれ
                ctx.beginPath();
                ctx.moveTo(-2, -6);
                ctx.lineTo(2, -14);
                ctx.lineTo(6, -6);
                ctx.fill();
                // 尾びれ
                ctx.beginPath();
                ctx.moveTo(-16, 0);
                ctx.lineTo(-24, -8);
                ctx.lineTo(-22, 2);
                ctx.fill();
                // お腹
                ctx.fillStyle = '#87ceeb';
                ctx.beginPath();
                ctx.ellipse(2, 3, 12, 4, 0, 0, Math.PI);
                ctx.fill();
                // 目
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(12, -2, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // 水しぶき
                if (jumpPhase > 0.2) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    for (let s = 0; s < 6; s++) {
                        const sx = x + (s - 3) * 8;
                        const sy = y + 4 - Math.random() * 4;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 2 + Math.random() * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else if (type === 1) {
                // 大きなウミガメ
                const tx = x + Math.sin(now * 0.0008 + seed) * 25;
                const dir = Math.cos(now * 0.0008 + seed) > 0 ? 1 : -1;
                ctx.save();
                ctx.translate(tx, y);
                ctx.scale(dir, 1);
                // 甲羅
                ctx.fillStyle = '#2e8b57';
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                // 甲羅模様
                ctx.strokeStyle = '#1a6b3a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-6, -4);
                ctx.lineTo(6, 4);
                ctx.moveTo(6, -4);
                ctx.lineTo(-6, 4);
                ctx.moveTo(0, -8);
                ctx.lineTo(0, 8);
                ctx.stroke();
                // 頭
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.arc(14, -1, 5, 0, Math.PI * 2);
                ctx.fill();
                // ヒレ
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.ellipse(-4, -10, 8, 3, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-4, 10, 8, 3, 0.3, 0, Math.PI * 2);
                ctx.fill();
                // 目
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(16, -2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else if (type === 2) {
                // ヒトデ（大きめ、カラフル）
                const colors = ['#ff6347', '#ff4500', '#ffa500', '#ff69b4', '#9370db'];
                ctx.fillStyle = colors[index % 5];
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(seed * 0.01);
                for (let a = 0; a < 5; a++) {
                    const angle = (a / 5) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle - 0.2) * 4, Math.sin(angle - 0.2) * 4);
                    ctx.lineTo(Math.cos(angle) * 10, Math.sin(angle) * 10);
                    ctx.lineTo(Math.cos(angle + 0.2) * 4, Math.sin(angle + 0.2) * 4);
                    ctx.fill();
                }
                // Dots on starfish
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                for (let d = 0; d < 5; d++) {
                    const da = (d / 5) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.arc(Math.cos(da) * 5, Math.sin(da) * 5, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            } else if (type === 3) {
                // クラゲ（ふわふわアニメーション）
                const bob = Math.sin(now * 0.002 + seed) * 10;
                const pulse = Math.sin(now * 0.004 + seed) * 0.15 + 1;
                ctx.save();
                ctx.translate(x, y + bob);
                // 傘
                ctx.fillStyle = 'rgba(180, 130, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, 10 * pulse, Math.PI, 0);
                ctx.fill();
                // 触手
                ctx.strokeStyle = 'rgba(180, 130, 255, 0.4)';
                ctx.lineWidth = 1;
                for (let t = 0; t < 5; t++) {
                    ctx.beginPath();
                    const tx2 = -6 + t * 3;
                    ctx.moveTo(tx2, 2);
                    ctx.quadraticCurveTo(tx2 + Math.sin(now * 0.003 + t) * 4, 12, tx2, 20);
                    ctx.stroke();
                }
                ctx.restore();
            } else {
                // 熱帯魚の群れ
                for (let f = 0; f < 4; f++) {
                    const fx = x + Math.sin(now * 0.001 + seed + f * 1.5) * 20 + f * 8;
                    const fy = y + Math.cos(now * 0.0015 + seed + f) * 5;
                    const colors = ['#ff6347', '#ffd700', '#00ced1', '#ff69b4'];
                    ctx.fillStyle = colors[f % 4];
                    ctx.beginPath();
                    ctx.ellipse(fx, fy, 5, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Tail
                    ctx.beginPath();
                    ctx.moveTo(fx - 5, fy);
                    ctx.lineTo(fx - 9, fy - 3);
                    ctx.lineTo(fx - 9, fy + 3);
                    ctx.closePath();
                    ctx.fill();
                    // Stripe
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(fx - 1, fy - 3, 2, 6);
                }
            }
        }

        // ===== クジラ =====
        function drawWhale(ctx, x, y, now) {
            const bob = Math.sin(now * 0.001) * 5;
            const breathPhase = Math.sin(now * 0.0005);
            ctx.save();
            ctx.translate(x, y + bob);
            // 体
            ctx.fillStyle = '#2c3e6b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 40, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            // お腹
            ctx.fillStyle = '#7b9cc4';
            ctx.beginPath();
            ctx.ellipse(5, 6, 28, 10, 0, 0, Math.PI);
            ctx.fill();
            // 尾
            ctx.fillStyle = '#2c3e6b';
            ctx.beginPath();
            ctx.moveTo(-38, 0);
            ctx.quadraticCurveTo(-50, -15, -55, -20);
            ctx.quadraticCurveTo(-45, -5, -38, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-38, 0);
            ctx.quadraticCurveTo(-50, 15, -55, 20);
            ctx.quadraticCurveTo(-45, 5, -38, 0);
            ctx.fill();
            // 目
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(28, -4, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(29, -4, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // 潮吹き
            if (breathPhase > 0.3) {
                const sprayH = (breathPhase - 0.3) * 60;
                ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + 15, y + bob - 16);
                ctx.quadraticCurveTo(x + 12, y + bob - 16 - sprayH * 0.7, x + 5, y + bob - 16 - sprayH);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 15, y + bob - 16);
                ctx.quadraticCurveTo(x + 18, y + bob - 16 - sprayH * 0.7, x + 25, y + bob - 16 - sprayH);
                ctx.stroke();
                // 水滴
                ctx.fillStyle = 'rgba(150, 200, 255, 0.4)';
                for (let d = 0; d < 5; d++) {
                    ctx.beginPath();
                    ctx.arc(x + 10 + (d - 2) * 6, y + bob - 16 - sprayH + d * 4, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ===== サンゴ礁 =====
        function drawCoralReef(ctx, now) {
            const coralData = [
                { x: 200, y: MAP_H - 30, color: '#ff6b6b', h: 20 },
                { x: 350, y: MAP_H - 25, color: '#ff69b4', h: 18 },
                { x: 550, y: MAP_H - 35, color: '#ffa500', h: 22 },
                { x: 750, y: MAP_H - 28, color: '#da70d6', h: 16 },
                { x: 1000, y: MAP_H - 32, color: '#ff6347', h: 20 },
                { x: 1200, y: MAP_H - 26, color: '#e040fb', h: 18 },
                { x: 1350, y: MAP_H - 30, color: '#ff4500', h: 15 },
            ];
            coralData.forEach(function(c, i) {
                // サンゴの枝
                ctx.fillStyle = c.color;
                for (let b = 0; b < 4; b++) {
                    const bx = c.x - 8 + b * 6;
                    const bh = c.h * (0.6 + Math.sin(b * 2 + i) * 0.3);
                    ctx.beginPath();
                    ctx.moveTo(bx, c.y);
                    ctx.quadraticCurveTo(bx - 3, c.y - bh * 0.6, bx - 2, c.y - bh);
                    ctx.quadraticCurveTo(bx, c.y - bh - 3, bx + 2, c.y - bh);
                    ctx.quadraticCurveTo(bx + 3, c.y - bh * 0.6, bx, c.y);
                    ctx.fill();
                }
                // 気泡
                const bubblePhase = (now * 0.002 + i * 3) % 30;
                if (bubblePhase < 20) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(c.x + 2, c.y - c.h - bubblePhase, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // ===== 屋形船 =====
        function drawYakatabune(ctx, baseX, baseY, seed, index, now) {
            const speed = 0.00025 + (seed % 10) * 0.00004;
            const x = baseX + Math.sin(now * speed + index * 2.5) * 150;
            const y = baseY + Math.cos(now * speed * 0.4 + index) * 8;
            const bob = Math.sin(now * 0.003 + seed) * 2;
            const dir = Math.cos(now * speed + index * 2.5) > 0 ? 1 : -1;

            ctx.save();
            ctx.translate(x, y + bob);
            ctx.scale(dir, 1);

            // 船体（大きめ）
            ctx.fillStyle = '#5a3320';
            ctx.beginPath();
            ctx.moveTo(-28, 0);
            ctx.lineTo(-22, 12);
            ctx.lineTo(22, 12);
            ctx.lineTo(28, 0);
            ctx.closePath();
            ctx.fill();

            // 甲板
            ctx.fillStyle = '#c4956a';
            ctx.fillRect(-22, -3, 44, 5);

            // 屋根
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(-20, -16);
            ctx.lineTo(-22, -6);
            ctx.lineTo(22, -6);
            ctx.lineTo(20, -16);
            ctx.closePath();
            ctx.fill();
            // 屋根の反り
            ctx.beginPath();
            ctx.moveTo(-22, -16);
            ctx.quadraticCurveTo(-15, -20, -20, -16);
            ctx.fill();

            // 柱
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(-18, -16, 2, 12);
            ctx.fillRect(16, -16, 2, 12);

            // 提灯（大きめ、光あり）
            var lanternGlow = 0.6 + Math.sin(now * 0.005 + seed) * 0.2;
            ctx.fillStyle = 'rgba(255, 60, 0, ' + lanternGlow + ')';
            ctx.beginPath();
            ctx.ellipse(-14, -19, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(14, -19, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // 光のグロー
            ctx.fillStyle = 'rgba(255, 100, 0, 0.1)';
            ctx.beginPath();
            ctx.arc(-14, -19, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(14, -19, 18, 0, Math.PI * 2);
            ctx.fill();

            // 客人（シルエット）
            ctx.fillStyle = '#333';
            for (let p = 0; p < 5; p++) {
                ctx.beginPath();
                ctx.arc(-12 + p * 6, -8, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-13 + p * 6, -6, 3, 3);
            }

            ctx.restore();

            // 航跡
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1.5;
            for (let w = 0; w < 3; w++) {
                ctx.beginPath();
                var wakeX = x - dir * 30 - dir * w * 10;
                ctx.moveTo(wakeX, y + 10 + bob);
                ctx.quadraticCurveTo(wakeX - dir * 15, y + 8 + w * 3 + bob, wakeX - dir * 30, y + 12 + w * 5 + bob);
                ctx.stroke();
            }
        }

        // ===== 花火 =====
        function drawFireworks(ctx, now) {
            var fwData = [
                { x: 400, y: 100, period: 4000, offset: 0 },
                { x: 800, y: 80, period: 5000, offset: 1500 },
                { x: 1200, y: 120, period: 4500, offset: 3000 },
            ];
            fwData.forEach(function(fw) {
                var phase = ((now + fw.offset) % fw.period) / fw.period;
                if (phase < 0.6) {
                    var expand = phase / 0.6;
                    var alpha = 1 - expand * 0.8;
                    var radius = expand * 60;
                    var colors = ['#ff4444', '#ffd700', '#ff69b4', '#44ff44', '#44aaff', '#ff8c00'];
                    for (var r = 0; r < 12; r++) {
                        var angle = (r / 12) * Math.PI * 2;
                        var sparkX = fw.x + Math.cos(angle) * radius;
                        var sparkY = fw.y + Math.sin(angle) * radius;
                        ctx.fillStyle = colors[r % colors.length];
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(sparkX, sparkY, 3 - expand * 2, 0, Math.PI * 2);
                        ctx.fill();
                        // Trail
                        ctx.strokeStyle = colors[r % colors.length];
                        ctx.lineWidth = 1;
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(fw.x, fw.y);
                        ctx.lineTo(sparkX, sparkY);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }
            });
        }

                ctx.moveTo(x - 11, y - 6);
                ctx.lineTo(x + 11, y - 6);

                for (var h = 0; h < 4; h++) {
                    ctx.beginPath();

                }
            } else if (type === 3) {
                // 寿司屋台
                ctx.fillStyle = '#f5f5dc';
                wobbleRect(ctx, x - 16, y - 4, 32, 18, seed);
                ctx.fill();
                ctx.strokeStyle = '#8b7355';
                ctx.lineWidth = 1;
                ctx.stroke();
                // 暖簾
                ctx.fillStyle = '#1a3a5c';
                ctx.fillRect(x - 14, y - 4, 10, 7);
                ctx.fillRect(x + 4, y - 4, 10, 7);
                // 寿司
                var sushiColors = ['#ff6b6b', '#ffa07a', '#ff4500', '#e8e800'];
                for (var s = 0; s < 4; s++) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x - 10 + s * 6, y + 6, 5, 3);
                    ctx.fillStyle = sushiColors[s];

                ctx.textAlign = 'center';
                ctx.fillText('鮨', x, y + 2);
            } else {
                // 煙を出す焼き場
                ctx.fillStyle = '#8b4513';
                wobbleRect(ctx, x - 14, y, 28, 12, seed);
                ctx.fill();
                // 炭火
                ctx.fillStyle = '#ff4500';
                ctx.fillRect(x - 10, y + 2, 20, 4);

        // ===== 商店街アーケード =====
        function drawShoppingArcade(ctx, x, y, now) {
            var arcadeW = 180;
            // 屋根
            ctx.fillStyle = 'rgba(200, 50, 50, 0.8)';
            ctx.beginPath();
            ctx.moveTo(x, y - 20);
            ctx.quadraticCurveTo(x + arcadeW / 2, y - 35, x + arcadeW, y - 20);
            ctx.lineTo(x + arcadeW, y);
            ctx.lineTo(x, y);
            ctx.closePath();
            ctx.fill();

        // (duplicate drawBuilding removed - using version at line ~1512 with ctx parameter)

        function drawCharacter(char) {
            const img = charImages[char.type];
            if (!img || !img.complete) return;

            // Vote bonus scaling and glow
            const voteBonus = votes[char.type] || 0;
            const voteScale = 1 + Math.min(voteBonus * 0.02, 0.5); // Up to 50% bigger
            const baseSize = char.type === 'tsutsuji' ? 168 : char.type === 'ryoushi' ? 300 : 160;
            const size = baseSize * voteScale;
            const aspect = img.naturalWidth / img.naturalHeight;
            const w = size * aspect;
            const h = size;

            // Shadow
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(char.x, char.y + h / 2 + 5, w / 2.5, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Glow effect for popular characters
            if (voteBonus > 0) {
                ctx.save();
                ctx.shadowColor = charMetadata[char.type]?.color || '#ffd700';
                ctx.shadowBlur = 5 + voteBonus * 2;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // Bobbing animation when walking, interacting (mikoshi), or celebration
            let bob = char.state === 'walking' ? Math.sin(Date.now() * 0.008) * 2 : 0;
            if (char.interacting && char.interactionTimer > 0) {
                // Mikoshi bounce animation during interaction
                bob = -Math.abs(Math.sin((4000 - char.interactionTimer) / 500 * Math.PI)) * 8;
            }

            // CHANGE 5: Enhanced 5-second celebration animation with phases
            if (char.celebrating && char.celebrateTimer > 0) {
                const timeElapsed = 5000 - char.celebrateTimer;
                const phase1End = 1000;   // 0-1s
                const phase2End = 3000;   // 1-3s
                const phase3End = 4500;   // 3-4.5s
                // phase4 is 4.5-5s

                if (timeElapsed < phase1End) {
                    // Phase 1: Large jump + aura glowing
                    const p1 = timeElapsed / phase1End;
                    bob = -Math.abs(Math.sin(p1 * Math.PI)) * 50;
                    ctx.shadowBlur = Math.max(5 + voteBonus * 2, 5 + voteBonus * 2 + p1 * 30);
                } else if (timeElapsed < phase2End) {
                    // Phase 2: Bouncing + sparkle particles
                    const p2 = (timeElapsed - phase1End) / (phase2End - phase1End);
                    bob = -Math.abs(Math.sin(p2 * Math.PI * 4)) * 25;

                    // Spawn character-specific colored particles
                    if (Math.random() < 0.3) {
                        const particleColor = {
                            meisui: '#FFD700',           // Gold/yellow
                            tsutsuji: '#FF69B4',         // Pink
                            meisui_chan: '#87CEEB',      // Blue
                            bekabune: '#00CED1',         // Cyan/turquoise
                            asari: '#FF6347',            // Orange/red
                            ryoushi: '#90EE90'           // Green/silver
                        }[char.type] || '#FFD700';

                        particles.push({
                            x: char.x + (Math.random() - 0.5) * 40,
                            y: char.y - 30,
                            vx: (Math.random() - 0.5) * 2,
                            vy: -1 - Math.random() * 2,
                            rotation: Math.random() * Math.PI * 2,
                            rotSpeed: (Math.random() - 0.5) * 0.1,
                            size: 3 + Math.random() * 3,
                            alpha: 1,
                            color: particleColor,
                            type: 'confetti',
                            life: 80
                        });
                    }
                } else if (timeElapsed < phase3End) {
                    // Phase 3: Particles decrease, aura fades
                    const p3 = (timeElapsed - phase2End) / (phase3End - phase2End);
                    bob = -Math.abs(Math.sin(p3 * Math.PI * 2)) * 15 * (1 - p3);
                    ctx.shadowBlur = Math.max(5 + voteBonus * 2, 5 + voteBonus * 2 + (1 - p3) * 30);
                } else {
                    // Phase 4: Smooth fade back to normal
                    const p4 = (timeElapsed - phase3End) / (5000 - phase3End);
                    bob = 0;
                    ctx.shadowBlur = 5 + voteBonus * 2;
                }
            }

            // CHANGE 4: Apply scale pulse effect
            let scaleFactor = voteScale;
            if (char.scalePulse && char.scalePulseTimer > 0) {
                const pulsePhase = 1 - (char.scalePulseTimer / 1000);
                scaleFactor = voteScale * (1 + 0.5 * (1 - Math.pow(pulsePhase, 2)));
            }
            const scaledW = w * scaleFactor / voteScale;
            const scaledH = h * scaleFactor / voteScale;

            // Draw character image (with drag wiggle animation)
            if (draggedChar === char) {
                // ゆらゆらぶんぶんアニメーション：掴まれた点を起点に振り子運動
                const t = Date.now() * 0.001;
                // 複数の周波数を組み合わせて「いやいや」感を出す
                const swing = Math.sin(t * 8) * 15 + Math.sin(t * 12.7) * 8 + Math.sin(t * 5.3) * 5;
                const angleRad = swing * Math.PI / 180;
                // 少し上下にもバウンス
                const bounceY = Math.abs(Math.sin(t * 6)) * 5;

                ctx.save();
                // 掴んだ点（キャラの上端）を起点に回転
                ctx.translate(char.x, char.y - scaledH / 2 + bob - 10);
                ctx.rotate(angleRad);
                ctx.drawImage(img, -scaledW / 2, bounceY, scaledW, scaledH);
                ctx.restore();
            } else {
                ctx.drawImage(img, char.x - scaledW / 2, char.y - scaledH / 2 + bob - 10, scaledW, scaledH);
            }

            if (voteBonus > 0) {
                ctx.restore();
            }

            // Name label
            ctx.font = 'bold 10px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth = 3;
            ctx.strokeText(char.name, char.x, char.y + h / 2 + 10);
            ctx.fillText(char.name, char.x, char.y + h / 2 + 10);

            // Thought bubble when idle
            // Thought bubbles disabled (too noisy)
            if (false && char.state === 'idle' && char.currentThought) {
                drawThoughtBubble(ctx, char.x, char.y - h / 2 - 45, char.currentThought);
            }
        }

        function drawThoughtBubble(ctx, x, y, text) {
            // CHANGE 5: Improved thought bubble with proper text measurement
            ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Set font first to measure correctly
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';

            // Measure text width
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;

            // Calculate bubble dimensions (generous padding)
            let bubbleW = Math.max(140, Math.min(260, textWidth + 30));
            const bubbleH = 48;
            const radius = 12;

            // Bubble background - fully opaque white with shadow
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.fill();
            ctx.restore();

            // Border
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(x - bubbleW / 2, y - bubbleH / 2, bubbleW, bubbleH, radius);
            ctx.stroke();

            // Tail (pointing down to character)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(x - 8, y + bubbleH / 2 - 3);
            ctx.lineTo(x, y + bubbleH / 2 + 14);
            ctx.lineTo(x + 8, y + bubbleH / 2 - 3);
            ctx.fill();

            // Text - display full text at once, larger font
            ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#222';
            ctx.fillText(text, x, y + 6);
        }

        function drawParticles() {
            // Hard limit on particles to prevent memory issues
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }

            particles = particles.filter(p => {
                if (p.type === 'confetti') {
                    return p.life > 0;
                } else {
                    return p.y < MAP_H;
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;

                ctx.save();

                if (p.type === 'confetti') {
                    p.vy += 0.05; // gravity
                    p.life--;
                    ctx.globalAlpha = p.alpha * (p.life / 120);
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                } else {
                    ctx.globalAlpha = p.alpha * (1 - p.y / MAP_H);
                    ctx.fillStyle = '#ffb6c1';
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });
        }

        function updateCharacters(deltaTime) {
            characters.forEach(char => {
                // Skip AI movement if being dragged by user
                if (draggedChar === char) return;

                // Handle celebration
                if (char.celebrating && char.celebrateTimer > 0) {
                    char.celebrateTimer -= deltaTime;
                    if (char.celebrateTimer <= 0) {
                        char.celebrating = false;
                    }
                }

                // CHANGE 4: Handle scale pulse
                if (char.scalePulse && char.scalePulseTimer > 0) {
                    char.scalePulseTimer -= deltaTime;
                    if (char.scalePulseTimer <= 0) {
                        char.scalePulse = false;
                    }
                }

                char.stateTimer += deltaTime;

                // Decide to move or idle
                if (char.state === 'idle') {
                    if (char.stateTimer > 3000 + Math.random() * 3000) {
                        // Pick next waypoint from character's route
                        const route = characterRoutes[char.type];
                        if (route) {
                            char.routeIndex = ((char.routeIndex || 0) + 1) % route.length;
                            const waypoint = route[char.routeIndex];
                            char.targetX = waypoint.x;
                            char.targetY = waypoint.y;
                            char.state = 'walking';
                            char.stateTimer = 0;
                            char.currentThought = null; // Clear thought when starting to walk
                            char.locationDialogueShown = false;
                        }
                    } else if (!char.currentThought && char.stateTimer > 5000 && !char.locationDialogueShown) {
                        // Show random thought after location dialogue expires (stays for full idle period)
                        char.currentThought = char.thoughts[Math.floor(Math.random() * char.thoughts.length)];
                    }
                } else if (char.state === 'walking') {
                    const dx = char.targetX - char.x;
                    const dy = char.targetY - char.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 15) {
                        char.state = 'idle';
                        char.stateTimer = 0;
                        char.x = char.targetX;
                        char.y = char.targetY;

                        // Set location-specific dialogue when arriving at named waypoint
                        const route = characterRoutes[char.type];
                        if (route) {
                            const waypoint = route[char.routeIndex || 0];
                            if (waypoint && waypoint.name && locationDialogues[waypoint.name]) {
                                const dialogues = locationDialogues[waypoint.name];
                                char.currentThought = dialogues[char.type] || dialogues._default || null;
                                char.locationDialogueShown = true;
                            }
                        }
                    } else {
                        const speed = char.speed;
                        char.x += (dx / dist) * speed;
                        char.y += (dy / dist) * speed;
                        // Clamp to map bounds (map image area: x=412-1508, y=0-1080)
                        char.x = Math.max(450, Math.min(1500, char.x));
                        char.y = Math.max(80, Math.min(850, char.y));
                    }
                }
            });
        }

        // ========== ERA-BASED LAND POLYGONS ==========

            ],

        // Pre-computed sorted era years (avoid sorting every frame)
        const sortedEraYears = Object.keys(eraLandPolygons).map(Number).sort((a, b) => a - b);

        // Animation loop
        let lastTime = Date.now();
        function animate() {
            const now = Date.now();
            const deltaTime = now - lastTime;
            lastTime = now;

            // Update
            updateCharacters(deltaTime);


            // V5 Features: Character interactions
            checkCharacterInteractions(characters);

            // V5 Features: Day/Night cycle
            updateDayNightCycle();

            // V5 Features: Fireflies update
            if (ambientPhase > 0.75) {
                updateFireflies();
            }
            // Camera smooth zoom (stretch to fill, user zoom multiplier)
            camera.userZoom += (camera.targetUserZoom - camera.userZoom) * 0.1;
            camera.zoomX = camera.baseZoomX * camera.userZoom;
            camera.zoomY = camera.baseZoomY * camera.userZoom;

            // Clear canvas with sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#c8e6f5');
            gradient.addColorStop(1, '#e0f6ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            // V5 Features: Draw clouds on sky
            updateAndDrawClouds(now);

            // Apply camera transform (stretch to fill screen)
            ctx.save();
            ctx.scale(camera.zoomX, camera.zoomY);

            // Draw map based on current year
            const currentYear = getCurrentYear();
            if (currentYear >= 2026 && mapImage && mapImage.complete) {
                // Modern era: use real map image
                ctx.drawImage(mapImage, 0, 0, MAP_W, MAP_H);
                // Fix garbled AI-generated text on the map image
                fixMapTextLabels(ctx);
                // 海の装飾アニメーション

                // Find the right polygon for current year
                let landPoly = eraLandPolygons[1889]; // default
                const eraYears = sortedEraYears;
                for (let i = eraYears.length - 1; i >= 0; i--) {
                    if (currentYear >= eraYears[i]) {
                        landPoly = eraLandPolygons[eraYears[i]];

                // Draw land
                ctx.fillStyle = '#8FBC8F';
                ctx.beginPath();

        function updateCanvasRect() { cachedCanvasRect = canvas.getBoundingClientRect(); }
        window.addEventListener('resize', updateCanvasRect);
        updateCanvasRect();

        // Convert screen coords to map coords
        function screenToMap(clientX, clientY) {
            if (!cachedCanvasRect) updateCanvasRect();
            return {
                x: (clientX - cachedCanvasRect.left) / camera.zoomX,
                y: (clientY - cachedCanvasRect.top) / camera.zoomY
            };
        }

        // Find character at map coordinates
        function findCharAt(mapX, mapY) {
            for (let i = characters.length - 1; i >= 0; i--) {
                const char = characters[i];
                const dx = char.x - mapX;
                const dy = char.y - mapY;
                const charSize = (char.type === 'tsutsuji' ? 168 : char.type === 'ryoushi' ? 300 : 160) / 2;
                if (Math.abs(dx) < charSize && Math.abs(dy) < charSize) {
                    return char;
                }
            }
            return null;

            } else if (e.touches.length === 2) {
                if (draggedChar) { draggedChar = null; }
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);

            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (lastTouchDist > 0) {
                    const scale = dist / lastTouchDist;
                    camera.targetUserZoom = Math.max(0.5, Math.min(3, camera.targetUserZoom * scale));

                animation: popupBounce 0.5s ease-out;
                font-family: sans-serif;
            `;
            
            const eventText = event.name.includes('た！') || event.name.includes('開催') 
                ? event.name 
                : event.name + '！';
            
            popup.innerHTML = eventText;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                popup.style.opacity = '0';
                popup.style.transition = 'opacity 0.5s';
                setTimeout(() => { popup.remove(); onEventDone(); }, 500);
            }, 4000);
        }

        // ============================================
        // レベルシステム更新（V3新機能）
        // (levelThresholds + getCurrentLevel moved before updateBarGraph)
        // ============================================
        
        function showLevelUpAnimation(newLevel) {
            const anim = document.createElement('div');
            anim.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 550;
                text-align: center;
                animation: levelUpBurst 1.5s ease-out forwards;
                font-family: sans-serif;
            `;
            anim.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 20px;">${newLevel.emoji}</div>
                <div style="
                    font-size: 48px;
                    font-weight: bold;
                    color: #fff;
                    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
                    margin-bottom: 10px;
                ">${newLevel.title}</div>
                <div style="font-size: 24px; color: #ffd700;">に レベルアップ！</div>
            `;
            document.body.appendChild(anim);
            
            setTimeout(() => { anim.remove(); onEventDone(); }, 3000);
        }

    </script>
</body>
