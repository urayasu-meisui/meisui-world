    <script>
        // ============================================
        // Sound Manager (Web Audio API)
        // ============================================
        let audioContext = null;
        let soundEnabled = true;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(soundType) {
            if (!soundEnabled) return;

            initAudioContext();
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            switch(soundType) {
                case 'vote':
                    // Cheerful ascending chime (C-E-G)
                    osc.frequency.setValueAtTime(262, now); // C
                    osc.frequency.setValueAtTime(330, now + 0.1); // E
                    osc.frequency.setValueAtTime(392, now + 0.2); // G
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'correct':
                    // Happy ding
                    osc.frequency.setValueAtTime(523, now); // C5
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'wrong':
                    // Gentle buzzer
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.setValueAtTime(150, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'unlock':
                    // Triumphant fanfare
                    osc.frequency.setValueAtTime(330, now); // E
                    osc.frequency.setValueAtTime(440, now + 0.1); // A
                    osc.frequency.setValueAtTime(523, now + 0.2); // C5
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
                case 'levelup':
                    // Grand ascending scale
                    const notes = [262, 294, 330, 349, 392, 440, 494, 523];
                    for (let i = 0; i < notes.length; i++) {
                        osc.frequency.setValueAtTime(notes[i], now + i * 0.08);
                    }
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
                    osc.start(now);
                    osc.stop(now + 0.7);
                    break;
                case 'event':
                    // Notification bell
                    osc.frequency.setValueAtTime(587, now); // D5
                    osc.frequency.setValueAtTime(659, now + 0.05); // E5
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
            }
        }


        // ============================================
        // BGM System — 年代別BGM自動切替
        // ============================================
        const bgmTracks = {
            village: new Audio('sounds/bgm_village.mp3'),  // 1889-1959
            growth: new Audio('sounds/bgm_growth.mp3'),    // 1969-1989
            modern: new Audio('sounds/bgm_modern.mp3'),    // 1999-2069
            future: new Audio('sounds/bgm_future.mp3'),    // 2079-2100
        };
        // 全トラックをループ設定・音量調整
        Object.values(bgmTracks).forEach(audio => {
            audio.loop = true;
            audio.volume = 0.3;
        });

        let currentBgmKey = null;
        let bgmEnabled = true;

        function getBgmKeyForYear(year) {
            if (year <= 1959) return 'village';
            if (year <= 1989) return 'growth';
            if (year <= 2069) return 'modern';
            return 'future';
        }

        function updateBgm() {
            if (!bgmEnabled || !soundEnabled) {
                // BGMまたはサウンドが無効 → 全停止
                Object.values(bgmTracks).forEach(a => { a.pause(); });
                currentBgmKey = null;
                return;
            }
            const year = getCurrentYear();
            const newKey = getBgmKeyForYear(year);
            if (newKey === currentBgmKey) return; // 同じ曲なら何もしない

            // 現在の曲をフェードアウト
            if (currentBgmKey && bgmTracks[currentBgmKey]) {
                const oldTrack = bgmTracks[currentBgmKey];
                const fadeOut = setInterval(() => {
                    if (oldTrack.volume > 0.05) {
                        oldTrack.volume = Math.max(0, oldTrack.volume - 0.05);
                    } else {
                        oldTrack.pause();
                        oldTrack.volume = 0.3;
                        oldTrack.currentTime = 0;
                        clearInterval(fadeOut);
                    }
                }, 100);
            }

            // 新しい曲をフェードイン
            currentBgmKey = newKey;
            const newTrack = bgmTracks[newKey];
            newTrack.volume = 0;
            newTrack.play().then(() => {
                // 再生成功 → フェードイン
                const fadeIn = setInterval(() => {
                    if (newTrack.volume < 0.25) {
                        newTrack.volume = Math.min(0.3, newTrack.volume + 0.05);
                    } else {
                        clearInterval(fadeIn);
                    }
                }, 100);
            }).catch(() => {
                // 自動再生ブロック → ユーザー操作時に再試行
                bgmPendingPlay = true;
            });
        }

        // 自動再生ブロック対策: ユーザー操作で再試行
        let bgmPendingPlay = false;
        document.addEventListener('click', function bgmRetry() {
            if (bgmPendingPlay && currentBgmKey) {
                bgmPendingPlay = false;
                const track = bgmTracks[currentBgmKey];
                track.volume = 0;
                track.play().then(() => {
                    const fadeIn = setInterval(() => {
                        if (track.volume < 0.25) {
                            track.volume = Math.min(0.3, track.volume + 0.05);
                        } else {
                            clearInterval(fadeIn);
                        }
                    }, 100);
                }).catch(() => {});
            }
        });

        // サウンドトグルにBGMも連動
        const origToggleSound = toggleSound;
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggleBtn');
            if (btn) {
                btn.textContent = soundEnabled ? '🔊' : '🔇';
            }
            updateBgm();
        }

        // Character image data URLs


        // Load real map image (MAP_2009- = real Urayasu map)
        const mapImage = new Image();
        mapImage.src = 'map_real.png';
        mapImage.onerror = function() {
            this.src = 'urayasu_map.webp'; // fallback to old map
        };

        // Sea overlay images for reclamation stages
        const seaStage1 = new Image(); seaStage1.src = 'sea_stage1.png'; // 1889-1959: 元町のみ
        const seaStage2 = new Image(); seaStage2.src = 'sea_stage2.png'; // 1969-1978: 元町+中町
        const seaStage3 = new Image(); seaStage3.src = 'sea_stage3.png'; // 1979-1988: +舞浜+新町

        // Initialize voting grid
        function initVoteGrid() {
            const voteGridContainer = document.getElementById('voteGridContainer');
            const voteData = [
                { type: 'meisui', name: 'イチョウめいすいくん', img: charImages.meisui },
                { type: 'meisui_chan', name: 'ビーナスめいちゃん', img: charImages.meisui_chan },
                { type: 'tsutsuji', name: 'ツツジめいちゃん', img: charImages.tsutsuji },
                { type: 'bekabune', name: '浦安の海めいすいくん', img: charImages.bekabune },
                { type: 'asari', name: '屋形船めいすいくん', img: charImages.asari },
                { type: 'ryoushi', name: '漁師めいすいくん', img: charImages.ryoushi },

            let html = '';
            voteData.forEach(data => {
                const cardHtml = '<div class="vote-card" data-type="' + data.type + '" onclick="castVote(\'' + data.type + '\')"><img src="' + data.img.src + '" /><div class="vote-card-name">' + data.name + '</div><div class="vote-card-count" id="vc-' + data.type + '">0票</div></div>';
                html += cardHtml;
            });
            voteGridContainer.innerHTML = html;
        }

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // CHANGE 4: minimapCanvas and minimapCtx removed

        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight - 36;

        // Map constants
        const TILE_SIZE = 32;

        // Landmarks (x, y, width, height, type, name, emoji)

        // Character walking routes - waypoints along actual roads on the map
        // キャラクターの行動圏: 'land'=陸のみ, 'sea'=海/川のみ, 'both'=両方


        // Location-specific dialogues for named waypoints

        // Character data

        // ============================================
        // Mikoshi Event Display
        // ============================================
        function showMikoshiEvent(char1, char2) {
            // Calculate center point between two characters
            const centerX = (char1.x + char2.x) / 2;
            const centerY = (char1.y + char2.y) / 2;

            // Create DOM overlay for mikoshi event
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                left: 0; top: 0; width: 100%; height: 100%;
                pointer-events: none;
                z-index: 300;
            `;

            // Calculate screen position from map coordinates
            const titleBarH = window.innerWidth <= 768 ? 36 : 50;
            const screenX = centerX * camera.zoomX;
            const screenY = centerY * camera.zoomY + 36;

            // Mikoshi text that bounces
            const mikoshi = document.createElement('div');
            mikoshi.style.cssText = `
                position: absolute;
                left: ${screenX - 100}px;
                top: ${Math.max(20, screenY - 120)}px;
                width: 200px;
                text-align: center;
                font-size: 32px;
                font-weight: 900;
                color: #d32f2f;
                text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 20px #ffd700;
                animation: mikoshiBounce 0.5s ease infinite;
                font-family: sans-serif;
            `;
            mikoshi.innerHTML = '🏮 まいだ！まいだ！🏮<br><span style="font-size:16px;color:#ff6f00;">' + char1.type.replace('_', ' ') + ' × ' + char2.type.replace('_', ' ') + '</span>';
            overlay.appendChild(mikoshi);

            // Spawn festival particles
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const colors = ['#ff1744', '#ffd600', '#ff6d00', '#ff4081', '#ffab00'];
                const size = 6 + Math.random() * 8;
                particle.style.cssText = `
                    position: absolute;
                    width: ${size}px; height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    left: ${screenX + (Math.random() - 0.5) * 200}px;
                    top: ${screenY + (Math.random() - 0.5) * 100}px;
                    animation: mikoshiParticle ${1 + Math.random() * 2}s ease-out forwards;
                    pointer-events: none;
                `;
                overlay.appendChild(particle);
            }

            document.body.appendChild(overlay);

            // Remove after 4 seconds
            setTimeout(() => {
                overlay.style.transition = 'opacity 0.5s';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }, 3500);
        }

        // ============================================
        // Simple Interaction Event (for 4 other events)
        // ============================================
        function showSimpleInteractionEvent(char1, char2, event) {
            const centerX = (char1.x + char2.x) / 2;
            const centerY = (char1.y + char2.y) / 2;
            const titleBarH = window.innerWidth <= 768 ? 36 : 50;
            const screenX = centerX * camera.zoomX;
            const screenY = centerY * camera.zoomY + 36;

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:300;';

            const text = document.createElement('div');
            text.style.cssText = `position:absolute;left:${screenX-80}px;top:${Math.max(20,screenY-80)}px;width:160px;text-align:center;font-size:20px;font-weight:bold;color:#333;background:rgba(255,255,255,0.95);border-radius:12px;padding:10px;box-shadow:0 4px 15px rgba(0,0,0,0.2);animation:popScale 0.3s ease;font-family:sans-serif;`;
            text.innerHTML = `<div style="font-size:28px;">${event.emoji}</div><div>${event.name}</div><div style="font-size:11px;color:#888;margin-top:4px;">${char1.name} × ${char2.name}</div>`;
            overlay.appendChild(text);
            document.body.appendChild(overlay);

            setTimeout(() => {
                overlay.style.transition = 'opacity 0.5s';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }, 2500);
        }

        // ============================================
        // Cloud System
        // ============================================
        let clouds = [];
        
        function initClouds() {
            for (let i = 0; i < 7; i++) {
                clouds.push({
                    x: Math.random() * window.innerWidth,
                    y: 50 + Math.random() * 100,
                    width: 60 + Math.random() * 80,
                    height: 30 + Math.random() * 40,
                    speed: 0.02 + Math.random() * 0.05,
                    opacity: 0.5 + Math.random() * 0.3
                });
            }
        }

        function drawCloud(x, y, width, height) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(x, y, height * 0.5, 0, Math.PI * 2);
            ctx.arc(x + width * 0.3, y - height * 0.2, height * 0.6, 0, Math.PI * 2);
            ctx.arc(x + width * 0.6, y, height * 0.55, 0, Math.PI * 2);
            ctx.arc(x + width, y - height * 0.15, height * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateAndDrawClouds(now) {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > window.innerWidth + cloud.width) {
                    cloud.x = -cloud.width;
                }
                drawCloud(cloud.x, cloud.y, cloud.width, cloud.height);
            });
        }

        // ============================================
        // Day/Night Cycle System
        // ============================================
        let dayNightCycle = 0; // 0 = Day, 1 = Dusk, 2 = Night, 3 = Dawn
        let ambientPhase = 0; // 0-1 cycle every 3 minutes = 180000ms
        
        function updateDayNightCycle() {
            // Disabled — daytime only mode
            ambientPhase = 0.35; // Always daytime
        }

        // CHANGE 6: Draw night time effects (stars, moon, building lights, street lamps)
        function drawNightEffects(ctx, now) {
            if (ambientPhase < 0.75 || ambientPhase > 1) return; // Only during night phase

            const timeInNight = (ambientPhase - 0.75) / 0.25; // 0-1 during night

            // Draw stars (20-30 small white dots with twinkle)
            ctx.save();
            ctx.globalAlpha = 0.3 + timeInNight * 0.4;
            ctx.fillStyle = 'white';

            // Use deterministic random stars based on position
            for (let i = 0; i < 30; i++) {
                const seed = i * 12345;
                const starX = (seed * 7919) % MAP_W;
                const starY = (seed * 6091) % (MAP_H * 0.6); // Upper 60% of sky

                // Twinkle animation
                const twinkle = Math.sin(now * 0.002 + i) * 0.5 + 0.5;
                ctx.globalAlpha = (0.3 + timeInNight * 0.4) * twinkle;
                ctx.beginPath();
                ctx.arc(starX, starY, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw BIG prominent moon in upper-right (CHANGE 1: much bigger, focal point)
            ctx.globalAlpha = 0.8 + timeInNight * 0.15;
            ctx.fillStyle = 'white';
            const moonX = MAP_W - 200;
            const moonY = 120;
            ctx.beginPath();
            ctx.arc(moonX, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

            // Moon shadow for subtle depth (optional crescent effect)
            ctx.globalAlpha = (0.1 + timeInNight * 0.03);
            ctx.fillStyle = 'rgba(25, 50, 130, 1)';
            ctx.beginPath();
            ctx.arc(moonX + 20, moonY, 85, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // ============================================
        // Character Interaction System
        // ============================================
        // Cooldown to prevent interaction spam
        let lastInteractionTime = 0;
        let nextInteractionAllowed = Date.now() + 60000; // First event after 60s

        function checkCharacterInteractions(chars) {
            const now = Date.now();

            // Update active interaction timers using real time (not frame-dependent)
            chars.forEach(char => {
                if (char.interacting && char.interactionEndTime) {
                    if (now >= char.interactionEndTime) {
                        char.interacting = false;
                        char.interactionEndTime = 0;
                    }
                    // Keep interactionTimer for animation calculations
                    char.interactionTimer = Math.max(0, char.interactionEndTime - now);
                }
            });

            // Hard cooldown: minimum 60 seconds between events
            if (now < nextInteractionAllowed) return;

            // モーダル/クイズ表示中はインタラクション抑制
            if (window.voteInProgress || document.getElementById('voteModal')?.style.display !== 'none' || document.getElementById('quizModal')) return;

            // Check if any pair is close enough
            let triggered = false;
            for (let i = 0; i < chars.length && !triggered; i++) {
                for (let j = i + 1; j < chars.length && !triggered; j++) {
                    const char1 = chars[i];
                    const char2 = chars[j];
                    const dx = char1.x - char2.x;
                    const dy = char1.y - char2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80 && !char1.interacting && !char2.interacting && !char1.celebrating && !char2.celebrating) {
                        nextInteractionAllowed = now + 60000 + Math.random() * 30000;
                        triggered = true;

                        const allEvents = [
                            { name: 'まいだ！まいだ！', emoji: '🏮', isMikoshi: true },
                            { name: 'じゃんけん大会', emoji: '✊✌️✋' },
                            { name: 'ハイタッチ', emoji: '🙌' },
                            { name: '浦安盆踊り', emoji: '💃🕺' },
                            { name: '記念撮影', emoji: '📸' },
                        ];
                        const event = allEvents[Math.floor(Math.random() * allEvents.length)];

                        char1.interacting = true;
                        char2.interacting = true;
                        char1.interactionEndTime = now + 3000;
                        char2.interactionEndTime = now + 3000;
                        char1.interactionTimer = 3000;
                        char2.interactionTimer = 3000;
                        char1.state = 'idle';
                        char2.state = 'idle';
                        char1.stateTimer = 0;
                        char2.stateTimer = 0;

                        if (event.isMikoshi) {
                            showMikoshiEvent(char1, char2);
                        } else {
                            showSimpleInteractionEvent(char1, char2, event);
                        }
                        playSound('event');
                        break;
                    }
                }
            }
        }

                fly.y += Math.sin(fly.bobPhase) * 0.3;
            });
        }

        // Seeded pseudo-random for consistent wobble per object
        function seededRandom(seed) {
            let s = seed || 1;
            return function() {
                s = (s * 16807) % 2147483647;
                return (s & 0x7fffffff) / 0x7fffffff;
            };
        }

        // Draw a wobbly rectangle (hand-drawn look)
        function wobbleRect(ctx, x, y, w, h, seed) {
            const rng = seededRandom(seed);
            const jitter = 2;
            ctx.beginPath();
            ctx.moveTo(x + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + rng()*jitter);
            ctx.lineTo(x + w + rng()*jitter, y + h + rng()*jitter);
            ctx.lineTo(x + rng()*jitter, y + h + rng()*jitter);
            ctx.closePath();
        }

        // Draw a wobbly circle
        function wobbleCircle(ctx, cx, cy, r, seed) {
            const rng = seededRandom(seed);
            const points = 20;
            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const wobble = r + (rng()-0.5) * r * 0.15;
                const px = cx + Math.cos(angle) * wobble;
                const py = cy + Math.sin(angle) * wobble;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

        // Pre-render static map once

        function renderGround() {
            // CHANGE 3: Fill ocean (blue) first
            staticCtx.fillStyle = '#4a9de0';
            staticCtx.fillRect(0, 0, MAP_W, MAP_H);

            // CHANGE 3: Urayasu-like shape polygon
            const urayasuPath = [
                [80, 100],    // NW corner (Edogawa river side)
                [200, 50],    // North edge, slightly east
                [600, 30],    // North-central
                [1000, 20],   // North-east
                [1400, 50],   // Far northeast
                [1550, 100],  // East edge top
                [1580, 400],  // East coast
                [1560, 600],  // Southeast (Disney area)
                [1400, 700],  // South-southeast
                [1000, 750],  // South central (bay)
                [600, 720],   // South-west bay
                [300, 680],   // SW coast
                [120, 600],   // West coast south
                [80, 400],    // West (Edogawa river)
            ];

            // Fill land polygon with green
            staticCtx.fillStyle = '#7cb87c';
            staticCtx.beginPath();
            staticCtx.moveTo(urayasuPath[0][0], urayasuPath[0][1]);
            for (let i = 1; i < urayasuPath.length; i++) {
                staticCtx.lineTo(urayasuPath[i][0], urayasuPath[i][1]);
            }
            staticCtx.closePath();
            staticCtx.fill();

            // Organic green patches (watercolor effect) - within land only
            for (let i = 0; i < 80; i++) {
                const x = Math.random() * MAP_W;
                const y = Math.random() * (MAP_H - 250);

                // Simple check: roughly within the polygon (approximate)
                if (x < 100 || x > 1500 || y > 700) continue; // Skip obvious ocean areas

                const r = 30 + Math.random() * 80;
                const grad = staticCtx.createRadialGradient(x, y, 0, x, y, r);
                const colors = ['#6db86d','#8dca8d','#5da85d','#9dd89d','#4d984d'];
                const green = colors[Math.floor(Math.random()*colors.length)];
                grad.addColorStop(0, green);
                grad.addColorStop(1, 'rgba(124,184,124,0)');
                staticCtx.fillStyle = grad;
                staticCtx.beginPath();
                wobbleCircle(staticCtx, x, y, r, i*7);
                staticCtx.fill();
            }

            // Tiny flower dots scattered (on land only)
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * MAP_W;
                const y = Math.random() * (MAP_H - 270);

                // Rough land check
                if (x < 100 || x > 1500 || y > 700) continue;

                const colors = ['#ff9','#fcc','#ccf','#ffc','#cff'];
                staticCtx.fillStyle = colors[Math.floor(Math.random()*5)];
                staticCtx.beginPath();
                staticCtx.arc(x, y, 1.5 + Math.random()*2, 0, Math.PI*2);
                staticCtx.fill();
            }
        }

        function renderWater() {
            // Tokyo Bay
            const bayGrad = staticCtx.createLinearGradient(0, MAP_H-200, 0, MAP_H);
            bayGrad.addColorStop(0, '#6cb4ee');
            bayGrad.addColorStop(0.5, '#4a9de0');
            bayGrad.addColorStop(1, '#3888cc');
            staticCtx.fillStyle = bayGrad;
            staticCtx.fillRect(0, MAP_H-200, MAP_W, 200);

            // 旧江戸川 (left river)
            const riverGrad = staticCtx.createLinearGradient(0, 0, 120, 0);
            riverGrad.addColorStop(0, '#4a9de0');
            riverGrad.addColorStop(1, '#6cb4ee');
            staticCtx.fillStyle = riverGrad;
            staticCtx.beginPath();
            staticCtx.moveTo(0, 0);
            for (let y = 0; y <= MAP_H; y += 15) {
                staticCtx.lineTo(80 + Math.sin(y*0.02)*15 + Math.sin(y*0.05)*5, y);
            }
            staticCtx.lineTo(0, MAP_H);
            staticCtx.closePath();
            staticCtx.fill();
        }

        function renderRoads() {
            // Draw road paths with chalk/pencil texture
            staticCtx.strokeStyle = '#d4b896';
            staticCtx.lineWidth = 22;
            staticCtx.lineCap = 'round';
            staticCtx.lineJoin = 'round';

            staticCtx.beginPath();
            pathWaypoints.forEach((wp, idx) => {
                const wobble = Math.sin(idx*2.3)*2 + Math.cos(idx*1.7)*2;
                if (idx === 0) staticCtx.moveTo(wp.x, wp.y);
                else staticCtx.lineTo(wp.x, wp.y);
            });
            staticCtx.stroke();

            // Lighter center line
            staticCtx.strokeStyle = '#e8d5b8';
            staticCtx.lineWidth = 12;
            staticCtx.stroke();
        }

        function drawBuilding(ctx, x, y, w, h, type, name, emoji) {
            const seed = x * 1000 + y;

            switch(type) {
                case 'shrine':
                    // Cute red torii gate and shrine
                    ctx.fillStyle = '#e8ddd0';
                    wobbleRect(ctx, x+4, y+h*0.4, w-8, h*0.6, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#8b7355';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Red torii
                    ctx.fillStyle = '#cc3333';
                    ctx.fillRect(x+w*0.2, y+h*0.3, 4, h*0.7);
                    ctx.fillRect(x+w*0.75, y+h*0.3, 4, h*0.7);
                    ctx.fillRect(x+w*0.1, y+h*0.3, w*0.8, 5);
                    ctx.fillRect(x+w*0.15, y+h*0.45, w*0.7, 3);
                    // Roof
                    ctx.fillStyle = '#555';
                    ctx.beginPath();
                    ctx.moveTo(x-2, y+h*0.4);
                    ctx.lineTo(x+w/2, y+h*0.15);
                    ctx.lineTo(x+w+2, y+h*0.4);
                    ctx.fill();
                    break;

                case 'station':
                    // Train station with platform
                    ctx.fillStyle = '#e0e8f0';
                    wobbleRect(ctx, x, y+h*0.2, w, h*0.8, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#7090b0';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Blue roof
                    ctx.fillStyle = '#4a7ca0';
                    ctx.beginPath();
                    ctx.moveTo(x-5, y+h*0.25);
                    ctx.lineTo(x+w/2, y);
                    ctx.lineTo(x+w+5, y+h*0.25);
                    ctx.closePath();
                    ctx.fill();
                    // Windows
                    for (let i = 0; i < 3; i++) {
                        ctx.fillStyle = '#a0c8e8';
                        wobbleRect(ctx, x+8+i*(w-16)/3, y+h*0.35, (w-24)/3, h*0.25, seed+i);
                        ctx.fill();
                        ctx.strokeStyle = '#7090b0';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                    break;

                case 'vote':
                    // Voting booth - white with red accent
                    ctx.fillStyle = '#f8f0e8';
                    wobbleRect(ctx, x, y+h*0.15, w, h*0.85, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#b09070';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Red band at top
                    ctx.fillStyle = '#cc3333';
                    ctx.fillRect(x+3, y+h*0.15, w-6, h*0.12);
                    // Ballot box
                    ctx.fillStyle = '#ddd';
                    wobbleRect(ctx, x+w*0.25, y+h*0.45, w*0.5, h*0.35, seed+5);
                    ctx.fill();
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // Slot on top
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x+w*0.35, y+h*0.45);
                    ctx.lineTo(x+w*0.65, y+h*0.45);
                    ctx.stroke();
                    break;

                case 'shop':
                    // Colorful shop
                    ctx.fillStyle = '#ff6b6b';
                    wobbleRect(ctx, x, y, w, h, seed);
                    ctx.fill();
                    ctx.strokeStyle = '#cc5555';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Yellow window

                case 'school':

            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.fillText(label, x+w/2, y+h+17);
        }

        function drawTree(ctx, x, y, type, seed) {
            const rng = seededRandom(seed);
            // Trunk
            ctx.fillStyle = '#8b6e4e';
            wobbleRect(ctx, x-3, y, 6, 15, seed);
            ctx.fill();

            if (type === 'cherry') {
                // Pink fluffy crown
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = 'rgba(' + (230+rng()*25) + ', ' + (140+rng()*40) + ', ' + (160+rng()*40) + ', 0.7)';
                    wobbleCircle(ctx, x + (rng()-0.5)*12, y - 8 + (rng()-0.5)*8, 8+rng()*5, seed+i);
                    ctx.fill();
                }
            } else {
                // Green fluffy crown
                for (let i = 0; i < 4; i++) {
                    ctx.fillStyle = 'rgba(' + (50+rng()*40) + ', ' + (120+rng()*60) + ', ' + (30+rng()*30) + ', 0.8)';
                    wobbleCircle(ctx, x + (rng()-0.5)*10, y - 10 + (rng()-0.5)*8, 10+rng()*6, seed+i);
                    ctx.fill();
                }
            }
        }
