<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>浦安ご当地めいすいくん人気投票選挙 - 投票</title>
  <script src="js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
      background:#F5F0E8;
      height:100vh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      user-select:none;
      -webkit-user-select:none;
    }

    /* 紙テクスチャ風のノイズ（CSS only） */
    body::before {
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    .header { display:none; }

    /* 接続状態 */
    .connection-status { position:fixed;top:10px;right:12px;z-index:100; }
    .status-dot { display:inline-block;width:8px;height:8px;border-radius:50%;background:#4caf50; }
    .status-dot.offline { background:#f44336; }

    /* ===== 指示テキスト ===== */
    .instruction {
      text-align:center;padding:10px 0 6px;flex-shrink:0;
      font-family:'Noto Sans JP',sans-serif;font-size:22px;font-weight:700;
      color:#2D2D2D;letter-spacing:2px;z-index:1;position:relative;
    }

    /* ===== キャラグリッド ===== */
    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(2,1fr);
      gap:10px;
      padding:6px 14px 10px;
      flex:1;min-height:0;
      position:relative;z-index:1;
    }

    /* ===== キャラカード（投票用紙風） ===== */
    .char-card {
      background:#fff;
      border-radius:6px;
      border:1.5px solid #D4C9B8;
      padding:6px 4px 8px;
      text-align:center;
      box-shadow:0 1px 4px rgba(0,0,0,0.06);
      cursor:pointer;
      transition:all 0.2s;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      -webkit-tap-highlight-color:transparent;
      overflow:hidden;
      position:relative;
    }
    .char-card:active {
      transform:scale(0.97);
      box-shadow:0 0 0 3px #C41E3A44;
    }
    .char-card.selected {
      border-color:#C41E3A;
      background:rgba(196,30,58,0.04);
    }
    .char-card img {
      width:100%;flex:1;min-height:0;
      object-fit:contain;pointer-events:none;
    }

    /* 名前（カード下に） */
    .char-name {
      font-weight:900;line-height:1;
      font-size:1.05em;white-space:nowrap;color:#2D2D2D;
      font-family:'Noto Sans JP',sans-serif;
      margin-top:2px;flex-shrink:0;
    }

    /* チェックマーク（キャラ右下に大きく） */
    .vote-circle {
      position:absolute;bottom:24px;right:6px;
      width:40px;height:40px;border-radius:50%;
      border:3px solid rgba(255,255,255,0.7);
      display:flex;align-items:center;justify-content:center;
      transition:all 0.25s;
      font-size:0;background:rgba(255,255,255,0.2);
      backdrop-filter:blur(4px);
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    .char-card.selected .vote-circle {
      background:#C41E3A;border-color:#C41E3A;
      font-size:22px;color:#fff;
      box-shadow:0 2px 12px rgba(196,30,58,0.5);
      transform:scale(1.15);
    }

    /* ===== フッター ===== */
    .footer {
      text-align:center;padding:6px 0;flex-shrink:0;
      border-top:1px solid #D4C9B8;
      font-size:10px;color:#999;letter-spacing:1px;
      position:relative;z-index:1;
      font-family:'Noto Sans JP',sans-serif;
    }

    /* ===== 確認ダイアログ（投票所風） ===== */
    .confirm-overlay {
      position:fixed;inset:0;z-index:400;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.45);
      animation:fadeIn 0.2s ease-out;
    }
    .confirm-card {
      background:#FFFDF8;border-radius:12px;padding:32px 40px;
      text-align:center;max-width:520px;width:85%;
      box-shadow:0 12px 48px rgba(0,0,0,0.25);
      border:2px solid #D4C9B8;
    }
    .confirm-card img {
      width:180px;height:auto;margin-bottom:16px;
    }
    .confirm-name {
      font-size:2em;font-weight:900;margin-bottom:6px;
    }
    .confirm-msg {
      font-size:1.6em;color:#666;margin-bottom:24px;
      font-family:'Noto Serif JP',serif;
    }
    .confirm-btns {
      display:flex;gap:16px;justify-content:center;
    }
    .confirm-btns button {
      font-size:1.6em;font-weight:bold;padding:14px 40px;
      border-radius:8px;border:none;cursor:pointer;
      font-family:'Noto Sans JP',sans-serif;
      transition:transform 0.1s;
    }
    .confirm-btns button:active { transform:scale(0.95); }
    .confirm-yes {
      background:#C41E3A;color:#fff;
      box-shadow:0 3px 10px rgba(196,30,58,0.3);
    }
    .confirm-no {
      background:#E8E0D4;color:#666;
    }

    /* ===== 感謝オーバーレイ ===== */
    .thank-overlay {
      position:fixed;inset:0;z-index:500;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      animation:fadeIn 0.3s ease-out;
      pointer-events:all;
    }
    .thank-overlay img {
      width:360px;height:360px;object-fit:contain;margin-bottom:20px;
    }
    .thank-text {
      font-size:3.6em;font-weight:900;color:#fff;
      text-shadow:0 4px 16px rgba(0,0,0,0.3);
      text-align:center;line-height:1.5;
      font-family:'Noto Sans JP',sans-serif;
    }
    .thank-next {
      font-size:2.6em;font-weight:900;color:#fff;
      margin-top:28px;animation:blink 0.8s ease-in-out infinite;
      font-family:'Noto Sans JP',sans-serif;
      text-shadow:0 0 20px rgba(255,255,255,0.6),0 2px 8px rgba(0,0,0,0.3);
      letter-spacing:3px;
    }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(0.97); }
    }

    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }
    @keyframes pulse {
      0%,100% { opacity:0.5; }
      50% { opacity:1; }
    }

    /* ===== 投票用紙カットイン ===== */
    @keyframes ballotBoxAppear {
      0%   { transform:translateX(-50%) scale(0); }
      65%  { transform:translateX(-50%) scale(1.12); }
      100% { transform:translateX(-50%) scale(1); }
    }
    @keyframes ballotBoxShake {
      0%,100% { transform:translateX(-50%) scale(1) rotate(0deg); }
      20%  { transform:translateX(calc(-50% - 24px)) scale(1.06) rotate(-5deg); }
      40%  { transform:translateX(calc(-50% + 24px)) scale(1.06) rotate(5deg); }
      60%  { transform:translateX(calc(-50% - 12px)) scale(1.02) rotate(-2deg); }
      80%  { transform:translateX(calc(-50% + 12px)) scale(1.02) rotate(2deg); }
    }
    @keyframes ballotPaperFall {
      0%   { transform:translateX(-50%) translateY(-660px) rotate(-8deg); opacity:0; }
      12%  { opacity:1; }
      64%  { transform:translateX(-50%) translateY(360px) rotate(-1deg); opacity:1; }
      80%  { transform:translateX(-50%) translateY(414px) scaleY(0.45) rotate(0deg); opacity:0.7; }
      93%  { transform:translateX(-50%) translateY(444px) scaleY(0.08) rotate(0deg); opacity:0.2; }
      100% { transform:translateX(-50%) translateY(456px) scaleY(0) rotate(0deg); opacity:0; }
    }
    @keyframes ballotDoneText {
      0%   { transform:translateX(-50%) scale(0); opacity:0; }
      60%  { transform:translateX(-50%) scale(1.18); opacity:1; }
      100% { transform:translateX(-50%) scale(1); opacity:1; }
    }

    /* 管理者用リセットボタン */
    .admin-footer { display:none;position:fixed;bottom:8px;right:8px;z-index:100; }
    .reset-btn {
      background:#78909c;color:white;border:none;
      padding:8px 14px;border-radius:6px;font-size:0.8em;cursor:pointer;opacity:0.6;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🗳️</span>
      <span class="header-title">投 票 用 紙</span>
    </div>
    <div class="header-right">浦安ご当地めいすいくん人気投票選挙</div>
  </div>

  <!-- 接続状態 -->
  <div class="connection-status">
    <span class="status-dot" id="statusDot"></span>
  </div>

  <!-- 指示 -->
  <div class="instruction">🗳️ 好きなキャラクターをタップしてね</div>

  <!-- グリッド -->
  <div class="grid" id="grid"></div>

  <!-- フッター -->
  <div class="footer">浦安市明るい選挙推進協議会 ／ 浦安市選挙管理委員会</div>

  <!-- 管理者 -->
  <div class="admin-footer" id="adminFooter">
    <button class="reset-btn" id="resetBtn">リセット</button>
  </div>

  <script>
    // Firebase初期化
    firebase.initializeApp({
      apiKey: "AIzaSyCitq3ZmZ2lbF_mPSermXvbEE77X0jJW2o",
      authDomain: "meisui-world.firebaseapp.com",
      databaseURL: "https://meisui-world-default-rtdb.firebaseio.com",
      projectId: "meisui-world",
      storageBucket: "meisui-world.firebasestorage.app",
      messagingSenderId: "966808863030",
      appId: "1:966808863030:web:a1b85eb17974162c673397"
    });
    const db = firebase.database();

    let voting = false;
    let currentVotes = {};

    function getNextMilestone(charType) {
      const v = currentVotes[charType] || 0;
      const effect = charEffects[charType];
      if (!effect) return null;
      for (let i = 0; i < effect.thresholds.length; i++) {
        if (v < effect.thresholds[i]) {
          return { remaining: effect.thresholds[i] - v, label: effect.levels[i] };
        }
      }
      return null;
    }

    function updatePreviews() {}

    // キャラカード生成（投票用紙風）
    function renderGrid() {
      const grid = document.getElementById('grid');
      const policies = {
        meisui: '環境・緑化',
        tsutsuji: '子育て・教育',
        meisui_chan: '観光・まちづくり',
        bekabune: '環境保全・三番瀬',
        asari: '文化・伝統継承',
        ryoushi: '産業振興・商業',
      };
      const shortNames = {
        meisui: 'イチョウめいすいくん',
        tsutsuji: 'ツツジめいちゃん',
        meisui_chan: 'ビーナスめいちゃん',
        bekabune: '浦安の海めいすいくん',
        asari: '屋形船めいすいくん',
        ryoushi: '漁師めいすいくん',
      };

      // キャラ順をシャッフル（ページ読み込みごとにランダム）
      const shuffled = [...CHAR_TYPES].sort(() => Math.random() - 0.5);
      shuffled.forEach(type => {
        const meta = charMetadata[type];
        const img = charImages[type];

        const card = document.createElement('div');
        card.className = 'char-card';
        card.dataset.type = type;

        // キャラ画像
        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.alt = meta.name;
        card.appendChild(imgEl);

        // 名前
        const nameEl = document.createElement('div');
        nameEl.className = 'char-name';
        nameEl.textContent = shortNames[type] || meta.name;
        card.appendChild(nameEl);

        // 投票丸印
        const circle = document.createElement('div');
        circle.className = 'vote-circle';
        circle.textContent = '✓';
        card.appendChild(circle);

        card.addEventListener('click', () => {
          // 選択状態のアニメーション
          document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          setTimeout(() => vote(type), 300);
        });
        grid.appendChild(card);
      });
    }

    // 確認ダイアログ（投票所風）
    function vote(type) {
      if (voting) return;
      const meta = charMetadata[type];
      const img = charImages[type];

      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-card">
          ${img?.src ? '<img src="' + img.src + '" alt="' + meta.name + '">' : ''}
          <div class="confirm-name" style="color:${meta.color};">${meta.name}</div>
          <div class="confirm-msg">に投票しますか？</div>
          <div class="confirm-btns">
            <button class="confirm-no" id="confirmNo">やめる</button>
            <button class="confirm-yes" id="confirmYes">投票する</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#confirmNo').addEventListener('click', () => {
        overlay.remove();
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      });
      overlay.querySelector('#confirmYes').addEventListener('click', () => {
        overlay.remove();
        doVote(type);
      });
    }

    // 投票処理
    function doVote(type) {
      if (voting) return;
      voting = true;
      const voteRef = db.ref(`votes/${type}`);
      voteRef.transaction(current => (current || 0) + 1)
        .then(result => {
          if (result.committed) {
            db.ref('stats').update({
              lastVoteChar: type + '|' + Date.now(),
              lastVoteTime: Date.now()
            }).catch(err => console.warn('stats通知失敗:', err));
            showThankYou(type);
          } else {
            voting = false;
          }
        })
        .catch(err => {
          console.error('投票失敗:', err);
          voting = false;
        });
    }

    // 投票用紙カットイン
    function showBallotCutin(type, meta) {
      const charColor = meta.color;
      const charName = meta.name;

      const cutin = document.createElement('div');
      cutin.style.cssText = `
        position:fixed;inset:0;z-index:600;
        pointer-events:none;background:rgba(10,10,30,0.88);
        display:flex;align-items:center;justify-content:center;
      `;

      const container = document.createElement('div');
      container.style.cssText = 'position:relative;width:780px;height:1200px;';

      // 投票箱
      const boxEl = document.createElement('div');
      boxEl.style.cssText = `
        position:absolute;bottom:20px;left:50%;
        transform:translateX(-50%) scale(0);
        animation:ballotBoxAppear 0.45s 0.1s cubic-bezier(0.34,1.56,0.64,1) forwards,
                  ballotBoxShake 0.45s 1.55s ease forwards;
        transform-origin:bottom center;
      `;
      boxEl.innerHTML = `
        <svg width="450" height="510" viewBox="0 0 150 170" style="filter:drop-shadow(0 12px 36px rgba(0,0,0,0.6))">
          <rect x="8" y="52" width="134" height="110" rx="10" fill="#1B5E20" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          <rect x="8" y="52" width="134" height="26" rx="10" fill="rgba(255,255,255,0.1)"/>
          <rect x="4" y="36" width="142" height="22" rx="6" fill="#2E7D32" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          <rect x="42" y="40" width="66" height="9" rx="4" fill="#1B5E20"/>
          <rect x="22" y="90" width="106" height="38" rx="6" fill="rgba(255,255,255,0.1)"/>
          <text x="75" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="sans-serif">めいすいくん</text>
          <text x="75" y="122" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="sans-serif">人気投票選挙</text>
          <rect x="15" y="154" width="120" height="4" rx="2" fill="rgba(0,0,0,0.2)"/>
        </svg>
      `;

      // 投票用紙
      const paper = document.createElement('div');
      paper.style.cssText = `
        position:absolute;top:0;left:50%;
        transform:translateX(-50%) translateY(-660px) rotate(-8deg);
        transform-origin:top center;
        width:474px;
        background:#FFFDF8;border:3px solid #D4C9B8;border-radius:8px;
        padding:36px 30px;text-align:center;
        box-shadow:0 12px 48px rgba(0,0,0,0.45);
        font-family:'Noto Serif JP','Hiragino Sans',serif;
        animation:ballotPaperFall 1.25s 0.35s ease-in forwards;
      `;
      paper.innerHTML = `
        <div style="font-size:22px;color:#999;letter-spacing:4px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #E5DDD0;">浦安ご当地めいすいくん人気投票選挙</div>
        <div style="font-size:24px;color:#999;margin-bottom:24px;letter-spacing:6px;">投 票 用 紙</div>
        <div style="font-size:52px;font-weight:900;color:${charColor};border:4px solid ${charColor};border-radius:8px;padding:18px 12px;position:relative;">
          <span style="position:absolute;top:-14px;left:12px;font-size:36px;color:#C41E3A;">○</span>
          ${charName}
        </div>
      `;

      // 完了テキスト
      const doneText = document.createElement('div');
      doneText.style.cssText = `
        position:absolute;bottom:615px;left:50%;
        transform:translateX(-50%) scale(0);
        white-space:nowrap;font-size:60px;font-weight:900;color:#fff;
        font-family:'Noto Sans JP',sans-serif;
        text-shadow:0 0 18px ${charColor},2px 2px 0 #000;
        animation:ballotDoneText 0.4s 1.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
      `;
      doneText.textContent = '📬 入りました！';

      container.appendChild(paper);
      container.appendChild(boxEl);
      container.appendChild(doneText);
      cutin.appendChild(container);
      document.body.appendChild(cutin);

      setTimeout(() => {
        cutin.style.transition = 'opacity 0.35s';
        cutin.style.opacity = '0';
        setTimeout(() => cutin.remove(), 350);
      }, 3300);
    }

    // 感謝画面
    function showThankYou(type) {
      const meta = charMetadata[type];
      const img = charImages[type];
      showBallotCutin(type, meta);

      setTimeout(() => {
        const overlay = document.createElement('div');
        overlay.className = 'thank-overlay';
        overlay.style.background = `linear-gradient(135deg, ${meta.color}dd, ${meta.color}88)`;
        overlay.innerHTML = `
          <img src="${img.src}" alt="${meta.name}">
          <div class="thank-text">
            ${meta.name}に<br>投票しました！<br>ありがとう！🗳️
          </div>
          <div class="thank-next">つぎのひとと こうたいしてね</div>
        `;
        document.body.appendChild(overlay);

        setTimeout(() => {
          overlay.style.transition = 'opacity 0.3s';
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.remove();
            voting = false;
            // キャラの順番をシャッフルして再描画
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            renderGrid();
          }, 300);
        }, 3500);
      }, 3300);
    }

    // 接続状態
    db.ref('.info/connected').on('value', snap => {
      const dot = document.getElementById('statusDot');
      if (dot) dot.className = snap.val() ? 'status-dot' : 'status-dot offline';
    });

    // 管理者モード
    function setupAdmin() {
      if (new URLSearchParams(location.search).get('admin') !== '1') return;
      const footer = document.getElementById('adminFooter');
      footer.style.display = 'block';
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('全投票をリセットしますか？')) return;
        const zeroVotes = Object.fromEntries(CHAR_TYPES.map(t => [t, 0]));
        db.ref('votes').set(zeroVotes);
        db.ref('worldLineOffset').set(0);
        db.ref('stats/cycleStartVotes').set(0);
        db.ref('stats/decorationOffset').set(zeroVotes);
        db.ref('stats/cycleStartPerChar').set(zeroVotes);
        alert('リセットしました');
      });
    }

    renderGrid();
    setupAdmin();
    db.ref('votes').on('value', snap => {
      currentVotes = snap.val() || {};
      updatePreviews();
    });
  </script>
</body>
</html>
