<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>浦安めいすいくん総選挙 - 投票</title>
  <script src="js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }
    .title {
      font-size: 1.6em;
      font-weight: 900;
      color: #2e7d32;
    }
    .subtitle {
      font-size: 1.1em;
      color: #666;
      margin-top: 4px;
    }

    /* 接続状態 */
    .connection-status {
      position: fixed;
      top: 8px;
      right: 12px;
      z-index: 100;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4caf50;
    }
    .status-dot.offline {
      background: #f44336;
    }

    /* キャラグリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 8px 16px;
      flex: 1;
      align-content: center;
    }

    /* ポートレート時は2列 */
    @media (orientation: portrait) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }

    /* キャラカード */
    .char-card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 3px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .char-card:active {
      transform: scale(0.95);
    }
    .char-card img {
      width: 80%;
      max-height: 55vh;
      object-fit: contain;
      pointer-events: none;
    }
    .char-name {
      font-size: 1.1em;
      font-weight: 800;
      margin-top: 8px;
      color: #333;
    }
    .char-preview {
      font-size: 0.7em;
      font-weight: 600;
      margin-top: 4px;
      min-height: 1.2em;
      color: #888;
    }

    /* 感謝オーバーレイ */
    .thank-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: thankIn 0.3s ease-out;
      pointer-events: all;
    }
    .thank-overlay img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      margin-bottom: 16px;
    }
    .thank-text {
      font-size: 2em;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      text-align: center;
      line-height: 1.5;
    }
    .thank-next {
      font-size: 1.2em;
      color: rgba(255,255,255,0.85);
      margin-top: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes thankIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* 管理者用リセットボタン（デフォルト非表示） */
    .admin-footer {
      display: none;
      position: fixed;
      bottom: 8px;
      right: 8px;
      z-index: 100;
    }
    .reset-btn {
      background: #78909c;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.8em;
      cursor: pointer;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🗳️ すきなキャラをえらんでね！</div>
    <div class="subtitle">タップして投票しよう</div>
  </div>

  <div class="connection-status">
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="admin-footer" id="adminFooter">
    <button class="reset-btn" id="resetBtn">リセット</button>
  </div>

  <script>
    // Firebase初期化
    firebase.initializeApp({
      apiKey: "AIzaSyCitq3ZmZ2lbF_mPSermXvbEE77X0jJW2o",
      authDomain: "meisui-world.firebaseapp.com",
      databaseURL: "https://meisui-world-default-rtdb.firebaseio.com",
      projectId: "meisui-world",
      storageBucket: "meisui-world.firebasestorage.app",
      messagingSenderId: "966808863030",
      appId: "1:966808863030:web:a1b85eb17974162c673397"
    });
    const db = firebase.database();

    let voting = false; // 連打防止フラグ
    let currentVotes = {}; // リアルタイム投票数

    // 次のマイルストーンを算出
    function getNextMilestone(charType) {
      const v = currentVotes[charType] || 0;
      const effect = charEffects[charType];
      if (!effect) return null;
      for (let i = 0; i < effect.thresholds.length; i++) {
        if (v < effect.thresholds[i]) {
          return { remaining: effect.thresholds[i] - v, label: effect.levels[i] };
        }
      }
      return null; // 最高レベル
    }

    // 予告テキストを更新
    function updatePreviews() {
      CHAR_TYPES.forEach(type => {
        const el = document.getElementById('preview-' + type);
        if (!el) return;
        const ms = getNextMilestone(type);
        if (ms) {
          el.textContent = `あと${ms.remaining}票で「${ms.label}」！`;
          el.style.color = charMetadata[type].color;
        } else {
          el.textContent = '🎉 最高レベル！';
          el.style.color = '#ffd700';
        }
      });
    }

    // キャラカードを生成（config.jsのCHAR_TYPES/charMetadata/charImagesを使用）
    function renderGrid() {
      const grid = document.getElementById('grid');
      CHAR_TYPES.forEach(type => {
        const meta = charMetadata[type];
        const img = charImages[type];

        const card = document.createElement('div');
        card.className = 'char-card';
        card.style.borderColor = meta.color + '40';

        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.alt = meta.name;
        card.appendChild(imgEl);

        const name = document.createElement('div');
        name.className = 'char-name';
        name.textContent = meta.name;
        name.style.color = meta.color;
        card.appendChild(name);

        // 予告テキスト
        const preview = document.createElement('div');
        preview.className = 'char-preview';
        preview.id = 'preview-' + type;
        card.appendChild(preview);

        card.addEventListener('click', () => vote(type));
        grid.appendChild(card);
      });
    }

    // 投票処理
    function vote(type) {
      if (voting) return;
      voting = true;

      const voteRef = db.ref(`votes/${type}`);
      voteRef.transaction(current => (current || 0) + 1)
        .then(result => {
          if (result.committed) {
            // 大画面側に通知
            db.ref('stats/lastVoteChar').set(type);
            db.ref('stats/lastVoteTime').set(Date.now());
            showThankYou(type);
          } else {
            voting = false;
          }
        })
        .catch(err => {
          console.error('投票失敗:', err);
          voting = false;
          alert('投票できませんでした。もう一度やってみてね。');
        });
    }

    // 感謝画面を表示（2秒で自動復帰）
    function showThankYou(type) {
      const meta = charMetadata[type];
      const img = charImages[type];

      const overlay = document.createElement('div');
      overlay.className = 'thank-overlay';
      overlay.style.background = `linear-gradient(135deg, ${meta.color}dd, ${meta.color}88)`;

      overlay.innerHTML = `
        <img src="${img.src}" alt="${meta.name}">
        <div class="thank-text">
          ${meta.name}に<br>投票しました！<br>ありがとう！🗳️
        </div>
        <div class="thank-next">つぎの人に わたしてね →</div>
      `;

      document.body.appendChild(overlay);

      // 2秒後に自動で投票画面に戻る
      setTimeout(() => {
        overlay.style.transition = 'opacity 0.3s';
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.remove();
          voting = false; // 次の人が投票可能に
        }, 300);
      }, 2000);
    }

    // 接続状態の監視
    db.ref('.info/connected').on('value', snap => {
      const dot = document.getElementById('statusDot');
      if (dot) {
        dot.className = snap.val() ? 'status-dot' : 'status-dot offline';
      }
    });

    // 管理者モード（?admin=1）
    function setupAdmin() {
      if (new URLSearchParams(location.search).get('admin') !== '1') return;
      const footer = document.getElementById('adminFooter');
      footer.style.display = 'block';
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('全投票をリセットしますか？')) return;
        const zeroVotes = Object.fromEntries(CHAR_TYPES.map(t => [t, 0]));
        db.ref('votes').set(zeroVotes);
        db.ref('worldLineOffset').set(0);
        db.ref('stats/cycleStartVotes').set(0);
        db.ref('stats/decorationOffset').set(zeroVotes);
        alert('リセットしました');
      });
    }

    // 初期化
    renderGrid();
    setupAdmin();

    // 投票数をリアルタイム監視して予告表示を更新
    db.ref('votes').on('value', snap => {
      currentVotes = snap.val() || {};
      updatePreviews();
    });
  </script>
</body>
</html>
