<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>めいすいくんワールド - リアルタイム選挙結果</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      color: #333;
      position: relative;
    }

    /* Animated background elements */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      opacity: 0.6;
    }

    .cloud1 {
      width: 200px;
      height: 80px;
      top: 10%;
      animation: float 20s infinite ease-in-out;
    }

    .cloud2 {
      width: 150px;
      height: 60px;
      top: 20%;
      animation: float 25s infinite ease-in-out reverse;
      animation-delay: 5s;
    }

    .cloud3 {
      width: 180px;
      height: 70px;
      top: 70%;
      animation: float 22s infinite ease-in-out;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(50px); }
    }

    .particle {
      position: absolute;
      pointer-events: none;
    }

    .blossom {
      animation: fall 8s infinite linear;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    .day-night-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: dayNightCycle 30s infinite;
    }

    @keyframes dayNightCycle {
      0%, 100% { background: rgba(255, 200, 100, 0.1); }
      50% { background: rgba(100, 150, 255, 0.2); }
    }

    /* Main layout */
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .title-bar {
      background: rgba(0, 0, 0, 0.3);
      color: white;
      padding: 20px 40px;
      text-align: center;
      font-size: 2.5em;
      font-weight: bold;
      backdrop-filter: blur(10px);
      border-bottom: 3px solid rgba(255, 255, 255, 0.2);
    }

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .world-map {
      width: 70%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
    }

    .character-world {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .character-icon {
      position: absolute;
      font-size: 4em;
      cursor: pointer;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
      animation: float-char 6s ease-in-out infinite;
    }

    @keyframes float-char {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .results-panel {
      width: 30%;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 25px;
      overflow-y: auto;
      border-left: 3px solid rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    .results-title {
      font-size: 1.6em;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
      border-bottom: 2px solid #667eea;
      padding-bottom: 15px;
    }

    .ranking-item {
      margin-bottom: 15px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
    }

    .ranking-item.voted {
      animation: rankingFlash 0.5s ease-out;
    }

    @keyframes rankingFlash {
      0% { background: #fff9e6; transform: scale(1.02); }
      100% { background: #f5f5f5; transform: scale(1); }
    }

    .ranking-left {
      display: flex;
      align-items: center;
      flex: 1;
    }

    .rank-medal {
      font-size: 1.8em;
      margin-right: 12px;
      width: 40px;
      text-align: center;
    }

    .rank-name {
      font-size: 0.95em;
      font-weight: 600;
      color: #333;
      flex: 1;
    }

    .rank-count {
      font-size: 1.2em;
      font-weight: bold;
      color: #667eea;
      min-width: 50px;
      text-align: right;
    }

    .bar-chart {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .bar-item {
      margin-bottom: 10px;
    }

    .bar-label {
      font-size: 0.85em;
      color: #666;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .bar {
      width: 100%;
      height: 20px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      transition: width 0.3s ease-out;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      color: white;
      font-size: 0.75em;
      font-weight: bold;
    }

    .bar-fill.meisui { background: linear-gradient(90deg, #ffd700, #ffed4e); }
    .bar-fill.tsutsuji { background: linear-gradient(90deg, #e040fb, #f06ecd); }
    .bar-fill.meisui_chan { background: linear-gradient(90deg, #ff6b6b, #ff8787); }
    .bar-fill.bekabune { background: linear-gradient(90deg, #42a5f5, #64b5f6); }
    .bar-fill.asari { background: linear-gradient(90deg, #ff8a65, #ffab91); }
    .bar-fill.ryoushi { background: linear-gradient(90deg, #66bb6a, #81c784); }

    .stats-section {
      margin-top: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      align-items: center;
    }

    .stat-label {
      font-size: 0.9em;
      color: #666;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.3em;
      font-weight: bold;
      color: #667eea;
    }

    .town-rank {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      color: white;
      font-size: 1.1em;
    }

    .town-rank.rank-s { background: linear-gradient(135deg, #ffb300, #ff7e00); }
    .town-rank.rank-a { background: linear-gradient(135deg, #ff6b6b, #ff5252); }
    .town-rank.rank-b { background: linear-gradient(135deg, #667eea, #5e35b1); }
    .town-rank.rank-c { background: linear-gradient(135deg, #42a5f5, #2196f3); }
    .town-rank.rank-d { background: linear-gradient(135deg, #66bb6a, #43a047); }
    .town-rank.rank-e { background: linear-gradient(135deg, #ab47bc, #8e24aa); }
    .town-rank.rank-f { background: linear-gradient(135deg, #9e9e9e, #757575); }

    .connection-status {
      margin-top: auto;
      padding: 10px;
      text-align: center;
      border-top: 1px solid #ddd;
      font-size: 0.85em;
      color: #666;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    .status-dot.connected {
      background: #4caf50;
    }

    .status-dot.disconnected {
      background: #f44336;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .fullscreen-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .fullscreen-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 126, 234, 0.8);
    }

    /* Large screen (55" monitor etc.) — scale up text and spacing */
    @media (min-width: 1920px) {
      .title-bar { font-size: 3.5em; padding: 30px 60px; }
      .results-title { font-size: 2.2em; }
      .ranking-item { padding: 18px; margin-bottom: 20px; }
      .rank-medal { font-size: 2.5em; }
      .rank-name { font-size: 1.3em; }
      .rank-count { font-size: 1.6em; }
      .bar-label { font-size: 1.1em; }
      .bar { height: 28px; }
      .stat-value { font-size: 1.8em; }
      .character-icon { font-size: 5.5em; }
    }
  </style>
</head>
<body>
  <div class="background-animation" id="bgAnimation">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="day-night-overlay"></div>
  </div>

  <button class="fullscreen-btn" id="fullscreenBtn" title="フルスクリーン表示">⛶ フルスクリーン</button>

  <div class="container">
    <div class="title-bar">🗳️ 仮想うらやす めいすいくんワールド 🌏</div>

    <div class="content">
      <div class="world-map">
        <div class="character-world" id="characterWorld"></div>
      </div>

      <div class="results-panel">
        <div class="results-title">📊 得票ランキング</div>

        <div id="rankingContainer"></div>

        <div class="bar-chart" id="barChartContainer"></div>

        <div class="stats-section">
          <div class="stat-row">
            <span class="stat-label">総投票数</span>
            <span class="stat-value" id="totalVotes">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">投票率</span>
            <span class="stat-value" id="turnoutRate">0.0%</span>
          </div>
        </div>

        <div id="townRank" class="town-rank rank-f">町ランク: F</div>

        <div id="worldLineDisplay" style="margin-top:10px;padding:8px;background:#f0f0f0;border-radius:8px;text-align:center;font-size:0.9em;color:#667eea;font-weight:bold;">第1世界線</div>

        <div class="connection-status">
          <span class="status-dot connected" id="statusDot"></span>
          <span id="statusText">接続中</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCitq3ZmZ2lbF_mPSermXvbEE77X0jJW2o",
      authDomain: "meisui-world.firebaseapp.com",
      projectId: "meisui-world",
      storageBucket: "meisui-world.firebasestorage.app",
      messagingSenderId: "966808863030",
      appId: "1:966808863030:web:a1b85eb17974162c673397",
      databaseURL: "https://meisui-world-default-rtdb.firebaseio.com"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Character data
    const characters = [
      { key: 'meisui', name: 'イチョウめいすいくん', icon: '🌳', color: '#ffd700' },
      { key: 'tsutsuji', name: 'ツツジめいちゃん', icon: '🌺', color: '#e040fb' },
      { key: 'meisui_chan', name: 'ビーナスめいちゃん', icon: '🏖️', color: '#ff6b6b' },
      { key: 'bekabune', name: '浦安の海めいすいくん', icon: '🐬', color: '#42a5f5' },
      { key: 'asari', name: '屋形船めいすいくん', icon: '🏮', color: '#ff8a65' },
      { key: 'ryoushi', name: '漁師めいすいくん', icon: '🐟', color: '#66bb6a' }
    ];

    let voteData = {};
    let isOnline = false;

    // Initialize vote data
    function initializeVotes() {
      characters.forEach(char => {
        voteData[char.key] = 0;
      });
    }

    // Create character world with floating icons
    function renderCharacterWorld() {
      const worldDiv = document.getElementById('characterWorld');
      worldDiv.innerHTML = '';

      const positions = [
        { top: '20%', left: '15%' },
        { top: '30%', left: '70%' },
        { top: '50%', left: '25%' },
        { top: '60%', left: '75%' },
        { top: '75%', left: '40%' },
        { top: '40%', left: '50%' }
      ];

      characters.forEach((char, index) => {
        const iconDiv = document.createElement('div');
        iconDiv.className = 'character-icon';
        iconDiv.textContent = char.icon;
        iconDiv.id = `char-${char.key}`;
        iconDiv.style.top = positions[index].top;
        iconDiv.style.left = positions[index].left;
        iconDiv.style.animationDelay = `${index * 0.3}s`;

        worldDiv.appendChild(iconDiv);
      });
    }

    // Render ranking list
    function renderRanking(data) {
      const sorted = characters
        .map(char => ({
          ...char,
          votes: data[char.key] || 0
        }))
        .sort((a, b) => b.votes - a.votes);

      const container = document.getElementById('rankingContainer');
      container.innerHTML = '';

      const medals = ['👑', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣'];

      sorted.forEach((item, index) => {
        const rankDiv = document.createElement('div');
        rankDiv.className = 'ranking-item';
        rankDiv.id = `rank-${item.key}`;
        rankDiv.innerHTML = `
          <div class="ranking-left">
            <div class="rank-medal">${medals[index]}</div>
            <div class="rank-name">${item.name}</div>
          </div>
          <div class="rank-count">${item.votes}</div>
        `;

        container.appendChild(rankDiv);
      });
    }

    // Render bar chart
    function renderBarChart(data) {
      const sorted = characters
        .map(char => ({
          ...char,
          votes: data[char.key] || 0
        }))
        .sort((a, b) => b.votes - a.votes);

      const total = Object.values(data).reduce((sum, v) => sum + v, 0) || 1;

      const container = document.getElementById('barChartContainer');
      container.innerHTML = '';

      sorted.forEach(item => {
        const percentage = Math.round((item.votes / total) * 100);
        const barDiv = document.createElement('div');
        barDiv.className = 'bar-item';
        barDiv.innerHTML = `
          <div class="bar-label">
            <span>${item.name}</span>
            <span>${percentage}%</span>
          </div>
          <div class="bar">
            <div class="bar-fill ${item.key}" style="width: ${percentage}%">
              ${item.votes > 0 ? item.votes : ''}
            </div>
          </div>
        `;

        container.appendChild(barDiv);
      });
    }

    // Calculate town rank
    function calculateTownRank(totalVotes) {
      const totalPopulation = 171322;
      const maxVotes = 17;
      const expectedVotes = totalPopulation / maxVotes;
      const turnoutPercent = (totalVotes / expectedVotes) * 100;

      let rank = 'F';
      let className = 'rank-f';

      if (turnoutPercent >= 90) { rank = 'S'; className = 'rank-s'; }
      else if (turnoutPercent >= 75) { rank = 'A'; className = 'rank-a'; }
      else if (turnoutPercent >= 60) { rank = 'B'; className = 'rank-b'; }
      else if (turnoutPercent >= 45) { rank = 'C'; className = 'rank-c'; }
      else if (turnoutPercent >= 30) { rank = 'D'; className = 'rank-d'; }
      else if (turnoutPercent >= 15) { rank = 'E'; className = 'rank-e'; }

      return { rank, className, turnoutPercent };
    }

    // Update statistics
    function updateStats(data) {
      const totalVotes = Object.values(data).reduce((sum, v) => sum + v, 0);
      const { rank, className, turnoutPercent } = calculateTownRank(totalVotes);

      document.getElementById('totalVotes').textContent = totalVotes;
      document.getElementById('turnoutRate').textContent = turnoutPercent.toFixed(1) + '%';

      const rankDiv = document.getElementById('townRank');
      rankDiv.className = `town-rank ${className}`;
      rankDiv.textContent = `町ランク: ${rank}`;
    }

    // Listen to world line offset
    function listenToWorldLine() {
      database.ref('worldLineOffset').on('value', snapshot => {
        const offset = snapshot.val() || 0;
        const wlEl = document.getElementById('worldLineDisplay');
        if (wlEl) wlEl.textContent = '第' + (offset + 1) + '世界線';
      });
    }

    // Listen to votes
    function listenToVotes() {
      database.ref('votes').on('value', snapshot => {
        const data = snapshot.val() || {};

        characters.forEach(char => {
          voteData[char.key] = data[char.key] || 0;
        });

        renderRanking(voteData);
        renderBarChart(voteData);
        updateStats(voteData);

        // Flash animation on update
        Object.keys(data).forEach(key => {
          const rankItem = document.getElementById(`rank-${key}`);
          if (rankItem) {
            rankItem.classList.remove('voted');
            setTimeout(() => rankItem.classList.add('voted'), 10);
          }
        });
      });
    }

    // Connection listener
    function setupConnectionListener() {
      database.ref('.info/connected').on('value', snapshot => {
        isOnline = snapshot.val();
        updateConnectionStatus();
      });
    }

    // Update connection status
    function updateConnectionStatus() {
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      if (isOnline) {
        statusDot.className = 'status-dot connected';
        statusText.textContent = '接続中 ✓';
      } else {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = '接続待機中...';
      }
    }

    // Create blossoms (capped to prevent DOM bloat on long-running displays)
    const MAX_BLOSSOMS = 20;
    function createBlossom() {
      const bg = document.getElementById('bgAnimation');
      if (bg.querySelectorAll('.blossom').length >= MAX_BLOSSOMS) return;

      const blossom = document.createElement('div');
      blossom.className = 'particle blossom';
      blossom.textContent = '🌸';
      blossom.style.left = Math.random() * 100 + '%';
      blossom.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
      blossom.style.opacity = Math.random() * 0.7 + 0.3;
      blossom.style.animationDuration = (Math.random() * 5 + 8) + 's';

      bg.appendChild(blossom);

      setTimeout(() => blossom.remove(), 13000);
    }

    // Spawn blossoms periodically
    function setupBlossoms() {
      setInterval(createBlossom, 800);
    }

    // Fullscreen button
    function setupFullscreenButton() {
      document.getElementById('fullscreenBtn').addEventListener('click', () => {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch(err => {
            alert(`フルスクリーン要求エラー: ${err.message}`);
          });
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        }
      });
    }

    // Initialize on load
    window.addEventListener('load', () => {
      initializeVotes();
      renderCharacterWorld();
      setupConnectionListener();
      listenToVotes();
      listenToWorldLine();
      setupBlossoms();
      setupFullscreenButton();
    });
  </script>
</body>
</html>
